<!DOCTYPE html>
<html>
<head>
<title>MAIA INVENT</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

<style>
body { font-family: Arial; background:#0f172a; color:#e5e7eb;}
textarea { width:100%; height:80px; border-radius:8px; padding:10px;}
button {
    padding:10px; margin:5px;
    border-radius:8px; border:none;
    cursor:pointer;
    background:#2563eb; color:white;
}
.panel { background:#020617; padding:15px; border-radius:10px; margin-top:20px;}
.bloque {
    margin-top:20px;
    padding:15px;
    background:#020617;
    border-radius:10px;
    border-left:4px solid #22c55e;
}
pre {
    background:black;
    padding:10px;
    border-radius:8px;
    overflow:auto;
    font-size:12px;
}
#barra_container {
    width:100%;
    background:#111;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
    display:none;
}
#barra {
    width:0%;
    height:25px;
    background:#22c55e;
    text-align:center;
    color:white;
}
.boton-maia{
    background:#facc15;
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🧠 MAIA INVENT</h1>

<textarea id="idea" placeholder="Describe tu drone..."></textarea>
<br><br>

<button onclick="evaluar()">🚀 Generar Ingeniería</button>
<button onclick="limpiarUI()">🧹 Limpiar</button>

<div id="barra_container">
    <div id="barra">0%</div>
</div>

<div id="resultado"></div>

<script>

// =========================
// 🚀 MOTOR REAL (STEP)
// =========================
async function evaluar(){

    const idea = document.getElementById("idea").value;
    if(!idea){ alert("Ingresa una idea"); return; }

    document.getElementById("barra_container").style.display = "block";

    let paso = 0;
    let data = {};
    let barra = document.getElementById("barra");

    while(true){

        let res = await fetch("/maia_step", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ idea, paso, data })
        });

        let json = await res.json();

        if(json.error){
            alert(json.error);
            return;
        }

        paso = json.paso ?? paso + 1;
        data = json.data ?? data;

        let progreso = Math.min(95, paso * 15);
        barra.style.width = progreso + "%";
        barra.innerText = progreso + "%";

        if(json.final){
            barra.style.width = "100%";
            barra.innerText = "100%";
            renderResultado(json.resultado);
            return;
        }

        await new Promise(r => setTimeout(r, 300));
    }
}


// =========================
// 🎯 RESULTADO COMPLETO
// =========================
function renderResultado(data){

    let html = `<div class="panel">`;

    html += `<button class="boton-maia" onclick="explicarMAIA()">🧠 ¿Qué puede hacer MAIA?</button>`;

    // 🔩 HARDWARE (REAL)
    html += `
    <div class="bloque">
    <h3>🔩 Hardware</h3>
    <pre>${JSON.stringify(data.analisis_pro || {}, null, 2)}</pre>
    </div>
    `;

    // 💻 SOFTWARE (REAL)
    html += `
    <div class="bloque">
    <h3>💻 Software</h3>
    <pre>${JSON.stringify(data.software || {}, null, 2)}</pre>
    </div>
    `;

    // ⚙️ FISICA
    html += `
    <div class="bloque">
    <h3>⚙️ Física</h3>
    <pre>${JSON.stringify(data.fisica || {}, null, 2)}</pre>
    </div>
    `;

    // ⚠️ RIESGOS
    html += `
    <div class="bloque">
    <h3>⚠️ Riesgos</h3>
    <pre>${JSON.stringify(data.validacion || {}, null, 2)}</pre>
    </div>
    `;

    // 🧱 3D
    html += `
    <div class="bloque">
    <h3>🧱 Modelo 3D</h3>
    <pre>${JSON.stringify(data.modelos_3d || {}, null, 2)}</pre>
    <canvas id="viewer3d" style="width:100%; height:400px;"></canvas>
    </div>
    `;

    // 📦 ZIP
    html += `
    <div class="bloque">
    <h3>📦 Proyecto Exportado</h3>
    <pre>${data.zip || "No generado"}</pre>
    </div>
    `;

    html += `</div>`;

    document.getElementById("resultado").innerHTML = html;

    setTimeout(render3D, 200);
}


// =========================
// 🧊 3D
// =========================
function render3D(){
    const canvas = document.getElementById("viewer3d");
    if(!canvas || typeof THREE === "undefined") return;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth/400, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
    renderer.setSize(canvas.clientWidth,400);

    scene.add(new THREE.AmbientLight(0xffffff,0.7));

    let body = new THREE.Mesh(
        new THREE.BoxGeometry(1.5,0.3,1.5),
        new THREE.MeshStandardMaterial({color:0x00ffaa})
    );
    scene.add(body);

    for(let i=0;i<4;i++){
        let angle = i*Math.PI/2;

        let arm = new THREE.Mesh(
            new THREE.BoxGeometry(2,0.1,0.1),
            new THREE.MeshStandardMaterial({color:0xffffff})
        );
        arm.rotation.y = angle;
        scene.add(arm);

        let motor = new THREE.Mesh(
            new THREE.CylinderGeometry(0.25,0.25,0.3,16),
            new THREE.MeshStandardMaterial({color:0xff0000})
        );
        motor.position.set(Math.cos(angle)*1,0.2,Math.sin(angle)*1);
        scene.add(motor);
    }

    camera.position.z = 5;

    function animate(){
        requestAnimationFrame(animate);
        scene.rotation.y += 0.01;
        renderer.render(scene,camera);
    }

    animate();
}


// =========================
// 🧠 EXPLICACION
// =========================
function explicarMAIA(){
    alert(`MAIA ejecuta:

1. Analiza idea
2. Diseña arquitectura
3. Calcula física real
4. Genera software completo
5. Evalúa riesgos
6. Genera modelo 3D
7. Exporta proyecto

Sistema autónomo avanzado.`);
}


// =========================
// 🧹 LIMPIAR
// =========================
function limpiarUI(){
    document.getElementById("idea").value = "";
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("barra_container").style.display = "none";
}

</script>

</body>
</html>
