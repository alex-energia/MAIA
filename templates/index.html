<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAIA</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background-color:#1e1e1e;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background-color:#111;
}

.topbar-buttons button{
margin-left:10px;
padding:8px 15px;
border-radius:8px;
border:none;
cursor:pointer;
background-color:#2563eb;
color:white;
}

.container{
padding:20px;
}

.chat-box{
height:60vh;
overflow-y:auto;
background-color:#2a2a2a;
padding:15px;
border-radius:12px;
}

.input-area{
margin-top:15px;
display:flex;
gap:10px;
align-items:center;
}

input[type="text"]{
flex:1;
padding:12px;
border-radius:10px;
border:none;
}

button.send{
padding:12px 20px;
border-radius:10px;
border:none;
background-color:#2563eb;
color:white;
cursor:pointer;
}

.hidden{
display:none;
}

.panel-oportunidades{
margin-top:20px;
background:#2a2a2a;
padding:15px;
border-radius:10px;
}

.card-oportunidad{
border:1px solid #444;
padding:12px;
margin-top:10px;
border-radius:8px;
}

.btn-guardar{
margin-top:10px;
padding:6px 10px;
background:#16a34a;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.btn-eliminar{
background:#dc2626;
border:none;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
color:white;
margin-left:10px;
}

.drone-botones{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.drone-botones button{
padding:15px;
border-radius:10px;
border:none;
cursor:pointer;
color:white;
font-size:15px;
}

</style>

</head>

<body>

<div class="topbar">

<h2>🤖 MAIA IA</h2>

<div class="topbar-buttons">

<button onclick="activarGanado()">🐄 MAIA GANADO</button>
<button onclick="activarPlantas()">🌿 MAIA PLANTAS</button>
<button onclick="activarTraductor()">🌍 MAIA TRADUCTOR</button>
<button onclick="activarProyectos()">📁 MAIA PROYECTOS</button>
<button onclick="activarDrone()">🚁 MAIA DRONE</button>
<button onclick="volverChat()">🏠 Inicio</button>

</div>
</div>

<div class="container">

<!-- CHAT NORMAL -->

<div id="chatNormal">

<div id="chatBox" class="chat-box"></div>

<div class="input-area">

<input type="text" id="mensaje" placeholder="Escribe tu mensaje...">

<button class="send" onclick="enviarMensaje()">Enviar</button>

</div>
</div>

<!-- MODULO PROYECTOS -->

<div id="moduloProyectos" class="hidden">

<h3>📁 MAIA PROYECTOS</h3>

<div class="chat-box">

<p>Gestión de proyectos activa.</p>

<a href="/proyectos" style="color:#2563eb;">Ir al módulo completo de Proyectos</a>

<hr>

<h3>🔎 Inteligencia de Mercado Energético</h3>

<button onclick="buscarOportunidades()">Buscar oportunidades energéticas</button>
<button onclick="verMemoria()">Memoria MAIA</button>

<div id="panelOportunidades" class="panel-oportunidades"></div>

<hr>

<h3>💬 Chat con MAIA</h3>

<div id="chatMaia" class="chat-box" style="height:250px"></div>

<div class="input-area">

<input type="text" id="mensajeMaia" placeholder="Pregunta a MAIA sobre proyectos energéticos">

<button class="send" onclick="enviarMensajeMaia()">Enviar</button>

</div>

</div>

</div>

<!-- MODULO DRONE -->

<div id="moduloDrone" class="hidden">

<h3>🚁 MAIA DRONE</h3>

<div class="chat-box">

<h4>Selecciona el tipo de drones</h4>

<div class="drone-botones">

<button onclick="dronesComerciales()" style="background:#2563eb;">🛩️ Drones comerciales</button>

<button onclick="dronesIndustriales()" style="background:#16a34a;">🏭 Drones industriales</button>

<button onclick="dronesMilitares()" style="background:#dc2626;">🛡️ Drones militares</button>

<button onclick="abrirSimulador()" style="background:#9333ea;">🧪 Simulador de drones</button>

</div>

<div id="contenidoDrone" style="margin-top:20px;"></div>

</div>

</div>

</div>

<script>

function ocultarTodo(){
document.getElementById("chatNormal").classList.add("hidden");
document.getElementById("moduloProyectos").classList.add("hidden");
document.getElementById("moduloDrone").classList.add("hidden");
}

function volverChat(){
ocultarTodo();
document.getElementById("chatNormal").classList.remove("hidden");
}

function activarProyectos(){
ocultarTodo();
document.getElementById("moduloProyectos").classList.remove("hidden");
}

function activarDrone(){
ocultarTodo();
document.getElementById("moduloDrone").classList.remove("hidden");
}

function activarGanado(){
alert("Módulo MAIA GANADO en construcción");
}

function activarPlantas(){
alert("Módulo MAIA PLANTAS en construcción");
}

function activarTraductor(){
alert("Módulo MAIA TRADUCTOR en construcción");
}

function abrirSimulador(){
window.open("/maia_simulador","_blank");
}

function dronesComerciales(){

document.getElementById("contenidoDrone").innerHTML = `
<h3>🛩️ Drones comerciales</h3>
<ul>
<li>Fotografía aérea</li>
<li>Eventos</li>
<li>Turismo</li>
<li>Video profesional</li>
</ul>
`;

}

function dronesIndustriales(){

document.getElementById("contenidoDrone").innerHTML = `
<h3>🏭 Drones industriales</h3>
<ul>
<li>Inspección energética</li>
<li>Agricultura de precisión</li>
<li>Minería</li>
<li>Infraestructura</li>
</ul>
`;

}

function dronesMilitares(){

document.getElementById("contenidoDrone").innerHTML = `
<h3>🛡️ Drones militares</h3>
<ul>
<li>Reconocimiento</li>
<li>Vigilancia</li>
<li>Operaciones tácticas</li>
<li>Seguridad fronteriza</li>
</ul>
`;

}

async function buscarOportunidades(){

const panel=document.getElementById("panelOportunidades")

panel.innerHTML="Buscando oportunidades..."

const res=await fetch("/maia_oportunidades")

const data=await res.json()

panel.innerHTML="<h4>Oportunidades detectadas</h4>"

data.oportunidades.forEach(o=>{

panel.innerHTML += `
<div class="card-oportunidad">
<b>${o.titulo}</b><br>
Pais: ${o.pais}<br>
Tipo activo: ${o.tipo_activo}<br>
Empresa: ${o.empresa}<br>
<a href="${o.contacto}" target="_blank">Ver fuente</a>
</div>
`

})

}

async function verMemoria(){

const panel=document.getElementById("panelOportunidades")

panel.innerHTML="Cargando memoria..."

const res=await fetch("/memoria_proyectos")

const data=await res.json()

panel.innerHTML="<h4>Memoria MAIA</h4>"

data.forEach(p=>{

panel.innerHTML += `
<div class="card-oportunidad">
<b>${p.titulo}</b><br>
Pais: ${p.pais}<br>
Tipo activo: ${p.tipo_activo}<br>
Empresa: ${p.empresa}
<button class="btn-eliminar" onclick="eliminarProyecto(${p.id})">Eliminar</button>
</div>
`

})

}

async function eliminarProyecto(id){

await fetch("/eliminar_proyecto/"+id,{method:"DELETE"})

verMemoria()

}

async function enviarMensajeMaia(){

let input=document.getElementById("mensajeMaia")
let chat=document.getElementById("chatMaia")

let mensaje=input.value

if(!mensaje) return

chat.innerHTML += `<div><b>Tú:</b> ${mensaje}</div>`

input.value=""

const res=await fetch("/maia_chat",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:mensaje})

})

const data=await res.json()

chat.innerHTML += `<div><b>MAIA:</b> ${data.reply}</div>`

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
