<!DOCTYPE html>
<html>
<head>
<title>MAIA INVENT</title>

<!-- ✅ FIX REAL THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:#e5e7eb;}
textarea { width:100%; height:80px; border-radius:8px; padding:10px;}
button {
    padding:10px; margin:5px;
    border-radius:8px; border:none;
    cursor:pointer;
    background:#2563eb; color:white;
}
.panel { background:#020617; padding:15px; border-radius:10px; margin-top:20px;}
.bloque { margin-top:20px; padding:12px; background:#020617; border-radius:10px; border:1px solid #1e293b;}
.ok { color:#22c55e; }
.bad { color:#ef4444; }
pre {
    background:black;
    padding:10px;
    border-radius:8px;
    overflow:auto;
    font-size:12px;
}
.modulo {
    background:#0b1220;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    cursor:pointer;
    border:1px solid #1e293b;
}
.codigo { display:none; margin-top:10px;}
.hw-section{
    margin-bottom:10px;
    padding:10px;
    background:#111;
    border-radius:8px;
}
#barra_container {
    width:100%;
    background:#111;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
    display:none;
}
#barra {
    width:0%;
    height:25px;
    background:#22c55e;
    text-align:center;
    color:white;
}
</style>
</head>

<body>

<h1>🧠 MAIA INVENT</h1>

<textarea id="idea"></textarea>
<br><br>

<button onclick="evaluar()">🚀 Generar Ingeniería</button>
<button onclick="limpiarUI()">🧹 Limpiar</button>

<div id="barra_container">
    <div id="barra">0%</div>
</div>

<div id="resultado"></div>

<script>

// =========================
// 🔥 MOTOR STEP FIXED
// =========================
async function evaluar(){

    const idea = document.getElementById("idea").value;

    if(!idea){
        alert("Ingresa una idea válida");
        return;
    }

    document.getElementById("barra_container").style.display = "block";

    let paso = 0;
    let data = {};
    let barra = document.getElementById("barra");

    while(true){

        try{

            let res = await fetch("/maia_step", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({
                    idea: idea,
                    paso: paso,
                    data: data
                })
            });

            let json = await res.json();

            if(json.error){
                alert("Error MAIA");
                console.error(json.error);
                break;
            }

            // ✅ CONTROL SEGURO
            if(typeof json.paso !== "undefined"){
                paso = json.paso;
            }

            if(json.data){
                data = json.data;
            }

            // 🔥 PROGRESO SUAVE
            let progreso = Math.min(95, (paso + 1) * 15);
            barra.style.width = progreso + "%";
            barra.innerText = progreso + "%";

            // ✅ FINAL
            if(json.final){
                barra.style.width = "100%";
                barra.innerText = "100%";
                renderResultado(json.resultado);
                break;
            }

            await new Promise(r => setTimeout(r, 300));

        }catch(e){
            console.error("ERROR FETCH:", e);
            break;
        }
    }
}

// =========================
// RESULTADO (MEJORADO)
// =========================
function renderResultado(data){

    let html = `<div class="panel">`;

    html += `<h2>${data.validacion?.viabilidad || "RESULTADO MAIA"}</h2>`;

    html += `<div class="bloque">
        <h3>📦 Ingeniería</h3>
        <pre>${JSON.stringify(data.analisis_pro || data.analisis || {},null,2)}</pre>
    </div>`;

    html += `<div class="bloque">
        <h3>⚡ Física</h3>
        <pre>${JSON.stringify(data.fisica || {},null,2)}</pre>
    </div>`;

    html += `<div class="bloque">
        <h3>🧊 Modelo 3D</h3>
        <canvas id="viewer3d" style="width:100%; height:400px;"></canvas>
    </div>`;

    html += `<div class="bloque">
        <h3>📦 ZIP</h3>
        <pre>${data.zip || "No generado"}</pre>
    </div>`;

    html += `</div>`;

    document.getElementById("resultado").innerHTML = html;

    render3D();
}

// =========================
// 3D FIX
// =========================
function render3D(){

    const canvas = document.getElementById("viewer3d");
    if(!canvas || typeof THREE === "undefined") return;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75,2,0.1,1000);
    const renderer = new THREE.WebGLRenderer({canvas});

    renderer.setSize(canvas.clientWidth,400);

    scene.add(new THREE.AmbientLight(0xffffff,0.6));

    let body = new THREE.Mesh(
        new THREE.BoxGeometry(1,0.3,1),
        new THREE.MeshStandardMaterial({color:0x00ffaa})
    );

    scene.add(body);

    for(let i=0;i<4;i++){
        let angle = i*Math.PI/2;

        let arm = new THREE.Mesh(
            new THREE.BoxGeometry(2,0.1,0.1),
            new THREE.MeshStandardMaterial({color:0xffffff})
        );

        arm.rotation.y = angle;
        scene.add(arm);

        let motor = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2,0.2,0.2,16),
            new THREE.MeshStandardMaterial({color:0xff0000})
        );

        motor.position.set(Math.cos(angle)*1,0.2,Math.sin(angle)*1);
        scene.add(motor);
    }

    camera.position.z = 5;

    function animate(){
        requestAnimationFrame(animate);
        scene.rotation.y += 0.01;
        renderer.render(scene,camera);
    }

    animate();
}

// =========================
// LIMPIAR
// =========================
function limpiarUI(){
    document.getElementById("idea").value = "";
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("barra_container").style.display = "none";
    document.getElementById("barra").style.width = "0%";
    document.getElementById("barra").innerText = "0%";
}

</script>

</body>
</html>
