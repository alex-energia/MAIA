{% extends "base_maia.html" %}
{% block content %}

<style>
body{ margin:0; font-family:Arial; background:#1e1e1e; color:white;}
.topbar{ display:flex; justify-content:space-between; align-items:center; padding:15px 25px; background:#111;}
.topbar-buttons button{ margin-left:10px; padding:8px 15px; border-radius:8px; border:none; cursor:pointer; background:#2563eb; color:white;}
.container{ padding:20px;}
.chat-box{ height:60vh; overflow-y:auto; background:#2a2a2a; padding:15px; border-radius:12px;}
.input-area{ margin-top:15px; display:flex; gap:10px;}
input[type="text"]{ flex:1; padding:12px; border-radius:10px; border:none;}
button.send{ padding:12px 20px; border-radius:10px; border:none; background:#2563eb; color:white; cursor:pointer;}
.hidden{display:none;}
.drone-botones{ display:flex; gap:20px; flex-wrap:wrap; margin-top:20px;}
.drone-botones button{ padding:15px; border-radius:10px; border:none; cursor:pointer; color:white; font-size:15px;}

.modulo-extra{ margin-top:30px; display:flex; flex-wrap:wrap; gap:15px;}
.modulo-extra button{
  flex:1;
  min-width:150px;
  padding:15px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:#10b981;
  color:white;
  font-weight:bold;
}
.modulo-extra button:hover{ background:#059669;}

/* 🔴 VOZ */
.boton-voz{
  background:#ff0000;
  color:white;
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-left:12px;
  box-shadow: 0 0 20px rgba(255,0,0,0.8);
}
.boton-voz:hover{ background:#b91c1c; }

/* 💬 CHAT */
.boton-plus{
  background:#2563eb;
  color:white;
  width:45px;
  height:45px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>

<div class="topbar">
  <h2>🤖 MAIA IA</h2>
  <div class="topbar-buttons">
    <button onclick="abrirModuloGenerico('ganado')">🐄</button>
    <button onclick="abrirModuloGenerico('plantas')">🌿</button>
    <button onclick="abrirModuloGenerico('traductor')">🌍</button>
    <button onclick="abrirModuloGenerico('proyectos')">📁</button>
    <button onclick="activarDrone()">🚁</button>
    <button onclick="volverChat()">🏠</button>

    <button class="boton-voz" onclick="activarVozReal()">🎤</button>
    <button class="boton-plus" onclick="abrirChatMAIA()">💬</button>
  </div>
</div>

<div class="container">

  <!-- CHAT -->
  <div id="chatNormal">
    <div id="chatBox" class="chat-box"></div>
    <div class="input-area">
      <input type="text" id="mensaje">
      <button class="send">Enviar</button>
    </div>
  </div>

  <!-- DRONE -->
  <div id="moduloDrone" class="hidden">
    <h3>🚁 MAIA DRONE</h3>

    <div class="chat-box">

      <div class="drone-botones">
        <button onclick="dronesComerciales()">🛩️ Comerciales</button>
        <button onclick="dronesIndustriales()">🏭 Industriales</button>
        <button onclick="dronesMilitares()">🛡️ Militares</button>
      </div>

      <div id="contenidoDrone" style="margin-top:20px"></div>

      <!-- 🔥 MÓDULOS EXTRA (AQUÍ ESTABA EL FALTANTE) -->
      <div class="modulo-extra">

        <button onclick="cargarModuloExtra('simulador','🕹️ Simulador')">
          🕹️ Simulador
        </button>

        <button onclick="cargarModuloExtra('invent','💡 Invent')">
          💡 Invent
        </button>

        <button onclick="cargarModuloExtra('lab','🧪 Lab')">
          🧪 Lab
        </button>

        <button onclick="cargarModuloExtra('architect','🏗️ Architect')">
          🏗️ Architect
        </button>

      </div>

    </div>
  </div>

</div>

<script>

// navegación
function ocultarTodo(){
  document.getElementById("chatNormal").classList.add("hidden");
  document.getElementById("moduloDrone").classList.add("hidden");
}

function volverChat(){
  ocultarTodo();
  document.getElementById("chatNormal").classList.remove("hidden");
}

// 🚁 DRONE
function activarDrone(){
  ocultarTodo();
  document.getElementById("moduloDrone").classList.remove("hidden");
  dronesIndustriales();
}

// 🔥 DRONES
async function cargarDronesPorCategoria(categoria, titulo){
  const cont = document.getElementById("contenidoDrone");
  cont.innerHTML = `Cargando ${titulo}...`;

  try{
    let r = await fetch(`/maia_drones_aprobados?categoria=${categoria}`);
    let drones = await r.json();

    let html = `<h3>${titulo}</h3>`;

    drones.forEach(d=>{
      html += `
        <div style="margin-bottom:15px;">
          🚁 <b>${d.nombre}</b><br>
          <button onclick="window.location.href='${d.ruta}'">Abrir</button>
        </div>
      `;
    });

    cont.innerHTML = html;

  }catch(e){
    cont.innerHTML = "Error cargando drones";
  }
}

function dronesComerciales(){ cargarDronesPorCategoria("comercial","🛩️ Comerciales"); }
function dronesIndustriales(){ cargarDronesPorCategoria("industrial","🏭 Industriales"); }
function dronesMilitares(){ cargarDronesPorCategoria("militar","🛡️ Militares"); }

// 🎤 VOZ
async function activarVozReal(){
  let pregunta = prompt("🎤 Habla con MAIA:");
  if(!pregunta) return;

  let res = await fetch("/maia_voz", {
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({pregunta})
  });

  let data = await res.json();
  alert(data.respuesta);
}

// 💬 CHAT
function abrirChatMAIA(){
  window.location.href = "/maia_chat";
}

// 🔥 MÓDULOS SUPERIORES
function abrirModuloGenerico(modulo){
  window.location.href = `/maia_${modulo}`;
}

// 🔥 MÓDULOS INTERNOS (CLAVE)
async function cargarModuloExtra(modulo, titulo){
  const cont = document.getElementById("contenidoDrone");

  cont.innerHTML = `Cargando ${titulo}...`;

  try{
    let r = await fetch(`/maia_${modulo}`);
    let html = await r.text();

    cont.innerHTML = `<h3>${titulo}</h3>` + html;

  }catch(e){
    cont.innerHTML = `Error cargando ${titulo}`;
  }
}

</script>

{% endblock %}
