<!DOCTYPE html>
<html>
<head>
    <title>MAIA SIMULADOR ORO</title>

    <style>
        body { margin:0; overflow:hidden; background:black; font-family:Arial; }

        #panel {
            position:absolute;
            top:10px;
            left:10px;
            background:rgba(0,0,0,0.7);
            padding:10px;
            border-radius:10px;
            color:white;
        }

        select, button {
            margin-top:5px;
            width:200px;
        }
    </style>
</head>
<body>

<div id="panel">
    <h3>🧠 MAIA CORE</h3>

    <label>Tipo de Drone</label><br>
    <select id="categoria">
        <option value="todos">Todos</option>
        <option value="comercial">Comercial</option>
        <option value="industrial">Industrial</option>
        <option value="militar">Militar</option>
    </select>

    <br>

    <label>Drone Aprobado</label><br>
    <select id="droneSelect"></select>

    <br>

    <button onclick="cargarDrone()">🚀 Cargar Software</button>

    <hr>

    <button onclick="cambiarEscenario('ciudad')">🌆 Ciudad</button>
    <button onclick="cambiarEscenario('oceano')">🌊 Océano</button>

    <p id="estado"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// =======================
// ESCENA
// =======================
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// =======================
// LUZ
// =======================
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// =======================
// DRONE
// =======================
let drone = new THREE.Mesh(
    new THREE.BoxGeometry(1,0.3,1),
    new THREE.MeshStandardMaterial({color:0xffffff})
);

drone.position.y = 5;
scene.add(drone);

// =======================
// VARIABLES
// =======================
let keys = {};
let dronesAprobados = [];
let comportamiento = "normal";

// =======================
// CONTROLES
// =======================
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// =======================
// CARGAR DRONES DESDE FLASK
// =======================
async function cargarLista() {
    let res = await fetch("/maia_drones_aprobados");
    dronesAprobados = await res.json();

    let select = document.getElementById("droneSelect");
    select.innerHTML = "";

    dronesAprobados.forEach(d => {
        let op = document.createElement("option");
        op.value = d.nombre;
        op.textContent = d.nombre;
        select.appendChild(op);
    });
}

cargarLista();

// =======================
// CARGAR SOFTWARE MAIA
// =======================
function cargarDrone() {
    let nombre = document.getElementById("droneSelect").value;

    if (nombre.includes("Incendios")) comportamiento = "incendio";
    else if (nombre.includes("Vigilancia")) comportamiento = "vigilancia";
    else if (nombre.includes("Ríos")) comportamiento = "agua";
    else comportamiento = "normal";

    document.getElementById("estado").innerText = "Software cargado: " + nombre;
}

// =======================
// ESCENARIOS
// =======================
function limpiarEscena() {
    while(scene.children.length > 0) scene.remove(scene.children[0]);
    scene.add(light);
    scene.add(drone);
}

function cambiarEscenario(tipo) {
    limpiarEscena();

    if (tipo === "ciudad") {
        for (let i=0;i<60;i++) {
            let b = new THREE.Mesh(
                new THREE.BoxGeometry(2,Math.random()*10+2,2),
                new THREE.MeshStandardMaterial({color:0x555555})
            );
            b.position.set(Math.random()*100-50, b.geometry.parameters.height/2, Math.random()*100-50);
            scene.add(b);
        }
    }

    if (tipo === "oceano") {
        let agua = new THREE.Mesh(
            new THREE.PlaneGeometry(200,200),
            new THREE.MeshStandardMaterial({color:0x0044ff})
        );
        agua.rotation.x = -Math.PI/2;
        scene.add(agua);
    }
}

// =======================
// IA DEL DRONE
// =======================
function comportamientoDrone() {
    if (comportamiento === "incendio") {
        drone.material.color.set(0xff0000);
    }
    if (comportamiento === "vigilancia") {
        drone.material.color.set(0xffff00);
    }
    if (comportamiento === "agua") {
        drone.material.color.set(0x00ffff);
    }
}

// =======================
// MOVIMIENTO
// =======================
function mover() {
    let speed = 0.2;

    if (keys["w"]) drone.position.z -= speed;
    if (keys["s"]) drone.position.z += speed;
    if (keys["a"]) drone.position.x -= speed;
    if (keys["d"]) drone.position.x += speed;
    if (keys["q"]) drone.position.y += speed;
    if (keys["e"]) drone.position.y -= speed;
}

// =======================
// CAMARA
// =======================
function camara() {
    camera.position.x = drone.position.x + 5;
    camera.position.y = drone.position.y + 5;
    camera.position.z = drone.position.z + 10;

    camera.lookAt(drone.position);
}

// =======================
// LOOP
// =======================
function animate() {
    requestAnimationFrame(animate);

    mover();
    camara();
    comportamientoDrone();

    renderer.render(scene, camera);
}

camera.position.z = 10;
animate();
</script>

</body>
</html>
