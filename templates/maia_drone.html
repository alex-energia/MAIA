<!DOCTYPE html>
<html>

<head>

<title>MAIA Drone Lab</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:40px;
}

#drones{
margin-top:40px;
display:flex;
flex-direction:column;
gap:20px;
align-items:center;
}

.drone-card{
background:#1e293b;
padding:20px;
width:350px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.drone-card:hover{
background:#334155;
}

#mensaje{
margin-top:30px;
color:#94a3b8;
}

button{
margin-top:20px;
padding:10px 20px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#16a34a;
}

#top-buttons{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
margin-top:20px;
}

</style>

</head>

<body>

<h1>🚁 MAIA Industrial Drone Lab</h1>

<div id="top-buttons">

<button onclick="cargarDrones()">
Actualizar drones
</button>

<button onclick="abrirInventor()">
🤖 MAIA Drone Inventor
</button>

</div>

<div id="mensaje">Cargando drones...</div>

<div id="drones"></div>

<script>

function abrirInventor(){

window.location="/maia_drone_inventor"

}

async function cargarDrones(){

const container = document.getElementById("drones")
const mensaje = document.getElementById("mensaje")

container.innerHTML=""
mensaje.innerHTML="Cargando drones..."

try{

let r = await fetch("/maia_drones_aprobados")

let drones = await r.json()

if(!drones || drones.length === 0){

mensaje.innerHTML="No hay drones industriales aprobados aún."

return

}

mensaje.innerHTML=""

drones.forEach(d => {

let card = document.createElement("div")

card.className="drone-card"

card.innerHTML = `
<h3>${d.nombre}</h3>
<p>Click para abrir módulo</p>
`

card.onclick = () => {

window.location = d.ruta

}

container.appendChild(card)

})

}

catch(error){

mensaje.innerHTML="Error conectando con MAIA."

console.error(error)

}

}

cargarDrones()

</script>

</body>

</html>
