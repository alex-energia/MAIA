<!DOCTYPE html>
<html>
<head>
<title>MAIA INDUSTRIAL</title>

<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>

<style>
body{font-family:Consolas;background:#0a0f1f;color:#e5e7eb;}
textarea{width:100%;height:80px;background:#020617;color:white;border:1px solid #1e293b;}

button{padding:10px;margin:5px;background:#2563eb;color:white;border:none;cursor:pointer;}
.btn-danger{background:#ef4444;}
.btn-info{background:#0ea5e9;}

.global-ui{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;}
.btn-ia{background:#111827;border:2px solid #ef4444;border-radius:50%;width:50px;height:50px;}
.btn-ia.active{background:#ef4444;box-shadow:0 0 15px red;}
.btn-chat{background:#22c55e;border-radius:50%;width:50px;height:50px;}

.bloque{background:#020617;margin-top:15px;padding:15px;border-left:4px solid #22c55e;}
.scroll{max-height:400px;overflow:auto;}

#chatBox{position:fixed;bottom:20px;right:90px;width:320px;height:420px;background:#020617;border:1px solid #22c55e;display:none;flex-direction:column;}
#chatMessages{flex:1;overflow:auto;padding:10px;}
#chatInput{background:#000;color:white;border:none;padding:10px;}

#viewer3d{height:320px;}
</style>
</head>

<body>

<h1>🧠 MAIA INDUSTRIAL</h1>

<textarea id="idea"></textarea>

<br>
<button onclick="evaluar()">🚀 Generar</button>
<button class="btn-danger" onclick="limpiarUI()">🧹 Limpiar</button>
<button class="btn-info" onclick="abrirInfo()">🧠 Capacidades</button>

<div id="resultado"></div>

<!-- BOTONES -->
<div class="global-ui">
<button id="btnVoice" class="btn-ia" onclick="toggleVoice()">🎤</button>
<button class="btn-chat" onclick="toggleChat()">➕</button>
</div>

<!-- CHAT -->
<div id="chatBox">
<div id="chatMessages"></div>
<input id="chatInput" placeholder="Pregunta a MAIA..." onkeydown="if(event.key==='Enter')enviarChat()">
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<div id="capacidades"></div>
</div>
</div>

<script>

/* ========================= ESTADO ========================= */
let vozActiva = false;
let recognition = null;
let ultimoResultado = null;

/* ========================= HABLAR ========================= */
function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-ES";
    msg.pitch = 1;
    msg.rate = 1;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* ========================= VOZ CONTINUA ========================= */
function iniciarEscucha(){
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "es-ES";
    recognition.continuous = true;

    recognition.onresult = function(event){
        let texto = event.results[event.results.length-1][0].transcript;
        procesarVoz(texto);
    };

    recognition.onend = function(){
        if(vozActiva) recognition.start();
    };

    recognition.start();
}

/* ========================= PROCESAR VOZ ========================= */
function procesarVoz(texto){
    let respuesta = generarRespuesta(texto);

    let cont = document.getElementById("chatMessages");
    cont.innerHTML += `<div>🎤 ${texto}</div>`;
    cont.innerHTML += `<div>🤖 ${respuesta}</div>`;

    hablar(respuesta);
}

/* ========================= TOGGLE VOZ ========================= */
function toggleVoice(){
    vozActiva = !vozActiva;
    let btn = document.getElementById("btnVoice");

    if(vozActiva){
        btn.classList.add("active");
        hablar("Hola Alex, soy MAIA. Sistema activado.");
        iniciarEscucha();
    }else{
        btn.classList.remove("active");
        if(recognition) recognition.stop();
        speechSynthesis.cancel();
    }
}

/* ========================= CHAT ========================= */
function toggleChat(){
    let box = document.getElementById("chatBox");
    box.style.display = box.style.display==="flex"?"none":"flex";
}

function enviarChat(){
    let input = document.getElementById("chatInput");
    let msg = input.value;
    if(!msg) return;

    let cont = document.getElementById("chatMessages");
    cont.innerHTML += `<div>🧑 ${msg}</div>`;

    let respuesta = generarRespuesta(msg);

    cont.innerHTML += `<div>🤖 ${respuesta}</div>`;

    input.value="";
}

/* ========================= IA ========================= */
function generarRespuesta(msg){
    msg = msg.toLowerCase();

    if(!ultimoResultado){
        return "Primero genera un drone.";
    }

    if(msg.includes("hardware")){
        return "Hardware: " + JSON.stringify(ultimoResultado.hardware);
    }

    if(msg.includes("software")){
        return "Software con MAVLink, control PID y navegación autónoma.";
    }

    if(msg.includes("riesgo")){
        return "Riesgos: " + JSON.stringify(ultimoResultado.riesgos);
    }

    if(msg.includes("finanza")){
        return "Puede generar ingresos en vigilancia, agricultura o inspección.";
    }

    if(msg.includes("energia")){
        return "Compatible con energía solar e híbrida.";
    }

    return "Puedo analizar hardware, software, riesgos y negocio del drone.";
}

/* ========================= MOTOR ========================= */
async function evaluar(){
    let idea=document.getElementById("idea").value;
    if(!idea){alert("Ingresa una idea");return;}

    let paso=0,data={};

    while(true){
        let res=await fetch("/maia_step",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({idea,paso,data})
        });

        let json=await res.json();

        if(json.final){
            ultimoResultado = json.resultado;
            render(json.resultado);
            actualizarCapacidades();
            if(vozActiva) hablar("Análisis completado");
            return;
        }

        paso=json.paso;
        data=json.data;
    }
}

/* ========================= RENDER ORIGINAL (RESPETADO) ========================= */
function render(data){
    let html="";
    html+=bloque("🧠 Viabilidad",data.viabilidad);
    html+=bloque("🔩 Hardware",data.hardware,true);
    html+=bloque("📡 Telemetría",data.telemetria,true);
    html+=bloque("⚙️ Física",data.fisica,true);
    html+=bloque("⚠️ Riesgos",data.riesgos,true);
    html+=`<div class="bloque"><h3>🧱 Modelo 3D</h3><div id="viewer3d"></div></div>`;
    document.getElementById("resultado").innerHTML=html;
    iniciar3D();
}

function bloque(t,d){
    if(!d) return "";
    return `<div class="bloque"><h3>${t}</h3><div class="scroll">${renderTree(d)}</div></div>`;
}

function renderTree(obj){
    let html="";
    for(let k in obj){
        let v=obj[k];
        if(typeof v==="object"){
            html+=`<div class="folder">${k}</div>`;
            html+=renderTree(v);
        }else{
            html+=`<div class="file">${k}: ${v}</div>`;
        }
    }
    return html;
}

/* ========================= 3D ========================= */
function iniciar3D(){
    let c=document.getElementById("viewer3d");
    let scene=new THREE.Scene();
    let camera=new THREE.PerspectiveCamera(75,c.clientWidth/320,0.1,1000);
    let renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(c.clientWidth,320);
    c.innerHTML="";
    c.appendChild(renderer.domElement);

    let light=new THREE.DirectionalLight(0xffffff,1);
    light.position.set(5,5,5);
    scene.add(light);

    let mat=new THREE.MeshStandardMaterial({color:0x00ffcc});
    let body=new THREE.Mesh(new THREE.BoxGeometry(2,0.5,2),mat);
    scene.add(body);

    camera.position.z=6;

    function animate(){
        requestAnimationFrame(animate);
        scene.rotation.y+=0.01;
        renderer.render(scene,camera);
    }
    animate();
}

/* ========================= UI ========================= */
function limpiarUI(){
    document.getElementById("idea").value="";
    document.getElementById("resultado").innerHTML="";
}

/* ========================= MODAL ========================= */
function abrirInfo(){
    document.getElementById("modal").style.display="block";
}
function cerrarInfo(){
    document.getElementById("modal").style.display="none";
}

/* ========================= CAPACIDADES NIVEL 12 ========================= */
function actualizarCapacidades(){
document.getElementById("capacidades").innerHTML=`
<h2>🔥 MAIA NIVEL 12</h2>

<h3>🧠 INTELIGENCIA</h3>
<p>MAIA analiza sistemas completos y responde en tiempo real.</p>

<h3>🎤 VOZ</h3>
<p>Interacción continua bidireccional por voz.</p>

<h3>➕ CHAT</h3>
<p>Asistente experto multi-industria.</p>

<h3>⚙️ SISTEMA</h3>
<p>Arquitectura industrial funcional y escalable.</p>
`;
}

</script>

</body>
</html>
