<!DOCTYPE html>
<html>
<head>
    <title>MAIA INVENT</title>
</head>
<body>

<h1>🧠 MAIA INVENT</h1>
<p>Generador autónomo de drones disruptivos</p>

<button onclick="generar()">🚀 Generar Drone</button>

<h2 id="nombre"></h2>

<p id="intro"></p>
<p id="viabilidad"></p>

<h3>🧠 Software</h3>
<ul id="software"></ul>

<h3>⚙️ Hardware</h3>
<ul id="hardware"></ul>

<script>
function generar() {
    fetch("/generar_drone_maia")
    .then(res => res.json())
    .then(data => {

        document.getElementById("nombre").innerText = data.nombre;
        document.getElementById("intro").innerText = data.introduccion;
        document.getElementById("viabilidad").innerText = data.viabilidad;

        let soft = "";
        data.software.forEach(s => {
            soft += "<li>" + s + "</li>";
        });
        document.getElementById("software").innerHTML = soft;

        let hard = "";
        data.hardware.forEach(h => {
            hard += "<li>" + h + "</li>";
        });
        document.getElementById("hardware").innerHTML = hard;
    });
}
</script>

</body>
</html>
