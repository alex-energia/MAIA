<!DOCTYPE html>
<html>
<head>
    <title>MAIA INVENT</title>

    <style>
        body {
            background: #0b0b0b;
            color: #00ffcc;
            font-family: Arial;
        }

        textarea {
            width: 300px;
            height: 80px;
            background: black;
            color: #00ffcc;
            border: 1px solid #00ffcc;
        }

        button {
            background: #111;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 8px;
            margin: 5px;
            cursor: pointer;
        }

        #barra {
            width: 100%;
            background: #111;
            border: 1px solid #00ffcc;
        }

        #progreso {
            width: 0%;
            height: 20px;
            background: #00ffcc;
        }

        #panel_maia {
            display: none;
            background: black;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #00ffcc;
        }
    </style>

</head>

<body>

<h1>🧠 MAIA INVENT</h1>
<p>Generador autónomo de drones disruptivos</p>

<!-- 🔥 INPUT NUEVO -->
<textarea id="idea" placeholder="Ej: dron para incendios, vigilancia, mineria..."></textarea><br>

<button onclick="generarDrone()">🚀 Generar Drone</button>
<button onclick="limpiar()">🧹 Limpiar</button>

<!-- 🔥 BOTÓN NUEVO -->
<button onclick="togglePanel()">⚡ ¿Qué puede hacer MAIA?</button>

<!-- 🔥 BARRA PROGRESO -->
<div id="barra">
    <div id="progreso"></div>
</div>
<p id="estado"></p>

<hr>

<h2 id="nombre"></h2>
<p id="intro"></p>
<p id="viabilidad"></p>

<h3>🧠 Software</h3>
<ul id="software"></ul>

<h3>⚙️ Hardware</h3>
<ul id="hardware"></ul>

<hr>

<!-- 🔥 PANEL DINÁMICO -->
<div id="panel_maia">
    <h2>🔥 Capacidades MAIA (Fase Actual)</h2>
    <ul id="lista_capacidades"></ul>
</div>

<hr>

<h3>💾 Guardar Proyecto</h3>

<select id="categoria">
    <option value="">Seleccionar tipo</option>
    <option value="comercial">Comercial</option>
    <option value="industrial">Industrial</option>
    <option value="militar">Militar</option>
</select>

<br><br>

<button onclick="guardar()">💾 Guardar Drone</button>
<p id="estado_guardado"></p>

<script>

// =========================
// 🧠 MEMORIA
// =========================
let droneActual = null;
let historial = new Set();

if (localStorage.getItem("drones_generados")) {
    historial = new Set(JSON.parse(localStorage.getItem("drones_generados")));
}

// =========================
// 🚀 GENERAR (AHORA REAL)
// =========================
async function generarDrone() {

    let idea = document.getElementById("idea").value;

    if (!idea || idea.length < 3) {
        alert("Escribe una idea primero");
        return;
    }

    document.getElementById("estado").innerText = "🧠 MAIA trabajando...";

    await fetch("/evaluar_drone", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({idea: idea})
    });

    escucharProgreso();
}

// =========================
// 📊 PROGRESO EN VIVO
// =========================
function escucharProgreso() {

    let intervalo = setInterval(async () => {

        let res = await fetch("/maia_progreso");
        let data = await res.json();

        document.getElementById("progreso").style.width = data.progreso + "%";
        document.getElementById("estado").innerText = data.mensaje;

        if (data.estado === "COMPLETADO") {
            clearInterval(intervalo);
            cargarResultado();
        }

    }, 500);
}

// =========================
// 📦 RESULTADO
// =========================
async function cargarResultado() {

    let res = await fetch("/maia_resultado");
    let data = await res.json();

    droneActual = data;

    document.getElementById("nombre").innerText = "Drone generado";
    document.getElementById("intro").innerText = "Sistema autónomo generado por MAIA";
    document.getElementById("viabilidad").innerText = data.viabilidad;

    let sw = document.getElementById("software");
    let hw = document.getElementById("hardware");

    sw.innerHTML = "";
    hw.innerHTML = "";

    if (data.analisis) {
        sw.innerHTML += "<li>Peso: " + data.analisis.peso + "</li>";
    }

    if (data.software_generado) {
        sw.innerHTML += "<li>Proyecto: " + data.software_generado + "</li>";
    }
}

// =========================
// ⚡ PANEL MAIA
// =========================
function togglePanel() {

    let panel = document.getElementById("panel_maia");

    if (panel.style.display === "none") {
        panel.style.display = "block";
        cargarCapacidades();
    } else {
        panel.style.display = "none";
    }
}

function cargarCapacidades() {

    let lista = document.getElementById("lista_capacidades");

    lista.innerHTML = `
        <li>✔ Generación automática de drones</li>
        <li>✔ Construcción de software real</li>
        <li>✔ Validación automática de código</li>
        <li>✔ Simulación física básica</li>
        <li>✔ Exportación en ZIP</li>
        <li>✔ Sistema anti-errores</li>
        <li>✔ Arquitectura escalable</li>
    `;
}

// =========================
// 🧹 LIMPIAR
// =========================
function limpiar() {
    location.reload();
}

// =========================
// 💾 GUARDAR
// =========================
async function guardar() {

    if (!droneActual) {
        alert("Primero genera un drone");
        return;
    }

    let categoria = document.getElementById("categoria").value;

    if (!categoria) {
        alert("Selecciona categoría");
        return;
    }

    await fetch("/guardar_proyecto", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nombre: "Drone MAIA",
            tecnologia: categoria
        })
    });

    document.getElementById("estado_guardado").innerText = "✅ Guardado correctamente";
}

</script>

</body>
</html>
