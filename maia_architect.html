    let resultado = `

    - GPS<br>
    - Batería LiPo<br><br>

    <b>Software:</b><br>

    - Sistema de control autónomo<br><br>

    <b>Arquitectura:</b><br>
    - Sistema distribuido<br>
    - Coordinación en enjambre

    document.getElementById("output").innerHTML = resultado;
}
</script>
