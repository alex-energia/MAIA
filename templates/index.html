{% extends "base_maia.html" %}
{% block content %}

<style>
/* TODO TU CSS ORIGINAL SIN CAMBIOS */
body{
 margin:0;
 font-family:Arial;
 background:#1e1e1e;
 color:white;
}
.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:15px 25px;
 background:#111;
}
.topbar-buttons button{
 margin-left:10px;
 padding:8px 15px;
 border-radius:8px;
 border:none;
 cursor:pointer;
 background:#2563eb;
 color:white;
}
.container{
 padding:20px;
}
.chat-box{
 height:60vh;
 overflow-y:auto;
 background:#2a2a2a;
 padding:15px;
 border-radius:12px;
}
.input-area{
 margin-top:15px;
 display:flex;
 gap:10px;
}
input[type="text"]{
 flex:1;
 padding:12px;
 border-radius:10px;
 border:none;
}
button.send{
 padding:12px 20px;
 border-radius:10px;
 border:none;
 background:#2563eb;
 color:white;
 cursor:pointer;
}
.hidden{display:none;}
.drone-botones{
 display:flex;
 gap:20px;
 flex-wrap:wrap;
 margin-top:20px;
}
.drone-botones button{
 padding:15px;
 border-radius:10px;
 border:none;
 cursor:pointer;
 color:white;
 font-size:15px;
}
.modulo-extra{
 margin-top:30px;
 display:flex;
 flex-wrap:wrap;
 gap:15px;
}
.modulo-extra button{
 flex:1;
 min-width:150px;
 padding:15px;
 border-radius:10px;
 border:none;
 cursor:pointer;
 background:#10b981;
 color:white;
 font-weight:bold;
}
.modulo-extra button:hover{
 background:#059669;
}
</style>

<div class="topbar">
  <h2>🤖 MAIA IA</h2>
  <div class="topbar-buttons">
    <button onclick="activarDrone()">🚁</button>
  </div>
</div>

<div class="container">

<!-- DRONE -->
<div id="moduloDrone">
  <h3>🚁 MAIA DRONE</h3>

  <textarea id="idea" placeholder="Escribe idea..."></textarea><br>

  <button onclick="generarDroneUI()">🚀 Generar</button>

  <!-- 🔥 BARRA -->
  <div style="width:100%;background:#111;margin-top:10px;">
    <div id="barraProgreso" style="height:20px;width:0%;background:#00ffcc;"></div>
  </div>

  <p id="estadoTexto"></p>

  <!-- 🔥 RESULTADO (NUEVO, NO ROMPE NADA) -->
  <div id="resultadoMAIA"></div>

</div>
</div>

<script>

// 🔥 ERROR GLOBAL
window.onerror = function(msg, url, line){
  console.error("💥 JS ERROR:", msg, line);
};

// =========================
// 🚀 GENERAR DRONE
// =========================
async function generarDroneUI(){

  let idea = document.getElementById("idea").value;

  if(!idea){
    alert("Escribe algo");
    return;
  }

  console.log("🚀 Lanzando proceso");

  document.getElementById("barraProgreso").style.width = "5%";
  document.getElementById("estadoTexto").innerText = "Iniciando...";
  document.getElementById("resultadoMAIA").innerHTML = ""; // 🔥 limpia anterior

  await fetch("/evaluar_drone", {
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({ idea })
  });

  iniciarMonitoreo();
}

// =========================
// 📊 MONITOREO
// =========================
function iniciarMonitoreo(){

  console.log("📡 MONITOREO ACTIVO");

  let intervalo = setInterval(async ()=>{

    try{

      let res = await fetch("/maia_progreso");
      let data = await res.json();

      console.log("📊 PROGRESO:", data);

      document.getElementById("barraProgreso").style.width = data.progreso + "%";
      document.getElementById("estadoTexto").innerText = data.mensaje;

      if(data.progreso >= 100){

        clearInterval(intervalo);
        console.log("✅ TERMINADO");

        // 🔥 CLAVE: CARGAR RESULTADO REAL
        cargarResultadoMAIA();
      }

    }catch(e){
      console.log("❌ Error monitoreo");
      clearInterval(intervalo);
    }

  }, 800);
}

// =========================
// 🧠 RESULTADO MAIA (NUEVO)
// =========================
async function cargarResultadoMAIA(){

  try{

    let r = await fetch("/maia_resultado");
    let data = await r.json();

    console.log("🧠 RESULTADO:", data);

    if(!data || !data.viabilidad){
      document.getElementById("resultadoMAIA").innerHTML =
        "<p>⚠️ Sin resultado aún</p>";
      return;
    }

    document.getElementById("resultadoMAIA").innerHTML = `
      <div style="margin-top:20px; padding:15px; background:#111; border-radius:10px;">
        <h3>🧠 Resultado MAIA</h3>

        <p><b>Viabilidad:</b> ${data.viabilidad}</p>
        <p><b>Tipo:</b> ${data.analisis?.tipo}</p>
        <p><b>Peso:</b> ${data.analisis?.peso} kg</p>

        <h4>💻 Software</h4>
        <pre style="max-height:200px; overflow:auto;">
${data.salida}
        </pre>

        <br>
        <button onclick="window.location.href='/descargar_proyecto'">
          ⬇️ Descargar Proyecto
        </button>
      </div>
    `;

  }catch(e){
    console.error("❌ Error cargando resultado:", e);
  }
}

// =========================
// 🚁 DRONE
// =========================
function activarDrone(){
  console.log("🚁 Drone activo");
}

</script>

{% endblock %}
