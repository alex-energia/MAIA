{% extends "base_maia.html" %}
{% block content %}
<style>
body{ margin:0; font-family:Arial; background:#1e1e1e; color:white;}
.topbar{ display:flex; justify-content:space-between; align-items:center; padding:15px 25px; background:#111;}
.topbar-buttons button{ margin-left:10px; padding:8px 15px; border-radius:8px; border:none; cursor:pointer; background:#2563eb; color:white;}
.container{ padding:20px;}
.chat-box{ height:60vh; overflow-y:auto; background:#2a2a2a; padding:15px; border-radius:12px;}
.input-area{ margin-top:15px; display:flex; gap:10px;}
input[type="text"]{ flex:1; padding:12px; border-radius:10px; border:none;}
button.send{ padding:12px 20px; border-radius:10px; border:none; background:#2563eb; color:white; cursor:pointer;}
.hidden{display:none;}
.drone-botones{ display:flex; gap:20px; flex-wrap:wrap; margin-top:20px;}
.drone-botones button{ padding:15px; border-radius:10px; border:none; cursor:pointer; color:white; font-size:15px;}
.modulo-extra{ margin-top:30px; display:flex; flex-wrap:wrap; gap:15px; }
.modulo-extra button{ flex:1; min-width:150px; padding:15px; border-radius:10px; border:none; cursor:pointer; background:#10b981; color:white; font-weight:bold; }
.modulo-extra button:hover{ background:#059669; }
.boton-voz{ background:red; color:white; padding:10px 15px; border-radius:50%; font-weight:bold; border:none; cursor:pointer; margin-left:10px;}
.boton-plus{ background:#2563eb; color:white; padding:10px 15px; border-radius:50%; border:none; cursor:pointer; font-weight:bold; margin-left:10px;}
.card{ background: rgba(0,0,0,0.6); padding:20px; border-radius:10px; margin-top:20px; box-shadow: 0 0 15px rgba(0,255,213,0.3);}
ul{ line-height:1.8;}
.badge{ background:#00ffd5; color:black; padding:5px 10px; border-radius:5px; font-weight:bold;}
.boton-modulo{ background:#00ffd5; border:none; padding:12px; width:100%; font-weight:bold; cursor:pointer; margin-top:15px;}
.boton-modulo:hover{ background:#00bfa6;}
</style>

<div class="topbar">
  <h2>🤖 MAIA IA</h2>
  <div class="topbar-buttons">
    <button onclick="abrirModuloGenerico('ganado','🐄 Ganado')">🐄</button>
    <button onclick="abrirModuloGenerico('plantas','🌿 Plantas')">🌿</button>
    <button onclick="abrirModuloGenerico('traductor','🌍 Traductor')">🌍</button>
    <button onclick="abrirModuloGenerico('proyectos','📁 Proyectos')">📁</button>
    <button onclick="activarDrone()">🚁</button>
    <button onclick="volverChat()">🏠</button>
    <button class="boton-voz" onclick="activarVoz()">🎤</button>
    <button class="boton-plus" onclick="abrirPlus()">+</button>
  </div>
</div>

<div class="container">
  <!-- CHAT -->
  <div id="chatNormal">
    <div id="chatBox" class="chat-box"></div>
    <div class="input-area">
      <input type="text" id="mensaje">
      <button class="send">Enviar</button>
    </div>
  </div>

  <!-- DRONE Y MODULOS -->
  <div id="moduloDrone" class="hidden">
    <h3>🚁 MAIA DRONE</h3>
    <div class="chat-box">
      <div class="drone-botones">
        <button onclick="dronesComerciales()">🛩️ Comerciales</button>
        <button onclick="dronesIndustriales()">🏭 Industriales</button>
        <button onclick="dronesMilitares()">🛡️ Militares</button>
      </div>
      <div id="contenidoDrone" style="margin-top:20px"></div>

      <div class="modulo-extra">
        <button onclick="cargarModulo('simulador','🕹️ Simulador')">🕹️ Simulador</button>
        <button onclick="cargarModulo('invent','💡 Invent')">💡 Invent</button>
        <button onclick="cargarModulo('lab','🧪 Lab')">🧪 Lab</button>
        <button onclick="cargarModulo('architect','🏗️ Architect')">🏗️ Architect</button>
      </div>
    </div>
  </div>
</div>

<script>
// =========================
// NAVEGACIÓN
// =========================
function ocultarTodo(){
  document.getElementById("chatNormal").classList.add("hidden");
  document.getElementById("moduloDrone").classList.add("hidden");
}
function volverChat(){
  ocultarTodo();
  document.getElementById("chatNormal").classList.remove("hidden");
}

// =========================
// DRONE
// =========================
function activarDrone(){
  ocultarTodo();
  document.getElementById("moduloDrone").classList.remove("hidden");
  mostrarDronAsistenteMAIA();
}

// =========================
// BOTONES VOZ Y +
function activarVoz(){
  let pregunta = prompt("🗣️ Habla con MAIA (simulación de voz):");
  if(pregunta) alert("MAIA responde: Esto es un ejemplo de respuesta de voz.");
}
function abrirPlus(){
  alert("Menú +: funciones extra en construcción");
}

// =========================
// DRONES DINÁMICOS
async function cargarDronesPorCategoria(categoria, titulo){
  const cont = document.getElementById("contenidoDrone");
  cont.innerHTML = `Cargando ${titulo}...`;
  try {
    let r = await fetch(`/maia_drones_aprobados?categoria=${categoria}`);
    let drones = await r.json();
    if(drones.length === 0){
      cont.innerHTML = `<h3>${titulo}</h3><p>No hay drones aprobados en esta categoría.</p>`;
      return;
    }
    let html = `<h3>${titulo}</h3>`;
    drones.forEach(d=>{
      // Integrar Dron Asistente MAIA
      if(d.nombre.toLowerCase().includes("smartphone")){
        html += dronAsistenteHTML();
      } else {
        html += `<div style="margin-bottom:15px;">
                  🚁 <b>${d.nombre}</b><br>
                  <button onclick="window.location.href='${d.ruta}'">Abrir</button>
                 </div>`;
      }
    });
    cont.innerHTML = html;
  } catch(e){
    cont.innerHTML = `Error cargando ${titulo}`;
    console.error(e);
  }
}
function dronesComerciales(){ cargarDronesPorCategoria("comercial","🛩️ Comerciales") }
function dronesIndustriales(){ cargarDronesPorCategoria("industrial","🏭 Industriales") }
function dronesMilitares(){ cargarDronesPorCategoria("militar","🛡️ Militares") }

// =========================
// MÓDULOS EXTRA SPA
async function cargarModulo(modulo, titulo){
  const cont = document.getElementById("contenidoDrone");
  cont.innerHTML = `Cargando ${titulo}...`;
  try {
    let r = await fetch(`/maia_${modulo}`);
    let html = await r.text();
    cont.innerHTML = `<h3>${titulo}</h3>` + html;
  } catch(e){
    cont.innerHTML = `Error cargando ${titulo}`;
    console.error(e);
  }
}

// =========================
// BOTONES SUPERIORES (GANADO, PLANTAS, TRADUCTOR, PROYECTOS)
function abrirModuloGenerico(modulo, titulo){
  activarDrone();
  const cont = document.getElementById("contenidoDrone");
  cont.innerHTML = `<h3>${titulo}</h3><p>Contenido de ${titulo} en construcción.</p>`;
}

// =========================
// DRON ASISTENTE MAIA
function mostrarDronAsistenteMAIA(){
  const cont = document.getElementById("contenidoDrone");
  cont.innerHTML = dronAsistenteHTML();
}
function dronAsistenteHTML(){
  return `
    <div class="card">
      <span class="badge">Drone Comercial</span>
      <h2>🚀 Introducción</h2>
      <p>El Mini Drone Asistente MAIA es un drone inteligente diseñado para interacción avanzada, captura de imágenes y control remoto mediante IA integrada.</p>
      <h3>📊 Viabilidad</h3>
      <p>Ideal para proyectos educativos, comerciales y demostraciones tecnológicas; fácil de operar y con gran estabilidad.</p>
    </div>
    <div class="card">
      <h2>🧠 Software</h2>
      <ul>
        <li>Control por app smartphone</li>
        <li>Reconocimiento de voz integrado</li>
        <li>Modos de vuelo autónomo</li>
        <li>Grabación y transmisión de video en tiempo real</li>
      </ul>
    </div>
    <div class="card">
      <h2>⚙️ Hardware</h2>
      <ul>
        <li>Mini cámara HD con estabilización</li>
        <li>Motor brushless silencioso</li>
        <li>Batería de larga duración</li>
        <li>LED de señalización</li>
      </ul>
    </div>
    <div class="card">
      <h2>💡 Modos de Uso</h2>
      <ul>
        <li>📸 Selfie aéreo automático</li>
        <li>🎥 Grabación de video inteligente</li>
        <li>🔦 Iluminación portátil</li>
        <li>🛡️ Seguridad personal</li>
        <li>🚁 Exploración en espacios reducidos</li>
      </ul>
    </div>
    <div class="card">
      <h2>⚡ Activar Demo</h2>
      <button class="boton-modulo" onclick="activarDemo()">🚀 Desplegar Drone</button>
      <p id="demo"></p>
    </div>
  `;
}
function activarDemo(){
  document.getElementById("demo").innerText =
    "🚁 Drone desplegado desde el smartphone... estabilizando... conectando cámara... listo para operar.";
}
</script>
{% endblock %}
