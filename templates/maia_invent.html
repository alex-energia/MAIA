<!DOCTYPE html>
<html>
<head>
<title>MAIA INVENT</title>

<style>
body {
    background: #0b0b0b;
    color: #00ffcc;
    font-family: Arial;
}
textarea {
    width: 300px;
    height: 80px;
    background: black;
    color: #00ffcc;
    border: 1px solid #00ffcc;
}
button {
    background: #111;
    color: #00ffcc;
    border: 1px solid #00ffcc;
    padding: 8px;
    margin: 5px;
    cursor: pointer;
}
#barra {
    width: 100%;
    background: #111;
    border: 1px solid #00ffcc;
}
#progreso {
    width: 0%;
    height: 20px;
    background: #00ffcc;
    transition: width 0.5s;
}
#panel_maia {
    display: none;
    background: black;
    padding: 20px;
    margin-top: 20px;
    border: 1px solid #00ffcc;
}
#error_box {
    color: red;
    margin-top: 10px;
}
pre {
    background: #111;
    border: 1px solid #00ffcc;
    padding: 10px;
    margin-top: 10px;
    white-space: pre-wrap;
}
#capas_estado {
    margin-top: 10px;
    font-size: 14px;
    color: #00ffaa;
}
</style>
</head>

<body>

<h1>🧠 MAIA INVENT</h1>
<p>Generador autónomo de drones disruptivos</p>

<textarea id="idea"></textarea><br>

<button onclick="generarDrone()">🚀 Generar Drone</button>
<button onclick="limpiar()">🧹 Limpiar</button>
<button onclick="togglePanel()">⚡ ¿Qué puede hacer MAIA?</button>

<div id="barra">
    <div id="progreso"></div>
</div>

<p id="estado"></p>
<p id="error_box"></p>
<div id="capas_estado"></div>

<hr>

<h2 id="nombre"></h2>
<p id="viabilidad"></p>

<h3>🧠 Software</h3>
<ul id="software"></ul>

<h3>🖥️ Salida</h3>
<pre id="salida"></pre>

<h3>🐞 Errores</h3>
<ul id="errores"></ul>

<button onclick="descargarZIP()">⬇️ Descargar Proyecto</button>

<hr>

<div id="panel_maia">
    <h2>🔥 Capacidades MAIA</h2>
    <p id="fase"></p>
    <ul id="lista_capacidades"></ul>
</div>

<hr>

<h3>💾 Guardar Proyecto</h3>
<select id="categoria">
<option value="">Seleccionar tipo</option>
<option value="comercial">Comercial</option>
<option value="industrial">Industrial</option>
<option value="militar">Militar</option>
</select>

<button onclick="guardar()">💾 Guardar Drone</button>
<p id="estado_guardado"></p>

<script>

// 🔥 PROTECCIÓN GLOBAL
window.onerror = function(msg, url, line){
    console.error("💥 JS ERROR:", msg, "Línea:", line);
};

// =========================
// VARIABLES
// =========================
let ejecutando = false;
let intervaloGlobal = null;

// =========================
// 🚀 GENERAR DRONE
// =========================
async function generarDrone() {

    console.log("🚀 generarDrone ejecutado");

    if (ejecutando) return;
    ejecutando = true;

    let idea = document.getElementById("idea").value;

    if (!idea || idea.length < 3) {
        alert("Escribe una idea");
        ejecutando = false;
        return;
    }

    limpiarUI();

    setProgreso(5, "🧠 Activando MAIA...");
    setCapas("🟢 Capa 1 → Interfaz activa");

    try {

        let res = await fetch("/evaluar_drone", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({idea})
        });

        if (!res.ok) throw new Error();

        console.log("✅ Backend OK");

        setCapas("🟢 Capa 1 ✔️ | 🔵 Capa 2 → Backend activo");

        monitorearProgreso();

    } catch (e) {
        document.getElementById("error_box").innerText = "❌ Error con MAIA";
        ejecutando = false;
    }
}

// =========================
// 🔥 PROGRESO (FIX REAL)
// =========================
function monitorearProgreso() {

    console.log("📊 Monitoreando...");

    if (intervaloGlobal) clearInterval(intervaloGlobal);

    intervaloGlobal = setInterval(async () => {

        try {

            let res = await fetch("/maia_progreso");
            let data = await res.json();

            console.log("📡", data);

            setProgreso(data.progreso, data.mensaje);

            if (data.progreso >= 40) {
                setCapas("🟢 Capa 1 ✔️ | 🔵 Capa 2 ✔️ | 🔴 Capa 3 → IA ejecutando");
            }

            if (data.progreso >= 100) {

                clearInterval(intervaloGlobal);

                // 🔥 FORZAR ANIMACIÓN FINAL
                setProgreso(100, "✅ Completado");

                setTimeout(() => {
                    cargarResultado();
                }, 500);
            }

        } catch (e) {
            console.log("💥 Error progreso");
            clearInterval(intervaloGlobal);
            ejecutando = false;
        }

    }, 800);
}

// =========================
// 📦 RESULTADO
// =========================
async function cargarResultado() {

    console.log("📦 Resultado...");

    try {

        let res = await fetch("/maia_resultado");
        let data = await res.json();

        console.log("📦", data);

        document.getElementById("nombre").innerText = "🚁 Drone generado";
        document.getElementById("viabilidad").innerText = data.viabilidad || "";

        let sw = document.getElementById("software");
        sw.innerHTML = "";

        if (data.analisis) {
            sw.innerHTML += `<li>Peso: ${data.analisis.peso}</li>`;
            sw.innerHTML += `<li>Tipo: ${data.analisis.tipo}</li>`;
        }

        if (data.software_generado) {
            sw.innerHTML += `<li>Ruta: ${data.software_generado}</li>`;
        }

        document.getElementById("salida").innerText = data.salida || "";

        setCapas("✅ TODAS LAS CAPAS COMPLETADAS");

        ejecutando = false;

    } catch (e) {
        document.getElementById("error_box").innerText = "❌ Error resultado";
        ejecutando = false;
    }
}

// =========================
// ⚡ PANEL (FIX)
// =========================
function togglePanel() {

    console.log("⚡ togglePanel ejecutado");

    let panel = document.getElementById("panel_maia");

    panel.style.display =
        panel.style.display === "block" ? "none" : "block";

    if (panel.style.display === "block") {

        fetch("/maia_capacidades")
        .then(r => r.json())
        .then(data => {

            document.getElementById("fase").innerText =
                "Fase: " + data.fase;

            let lista = document.getElementById("lista_capacidades");
            lista.innerHTML = "";

            data.capacidades.forEach(c => {
                let li = document.createElement("li");
                li.innerText = c;
                lista.appendChild(li);
            });

        })
        .catch(() => {
            document.getElementById("fase").innerText = "Error cargando capacidades";
        });
    }
}

// =========================
// 🧹 LIMPIAR
// =========================
function limpiar() {
    if (intervaloGlobal) clearInterval(intervaloGlobal);
    ejecutando = false;
    document.getElementById("idea").value = "";
    limpiarUI();
}

// =========================
// 🔥 UTILIDADES CLAVE
// =========================
function setProgreso(valor, mensaje) {
    let barra = document.getElementById("progreso");
    barra.style.width = valor + "%";

    // 🔥 FORZAR REPAINT (CLAVE)
    barra.offsetHeight;

    document.getElementById("estado").innerText = mensaje;
}

function setCapas(texto) {
    document.getElementById("capas_estado").innerHTML = texto;
}

// =========================
// 🔥 LIMPIEZA
// =========================
function limpiarUI() {
    setProgreso(0, "");
    document.getElementById("salida").innerText = "";
    document.getElementById("software").innerHTML = "";
    document.getElementById("capas_estado").innerHTML = "";
    document.getElementById("viabilidad").innerText = "";
    document.getElementById("nombre").innerText = "";
    document.getElementById("error_box").innerText = "";
}

// =========================
// 📥 DESCARGAR
// =========================
function descargarZIP() {
    window.open("/descargar_proyecto");
}

// =========================
// 💾 GUARDAR
// =========================
async function guardar() {
    let categoria = document.getElementById("categoria").value;

    if (!categoria) {
        alert("Selecciona categoría");
        return;
    }

    await fetch("/guardar_proyecto", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nombre: "Drone MAIA",
            tecnologia: categoria
        })
    });

    document.getElementById("estado_guardado").innerText = "✅ Guardado";
}

</script>

</body>
</html>
