<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>MAIA DRONE SIM</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>

<link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#cesiumContainer{
width:100%;
height:100vh;
}

.panel{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.8);
color:white;
padding:20px;
border-radius:10px;
}

button{
padding:10px 20px;
margin:5px;
background:#1e90ff;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="cesiumContainer"></div>

<div class="panel">

<h2>🚁 MAIA DRONE SIM</h2>

<button onclick="modoManual()">Modo Manual</button>

<button onclick="misionAuto()">Misión Automática</button>

<p>Controles:</p>

<p>W / S / A / D mover</p>

<p>Q subir</p>

<p>E bajar</p>

</div>

<script>

Cesium.Ion.defaultAccessToken = "tu_token_cesium";

var viewer = new Cesium.Viewer('cesiumContainer', {
terrainProvider: Cesium.createWorldTerrain()
});

var drone = viewer.entities.add({
name:"Drone",
position: Cesium.Cartesian3.fromDegrees(-74,4,100),
box:{
dimensions:new Cesium.Cartesian3(10,10,5),
material:Cesium.Color.RED
}
});

viewer.trackedEntity = drone;

var speed = 0.001;

document.addEventListener("keydown", function(e){

var pos = drone.position.getValue();

var cart = Cesium.Cartographic.fromCartesian(pos);

if(e.key=="w") cart.latitude += speed;
if(e.key=="s") cart.latitude -= speed;
if(e.key=="a") cart.longitude -= speed;
if(e.key=="d") cart.longitude += speed;
if(e.key=="q") cart.height += 10;
if(e.key=="e") cart.height -= 10;

drone.position = Cesium.Cartesian3.fromRadians(
cart.longitude,
cart.latitude,
cart.height
);

});

function modoManual(){
alert("Modo manual activado");
}

function misionAuto(){
alert("Misión automática iniciada");
}

</script>

</body>
</html>
