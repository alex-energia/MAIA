<!DOCTYPE html>
<html>
<head>
    <title>MAIA INVENT</title>

    <style>
        body {
            background: #0b0b0b;
            color: #00ffcc;
            font-family: Arial;
        }

        textarea {
            width: 300px;
            height: 80px;
            background: black;
            color: #00ffcc;
            border: 1px solid #00ffcc;
        }

        button {
            background: #111;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 8px;
            margin: 5px;
            cursor: pointer;
        }

        #barra {
            width: 100%;
            background: #111;
            border: 1px solid #00ffcc;
        }

        #progreso {
            width: 0%;
            height: 20px;
            background: #00ffcc;
            transition: width 0.3s;
        }

        #panel_maia {
            display: none;
            background: black;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #00ffcc;
        }

        #error_box {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>🧠 MAIA INVENT</h1>
<p>Generador autónomo de drones disruptivos</p>

<textarea id="idea" placeholder="Ej: dron para incendios, vigilancia, mineria..."></textarea><br>

<button onclick="generarDrone()">🚀 Generar Drone</button>
<button onclick="limpiar()">🧹 Limpiar</button>
<button onclick="togglePanel()">⚡ ¿Qué puede hacer MAIA?</button>

<div id="barra">
    <div id="progreso"></div>
</div>

<p id="estado"></p>
<p id="error_box"></p>

<hr>

<h2 id="nombre"></h2>
<p id="intro"></p>
<p id="viabilidad"></p>
<p id="analisis_negativo"></p>

<h3>🧠 Software</h3>
<ul id="software"></ul>

<h3>⚙️ Hardware</h3>
<ul id="hardware"></ul>

<h3>📊 Simulación</h3>
<p id="simulacion"></p>

<hr>

<div id="panel_maia">
    <h2>🔥 Capacidades MAIA (Fase Actual)</h2>
    <ul id="lista_capacidades"></ul>
</div>

<hr>

<h3>💾 Guardar Proyecto</h3>

<select id="categoria">
    <option value="">Seleccionar tipo</option>
    <option value="comercial">Comercial</option>
    <option value="industrial">Industrial</option>
    <option value="militar">Militar</option>
</select>

<br><br>

<button onclick="guardar()">💾 Guardar Drone</button>

<p id="estado_guardado"></p>

<script>

// =========================
// 🧠 ESTADO
// =========================
let droneActual = null;
let intervaloGlobal = null;

// =========================
// 🚀 GENERAR
// =========================
async function generarDrone() {

    let idea = document.getElementById("idea").value;

    if (!idea || idea.length < 3) {
        alert("Escribe una idea primero");
        return;
    }

    document.getElementById("progreso").style.width = "0%";
    document.getElementById("estado").innerText = "🧠 Iniciando...";
    document.getElementById("error_box").innerText = "";
    document.getElementById("analisis_negativo").innerText = "";

    try {
        await fetch("/evaluar_drone", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({idea: idea})
        });

        escucharProgreso();

    } catch (e) {
        document.getElementById("error_box").innerText = "❌ Error conectando con MAIA";
    }
}

// =========================
// 📊 PROGRESO
// =========================
function escucharProgreso() {

    if (intervaloGlobal) clearInterval(intervaloGlobal);

    intervaloGlobal = setInterval(async () => {

        try {
            let res = await fetch("/maia_progreso");
            let data = await res.json();

            document.getElementById("progreso").style.width = data.progreso + "%";
            document.getElementById("estado").innerText = data.mensaje || "Procesando...";

            if (data.estado === "COMPLETADO" || data.estado === "ERROR") {
                clearInterval(intervaloGlobal);
                cargarResultado();
            }

        } catch {
            clearInterval(intervaloGlobal);
            document.getElementById("error_box").innerText = "❌ Error leyendo progreso";
        }

    }, 500);
}

// =========================
// 📦 RESULTADO COMPLETO
// =========================
async function cargarResultado() {

    try {

        let res = await fetch("/maia_resultado");
        let data = await res.json();

        droneActual = data;

        document.getElementById("nombre").innerText = "🚁 Drone generado por MAIA";
        document.getElementById("viabilidad").innerText = data.viabilidad || "Sin datos";

        let sw = document.getElementById("software");
        let hw = document.getElementById("hardware");

        sw.innerHTML = "";
        hw.innerHTML = "";

        // =========================
        // 🔴 ANÁLISIS NEGATIVO PRO
        // =========================
        if (data.viabilidad && data.viabilidad.includes("NO")) {

            document.getElementById("analisis_negativo").innerHTML = `
            ❌ PROYECTO NO VIABLE<br><br>

            📉 DIAGNÓSTICO:<br>
            El diseño presenta incompatibilidades entre peso, empuje y consumo energético.<br>
            También puede existir sobrecarga estructural o falta de eficiencia aerodinámica.<br><br>

            🧠 CAUSAS POSIBLES:<br>
            - Relación empuje/peso insuficiente<br>
            - Exceso de carga útil<br>
            - Limitaciones en batería<br>
            - Diseño no optimizado<br><br>

            💡 SOLUCIONES:<br>
            - Reducir peso del drone<br>
            - Aumentar potencia de motores<br>
            - Usar baterías de mayor densidad<br>
            - Rediseñar misión en fases<br>
            `;

            return;
        }

        // =========================
        // ✅ POSITIVO
        // =========================
        if (data.analisis) {
            sw.innerHTML += "<li>Peso: " + data.analisis.peso + "</li>";
            sw.innerHTML += "<li>Tipo: " + data.analisis.tipo + "</li>";
        }

        if (data.software_generado) {
            sw.innerHTML += "<li>Proyecto: " + data.software_generado + "</li>";
        }

        if (data.hardware) {
            data.hardware.forEach(h => {
                let li = document.createElement("li");
                li.innerText = h;
                hw.appendChild(li);
            });
        }

        if (data.simulacion) {
            document.getElementById("simulacion").innerText =
                "Altura estimada: " + (data.simulacion.altura_estimada || "N/A");
        }

    } catch {
        document.getElementById("error_box").innerText = "❌ Error cargando resultado";
    }
}

// =========================
// ⚡ PANEL MAIA
// =========================
function togglePanel() {

    let panel = document.getElementById("panel_maia");

    if (panel.style.display === "none" || panel.style.display === "") {
        panel.style.display = "block";
        cargarCapacidades();
    } else {
        panel.style.display = "none";
    }
}

function cargarCapacidades() {

    document.getElementById("lista_capacidades").innerHTML = `
        <li>✔ Generación automática de drones</li>
        <li>✔ Construcción de software real</li>
        <li>✔ Validación automática de código</li>
        <li>✔ Simulación física</li>
        <li>✔ Exportación en ZIP</li>
        <li>✔ Sistema anti-errores</li>
        <li>✔ Análisis de viabilidad</li>
        <li>✔ Recomendaciones inteligentes</li>
    `;
}

// =========================
// 🧹 LIMPIAR
// =========================
function limpiar() {
    location.reload();
}

// =========================
// 💾 GUARDAR
// =========================
async function guardar() {

    if (!droneActual) {
        alert("Primero genera un drone");
        return;
    }

    let categoria = document.getElementById("categoria").value;

    if (!categoria) {
        alert("Selecciona categoría");
        return;
    }

    await fetch("/guardar_proyecto", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nombre: "Drone MAIA",
            tecnologia: categoria
        })
    });

    document.getElementById("estado_guardado").innerText = "✅ Guardado correctamente";
}

</script>

</body>
</html>
