<!DOCTYPE html>
<html>
<head>
<title>MAIA Drone Lab</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

/* HEADER */
h1 {
    margin-top: 30px;
    text-align: center;
}

/* BOTONES */
#top-buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    background: #22c55e;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

button:hover {
    background: #16a34a;
}

/* SECCIONES */
.seccion {
    padding: 25px;
}

.titulo {
    font-size: 20px;
    margin-bottom: 10px;
    text-align: center;
}

/* GRID (MEJORA UI) */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

/* TARJETAS */
.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
    background: #334155;
}

/* COLORES POR CATEGORÍA */
.comercial { border-left: 5px solid #22c55e; }
.industrial { border-left: 5px solid #f59e0b; }
.militar { border-left: 5px solid #ef4444; }

.nombre {
    font-weight: bold;
    margin-bottom: 5px;
}
</style>

</head>

<body>

<h1>🚁 MAIA Drone Lab</h1>

<div id="top-buttons">
    <button onclick="cargarDrones()">Actualizar drones</button>
    <button onclick="abrirInventor()">🤖 MAIA Drone Inventor</button>
</div>

<div id="mensaje" style="text-align:center; margin-top:20px; color:#94a3b8;">
    Cargando drones...
</div>

<!-- 🔥 SECCIONES -->
<div class="seccion">
    <div class="titulo">Comerciales</div>
    <div id="comercial" class="grid"></div>
</div>

<div class="seccion">
    <div class="titulo">Industriales</div>
    <div id="industrial" class="grid"></div>
</div>

<div class="seccion">
    <div class="titulo">Militares</div>
    <div id="militar" class="grid"></div>
</div>

<script>
function abrirInventor(){
    window.location.href="/maia_invent"
}

async function cargarDrones(){

    const mensaje = document.getElementById("mensaje")

    document.getElementById("comercial").innerHTML = ""
    document.getElementById("industrial").innerHTML = ""
    document.getElementById("militar").innerHTML = ""

    mensaje.innerHTML = "Cargando drones..."

    try{

        let r = await fetch("/maia_drones_aprobados?nocache=" + Date.now())
        let drones = await r.json()

        if(!drones || drones.length === 0){
            mensaje.innerHTML = "No hay drones disponibles."
            return
        }

        mensaje.innerHTML = ""

        drones.forEach(d => {

            let card = document.createElement("div")
            card.className = "card " + d.categoria

            card.innerHTML = `
                <div class="nombre">${d.nombre}</div>
                <small>${d.categoria}</small>
            `

            card.onclick = () => {
                window.location.href = d.ruta
            }

            // 🔥 FILTRO CORRECTO (SOLUCIÓN REAL)
            if(d.categoria === "comercial"){
                document.getElementById("comercial").appendChild(card)
            }

            if(d.categoria === "industrial"){
                document.getElementById("industrial").appendChild(card)
            }

            if(d.categoria === "militar"){
                document.getElementById("militar").appendChild(card)
            }

        })

    }catch(error){
        mensaje.innerHTML = "Error conectando con MAIA."
        console.error(error)
    }
}

cargarDrones()
</script>

</body>
</html>
