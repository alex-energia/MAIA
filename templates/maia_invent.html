<!DOCTYPE html>
<html>
<head>
<title>MAIA INVENT</title>

<!-- 🔥 THREE JS FIX MODERNO -->
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js";
window.THREE = THREE;
</script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e5e7eb;
}
textarea {
    width: 100%;
    height: 80px;
    border-radius: 8px;
    padding: 10px;
}
button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #2563eb;
    color: white;
}
#panel_maia {
    display: none;
    background: black;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
}
#barra_container {
    width: 100%;
    background: #111;
    margin-top: 20px;
    border-radius: 10px;
    overflow: hidden;
    display: none;
}
#barra {
    width: 0%;
    height: 25px;
    background: #22c55e;
    text-align: center;
    color: white;
    font-weight: bold;
}
.panel {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}
.ok { color: #22c55e; }
.bad { color: #ef4444; }
pre {
    background: black;
    padding: 10px;
    border-radius: 8px;
    overflow: auto;
    font-size: 12px;
    max-height: 300px;
}
.bloque {
    margin-top: 20px;
    padding: 10px;
    background: #020617;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🧠 MAIA INVENT</h1>
<p>Generador de ingeniería de drones (FASE 23 🔥)</p>

<textarea id="idea"></textarea><br><br>

<button onclick="evaluar()">🚀 Generar Ingeniería</button>
<button onclick="verCapacidades()">🚀 ¿Qué puede hacer MAIA?</button>
<button onclick="limpiarUI()">🧹 Limpiar</button>

<div id="resultado"></div>

<div id="barra_container">
    <div id="barra">0%</div>
</div>

<div id="panel_maia"></div>

<button onclick="guardarProyectoInvent()">💾 Guardar proyecto</button>

<script>

// =========================
// 🚀 GENERAR
// =========================
async function evaluar(){
    const idea = document.getElementById("idea").value;

    if(!idea || idea.length < 3){
        alert("⚠️ Ingresa una idea válida");
        return;
    }

    document.getElementById("barra_container").style.display = "block";
    document.getElementById("resultado").innerHTML = "🧠 MAIA procesando...";

    await fetch("/evaluar_drone", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({idea})
    });

    monitorearResultado();
}

// =========================
// 📊 PROGRESO
// =========================
function monitorearResultado(){
    let barra = document.getElementById("barra");

    let intervalo = setInterval(async () => {
        try{
            let r = await fetch("/maia_progreso");
            let data = await r.json();

            barra.style.width = data.progreso + "%";
            barra.innerText = data.progreso + "%";

            if(data.progreso >= 100){
                clearInterval(intervalo);
                cargarResultadoFinal();
            }
        }catch(e){
            clearInterval(intervalo);
        }
    }, 700);
}

// =========================
// 🧠 RESULTADO
// =========================
async function cargarResultadoFinal(){

    let res = await fetch("/maia_resultado");
    let data = await res.json();

    let analisis = data.analisis || {};
    let fisica = data.fisica || {};
    let estado = data.viabilidad || "N/A";
    let clase = estado.includes("VIABLE") ? "ok" : "bad";

    let html = `<div class="panel">
    <h2 class="${clase}">${estado}</h2>`;

    html += `<div class="bloque"><h3>📦 Análisis técnico</h3>
    <pre>${JSON.stringify(analisis,null,2)}</pre></div>`;

    let riesgos = data.riesgos || analisis.riesgos || [];

    html += `<div class="bloque"><h3>⚠️ Riesgos</h3>
    <pre>${riesgos.length ? riesgos.join("\n") : "Sin riesgos detectados"}</pre></div>`;

    html += `<div class="bloque"><h3>⚡ Física</h3>
    <pre>${JSON.stringify(fisica,null,2)}</pre></div>`;

    html += `<div class="bloque"><h3>💻 Simulación</h3>
    <pre>${data.salida || "Sin datos"}</pre></div>`;

    html += `<div class="bloque"><h3>📡 Telemetría</h3>
    <pre id="telemetria_data">Procesando...</pre></div>`;

    if(data.hardware){
        html += `<div class="bloque"><h3>⚙️ Hardware Industrial</h3>
        <pre>${JSON.stringify(data.hardware,null,2)}</pre></div>`;
    }

    // 🔥 3D PRO
    if(data.modelos_3d){
        html += `
        <div class="bloque">
            <h3>🧊 Modelo 3D</h3>
            <canvas id="viewer3d" style="width:100%; height:400px;"></canvas>
        </div>`;
    }

    html += `</div>`;

    document.getElementById("resultado").innerHTML = html;

    render3D();
}

// =========================
// 🧊 RENDER 3D PRO REAL
// =========================
function render3D(){

    const canvas = document.getElementById("viewer3d");
    if(!canvas || !window.THREE) return;

    const THREE = window.THREE;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / 400, 0.1, 1000);

    const renderer = new THREE.WebGLRenderer({canvas});
    renderer.setSize(canvas.clientWidth, 400);

    // 🔥 LUCES REALES
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,5,5);
    scene.add(light);

    const ambient = new THREE.AmbientLight(0x404040);
    scene.add(ambient);

    // 🔥 CUERPO DRONE
    const body = new THREE.Mesh(
        new THREE.BoxGeometry(2,0.3,2),
        new THREE.MeshStandardMaterial({color:0x00ffcc})
    );
    scene.add(body);

    // 🔥 BRAZOS
    for(let i=0;i<4;i++){
        const arm = new THREE.Mesh(
            new THREE.CylinderGeometry(0.05,0.05,2),
            new THREE.MeshStandardMaterial({color:0xffffff})
        );
        arm.rotation.z = Math.PI/2;
        arm.rotation.y = i * (Math.PI/2);
        scene.add(arm);
    }

    // 🔥 HÉLICES
    for(let i=0;i<4;i++){
        const prop = new THREE.Mesh(
            new THREE.BoxGeometry(0.1,0.02,1),
            new THREE.MeshStandardMaterial({color:0xff0000})
        );
        prop.position.set(Math.cos(i*Math.PI/2)*1.5,0.3,Math.sin(i*Math.PI/2)*1.5);
        scene.add(prop);

        prop.userData.spin = true;
    }

    camera.position.z = 5;

    function animate(){
        requestAnimationFrame(animate);

        scene.rotation.y += 0.01;

        scene.children.forEach(obj=>{
            if(obj.userData.spin){
                obj.rotation.y += 0.3;
            }
        });

        renderer.render(scene, camera);
    }

    animate();
}

// =========================
// 🧹 LIMPIAR
// =========================
function limpiarUI(){
    document.getElementById("idea").value = "";
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("panel_maia").style.display = "none";
    document.getElementById("barra_container").style.display = "none";
}

// =========================
// 🚀 CAPACIDADES
// =========================
function verCapacidades(){
    let panel = document.getElementById("panel_maia");
    panel.style.display = "block";

    let fases = [];

    for(let i=1;i<=26;i++){
        fases.push(`Fase ${i}: Nivel ${i} de evolución MAIA`);
    }

    panel.innerHTML = `
        <h2>🚀 MAIA - SISTEMA INDUSTRIAL</h2>
        <ul>${fases.map(f => `<li>${f}</li>`).join("")}</ul>
    `;
}

// =========================
// 💾 GUARDAR
// =========================
async function guardarProyectoInvent(){
    let idea = document.getElementById("idea").value;

    await fetch("/maia_guardar_proyecto", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nombre: idea,
            tecnologia: "drone"
        })
    });

    alert("✅ Proyecto guardado");
}

</script>

</body>
</html>
