<!DOCTYPE html>
<html>
<head>
    <title>Proyectos - MAIA</title>
</head>
<body>

<h1>Lista de Proyectos</h1>

<a href="/proyectos/nuevo">Crear Nuevo Proyecto</a>

<br><br>

<table border="1">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Sector</th>
<th>Moneda</th>

<!-- NUEVAS COLUMNAS NEXUS -->
<th>Capacidad</th>
<th>Unidad</th>

<th>CAPEX</th>
<th>Ingresos</th>
<th>Fecha</th>
<th>Acciones</th>
</tr>

{% for p in proyectos %}
<tr>

<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[5] }}</td>

<!-- NUEVAS COLUMNAS NEXUS -->
<td>{{ p[12] }}</td>
<td>{{ p[13] }}</td>

<td>{{ p[7] }}</td>
<td>{{ p[9] }}</td>
<td>{{ p[11] }}</td>

<td>
<a href="/proyectos/{{ p[0] }}/dashboard">Dashboard</a>
</td>

</tr>
{% endfor %}

</table>

</body>
</html>
