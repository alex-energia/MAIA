<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>MAIA DRONE SIM</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#cesiumContainer{
width:100%;
height:100vh;
}

.panel{

position:absolute;
top:20px;
left:20px;

background:rgba(0,0,0,0.85);
color:white;

padding:20px;
border-radius:10px;
width:250px;
}

button{

padding:10px 20px;
margin:5px;
background:#1e90ff;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
width:100%;
}

button:hover{
background:#0f6bd6;
}

#telemetria{
margin-top:10px;
font-size:14px;
line-height:20px;
}

</style>

</head>

<body>

<div id="cesiumContainer"></div>

<div class="panel">

<h2>🚁 MAIA DRONE SIM</h2>

<button onclick="modoManual()">Modo Manual</button>

<button onclick="misionAuto()">Misión Automática</button>

<button onclick="resetDrone()">Reset</button>

<div id="telemetria">

Lat: -
<br>
Lon: -
<br>
Alt: -

</div>

<p style="font-size:12px;margin-top:10px;">

Controles:
<br>
W / S / A / D mover
<br>
Q subir
<br>
E bajar

</p>

</div>

<script>

Cesium.Ion.defaultAccessToken = "TU_TOKEN_CESIUM_AQUI";

var viewer = new Cesium.Viewer('cesiumContainer',{

terrainProvider: Cesium.createWorldTerrain(),

timeline:false,
animation:false

});

var lat = 4.5709;
var lon = -74.2973;
var alt = 100;

var drone = viewer.entities.add({

name:"Drone",

position: Cesium.Cartesian3.fromDegrees(lon,lat,alt),

box:{
dimensions:new Cesium.Cartesian3(10,10,5),
material:Cesium.Color.RED
}

});

viewer.trackedEntity = drone;

var speed = 0.001;

function actualizarDrone(){

drone.position = Cesium.Cartesian3.fromDegrees(lon,lat,alt);

document.getElementById("telemetria").innerHTML=

"Lat: "+lat.toFixed(6)+"<br>"+
"Lon: "+lon.toFixed(6)+"<br>"+
"Alt: "+alt.toFixed(0)

}

document.addEventListener("keydown",function(e){

if(e.key=="w") lat += speed;
if(e.key=="s") lat -= speed;
if(e.key=="a") lon -= speed;
if(e.key=="d") lon += speed;
if(e.key=="q") alt += 10;
if(e.key=="e") alt -= 10;

actualizarDrone();

});

function modoManual(){

alert("Modo manual activado");

}

function resetDrone(){

lat = 4.5709;
lon = -74.2973;
alt = 100;

actualizarDrone();

}

function misionAuto(){

alert("Misión automática iniciada");

var pasos = 0;

var vuelo = setInterval(function(){

lat += 0.0005;
lon += 0.0005;
alt += 1;

actualizarDrone();

pasos++;

if(pasos > 200){

clearInterval(vuelo);

alert("Misión completada");

}

},100);

}

actualizarDrone();

</script>

</body>

</html>
