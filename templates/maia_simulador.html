<!DOCTYPE html>
<html>
<head>
    <title>MAIA SIMULADOR PRO</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ffcc;
            font-family: Arial;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="hud">
🎮 WASD: mover | Q/E: subir/bajar | 1 Ciudad | 2 Océano
</div>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌞 LUZ
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// 🌍 ESCENARIOS
let escenario = "ciudad";

function crearCiudad() {
    for (let i = 0; i < 50; i++) {
        let geo = new THREE.BoxGeometry(2, Math.random()*10+2, 2);
        let mat = new THREE.MeshStandardMaterial({color: 0x555555});
        let edificio = new THREE.Mesh(geo, mat);
        edificio.position.set(
            Math.random()*100 - 50,
            geo.parameters.height/2,
            Math.random()*100 - 50
        );
        scene.add(edificio);
    }
}

function crearOceano() {
    let geo = new THREE.PlaneGeometry(200, 200);
    let mat = new THREE.MeshStandardMaterial({color: 0x0044ff});
    let agua = new THREE.Mesh(geo, mat);
    agua.rotation.x = -Math.PI/2;
    scene.add(agua);

    // peces simples
    for (let i = 0; i < 20; i++) {
        let fish = new THREE.Mesh(
            new THREE.SphereGeometry(0.3),
            new THREE.MeshStandardMaterial({color: 0xff9900})
        );
        fish.position.set(Math.random()*50-25, Math.random()*5, Math.random()*50-25);
        scene.add(fish);
    }
}

// 🚁 DRONE (modelo básico 3D)
let drone = new THREE.Mesh(
    new THREE.BoxGeometry(1, 0.3, 1),
    new THREE.MeshStandardMaterial({color: 0xffffff})
);
scene.add(drone);

drone.position.y = 5;

// 🎮 CONTROLES
let keys = {};

window.addEventListener("keydown", (e)=> keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", (e)=> keys[e.key.toLowerCase()] = false);

// 🔁 CAMBIAR ESCENARIO
window.addEventListener("keydown", (e)=>{
    if (e.key === "1") {
        limpiarEscena();
        crearCiudad();
        escenario = "ciudad";
    }
    if (e.key === "2") {
        limpiarEscena();
        crearOceano();
        escenario = "oceano";
    }
});

function limpiarEscena() {
    while(scene.children.length > 0){ 
        scene.remove(scene.children[0]); 
    }
    scene.add(light);
    scene.add(drone);
}

// 🎮 MOVIMIENTO
function moverDrone() {
    let speed = 0.2;

    if (keys["w"]) drone.position.z -= speed;
    if (keys["s"]) drone.position.z += speed;
    if (keys["a"]) drone.position.x -= speed;
    if (keys["d"]) drone.position.x += speed;
    if (keys["q"]) drone.position.y += speed;
    if (keys["e"]) drone.position.y -= speed;
}

// 🎥 CÁMARA FOLLOW
function actualizarCamara() {
    camera.position.x = drone.position.x + 5;
    camera.position.y = drone.position.y + 5;
    camera.position.z = drone.position.z + 10;

    camera.lookAt(drone.position);
}

// 🔁 LOOP PRINCIPAL
function animate() {
    requestAnimationFrame(animate);

    moverDrone();
    actualizarCamara();

    renderer.render(scene, camera);
}

// 🚀 INICIALIZAR
crearCiudad();
camera.position.z = 10;
animate();
</script>

</body>
</html>
