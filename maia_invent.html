<!DOCTYPE html>
<html>
<head>
    <title>MAIA INVENT</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e5e7eb;
        }

        textarea {
            width: 100%;
            height: 80px;
            border-radius: 8px;
            padding: 10px;
        }

        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #2563eb;
            color: white;
        }

        #panel_maia {
            display: none;
            background: black;
            color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        #barra_container {
            width: 100%;
            background: #111;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }

        #barra {
            width: 0%;
            height: 25px;
            background: #22c55e;
            text-align: center;
            color: white;
            font-weight: bold;
        }

        .panel {
            background: #020617;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .ok { color: #22c55e; }
        .bad { color: #ef4444; }

        pre {
            background: black;
            padding: 10px;
            border-radius: 8px;
            overflow: auto;
        }
    </style>
</head>

<body>

<h1>🧠 MAIA INVENT</h1>
<p>Generador de ingeniería de drones</p>

<textarea id="idea" placeholder="Ej: Drone autónomo para incendios con sensores térmicos"></textarea>
<br><br>

<button onclick="evaluar()">🚀 Generar Ingeniería</button>
<button onclick="verCapacidades()">🚀 ¿Qué puede hacer MAIA?</button>

<div id="resultado"></div>

<!-- 🔥 BARRA -->
<div id="barra_container">
    <div id="barra">0%</div>
</div>

<!-- 🔥 PANEL -->
<div id="panel_maia"></div>

<!-- 🔥 GUARDAR -->
<button onclick="guardarProyectoInvent()">
    💾 Guardar proyecto en memoria MAIA
</button>

<script>

// =========================
// 🚀 GENERAR (FIX REAL)
// =========================
async function evaluar(){

    const idea = document.getElementById("idea").value;

    if(!idea || idea.length < 3){
        alert("⚠️ Ingresa una idea válida");
        return;
    }

    document.getElementById("barra_container").style.display = "block";
    document.getElementById("resultado").innerHTML = "🧠 MAIA procesando...";

    await fetch("/evaluar_drone", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({idea})
    });

    monitorearResultado();
}

// =========================
// 📊 PROGRESO + RESULTADO
// =========================
function monitorearResultado(){

    let barra = document.getElementById("barra");

    let intervalo = setInterval(async () => {

        try{
            let r = await fetch("/maia_progreso");
            let data = await r.json();

            barra.style.width = data.progreso + "%";
            barra.innerText = data.progreso + "%";

            if(data.progreso >= 100){
                clearInterval(intervalo);
                cargarResultadoFinal();
            }

        }catch(e){
            clearInterval(intervalo);
        }

    }, 700);
}

// =========================
// 🧠 RESULTADO REAL (PRO)
// =========================
async function cargarResultadoFinal(){

    let res = await fetch("/maia_resultado");
    let data = await res.json();

    if(!data || Object.keys(data).length === 0){
        document.getElementById("resultado").innerHTML = "⚠️ Sin resultado";
        return;
    }

    let estado = data.viabilidad || "N/A";
    let clase = estado.includes("VIABLE") ? "ok" : "bad";

    let html = `
    <div class="panel">

        <h2 class="${clase}">${estado}</h2>

        <h3>📦 Análisis</h3>
        Tipo: ${data.analisis?.tipo}<br>
        Peso: ${data.analisis?.peso} kg

        <h3>⚡ Física</h3>
        Autonomía: ${data.fisica?.autonomia} min<br>
        Consumo: ${data.fisica?.consumo} W<br>
        Empuje: ${data.fisica?.empuje}

        <h3>📊 Métricas</h3>
        Empuje mínimo: ${data.metricas?.empuje_minimo_requerido}<br>
        Eficiencia: ${data.metricas?.eficiencia_energetica}

        <h3>🧠 Diagnóstico</h3>
        <pre>${data.explicacion}</pre>

        <h3>❌ Errores</h3>
        <pre>${(data.errores || []).join("\n")}</pre>

        <h3>🔧 Soluciones</h3>
        <pre>${(data.soluciones || []).join("\n")}</pre>

        <h3>💻 Simulación</h3>
        <pre>${data.salida}</pre>

        <h3>📁 Proyecto</h3>
        ${data.software_generado}<br><br>

        <a href="/descargar_proyecto" target="_blank">
            <button>⬇ Descargar</button>
        </a>

    </div>
    `;

    document.getElementById("resultado").innerHTML = html;

    window.ultimoProyecto = data;
}

// =========================
// 🚀 CAPACIDADES
// =========================
function verCapacidades() {

    fetch("/maia_capacidades")
    .then(r => r.json())
    .then(data => {

        let panel = document.getElementById("panel_maia");
        panel.style.display = "block";

        panel.innerHTML = `
            <h2>🚀 MAIA FASE ${data.fase}</h2>
            <ul>
                ${data.capacidades.map(c => `<li>${c}</li>`).join("")}
            </ul>
        `;
    });
}

// =========================
// 💾 GUARDAR
// =========================
async function guardarProyectoInvent(){

    if(!window.ultimoProyecto){
        alert("⚠️ Primero genera una idea");
        return;
    }

    let idea = document.getElementById("idea").value;

    let res = await fetch("/maia_guardar_proyecto", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nombre: idea,
            tecnologia: "drone"
        })
    });

    let data = await res.json();
    alert("✅ Proyecto guardado");
}

</script>

</body>
</html>
