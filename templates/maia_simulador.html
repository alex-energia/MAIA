<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>MAIA DRONE SIM</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#cesiumContainer{
width:100%;
height:100vh;
}

.panel{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.85);
color:white;
padding:20px;
border-radius:10px;
width:280px;
}

button{
padding:10px;
margin:5px 0;
background:#1e90ff;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
width:100%;
}

button:hover{
background:#0f6bd6;
}

select{
width:100%;
padding:8px;
margin-top:5px;
}

textarea{
width:100%;
height:140px;
margin-top:10px;
background:black;
color:#00ff00;
font-family:monospace;
}

#telemetria{
margin-top:10px;
font-size:14px;
line-height:20px;
}

</style>
</head>

<body>

<div id="cesiumContainer"></div>

<div class="panel">

<h2>🚁 MAIA DRONE</h2>

<label>Entorno</label>
<select id="entorno">
<option value="montana">Montaña</option>
<option value="rio">Río</option>
<option value="oceano">Océano</option>
<option value="ciudad">Ciudad</option>
</select>

<button onclick="cargarEntorno()">Cargar entorno</button>

<label>Algoritmo</label>

<textarea id="codigo">
subir(100)
mover(0.002,0.002)
subir(-50)
</textarea>

<button onclick="ejecutarAlgoritmo()">Ejecutar algoritmo</button>

<button onclick="resetDrone()">Reset</button>

<div id="telemetria">

Lat: -<br>
Lon: -<br>
Alt: -<br>
Velocidad: -<br>
Batería: -<br>
Viento: -

</div>

<p style="font-size:12px;margin-top:10px;">
Controles manuales<br>
W / S / A / D mover<br>
Q subir<br>
E bajar
</p>

</div>

<script>

Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIyNjdlOWJkNC1lNDc2LTQzYjItYmUzZi05NmI3ZGExMzNlNDUiLCJpZCI6NDAzNzc1LCJpYXQiOjE3NzM1Mjc2NTF9.wbVrwCl5V6lx8H_RX-KsocLn1vwxGvwWsc6CZaLdoD4";

var viewer = new Cesium.Viewer('cesiumContainer',{
terrainProvider: Cesium.createWorldTerrain(),
timeline:false,
animation:false
});

var lat = 4.5709;
var lon = -74.2973;
var alt = 100;

var velocidad = 0;
var bateria = 100;
var viento = (Math.random()*20).toFixed(1);

var drone = viewer.entities.add({

name:"Drone",

position: Cesium.Cartesian3.fromDegrees(lon,lat,alt),

box:{
dimensions:new Cesium.Cartesian3(10,10,5),
material:Cesium.Color.RED
}

});

viewer.trackedEntity = drone;

var speed = 0.001;

function actualizarDrone(){

drone.position = Cesium.Cartesian3.fromDegrees(lon,lat,alt);

document.getElementById("telemetria").innerHTML =
"Lat: "+lat.toFixed(6)+"<br>"+
"Lon: "+lon.toFixed(6)+"<br>"+
"Alt: "+alt.toFixed(0)+"<br>"+
"Velocidad: "+velocidad.toFixed(4)+"<br>"+
"Batería: "+bateria.toFixed(1)+"%<br>"+
"Viento: "+viento+" km/h";

}

document.addEventListener("keydown",function(e){

if(e.key=="w"){lat+=speed;velocidad=speed;}
if(e.key=="s"){lat-=speed;velocidad=speed;}
if(e.key=="a"){lon-=speed;velocidad=speed;}
if(e.key=="d"){lon+=speed;velocidad=speed;}

if(e.key=="q"){alt+=10;}
if(e.key=="e"){alt-=10;}

bateria-=0.1;

actualizarDrone();

});

function subir(m){

alt += m;

if(alt<0) alt=0;

bateria -= 0.2;

actualizarDrone();

}

function mover(dlat,dlon){

lat += dlat + (viento/100000);
lon += dlon + (viento/100000);

velocidad = Math.sqrt(dlat*dlat + dlon*dlon);

bateria -= 0.3;

actualizarDrone();

}

function ejecutarAlgoritmo(){

let codigo = document.getElementById("codigo").value;

let lineas = codigo.split("\n")
.map(l=>l.trim())
.filter(l=>l.length>0);

let i = 0;

function ejecutarLinea(){

if(i>=lineas.length) return;

let linea = lineas[i];

try{

if(linea.startsWith("subir(")){

let v=parseFloat(linea.replace("subir(","").replace(")",""));
subir(v);

}

else if(linea.startsWith("mover(")){

let p=linea.replace("mover(","").replace(")","").split(",");

let x=parseFloat(p[0]);
let y=parseFloat(p[1]);

mover(x,y);

}

else{

alert("Comando no reconocido: "+linea);

}

}

catch(e){

alert("Error en algoritmo: "+linea);

}

i++;

setTimeout(ejecutarLinea,800);

}

ejecutarLinea();

}

function cargarEntorno(){

var entorno=document.getElementById("entorno").value;

if(entorno=="montana"){
lat=-13.163;
lon=-72.545;
alt=200;
}

if(entorno=="rio"){
lat=-3.465;
lon=-62.215;
alt=150;
}

if(entorno=="oceano"){
lat=0;
lon=-140;
alt=200;
}

if(entorno=="ciudad"){
lat=40.7128;
lon=-74.006;
alt=150;
}

viewer.camera.flyTo({

destination: Cesium.Cartesian3.fromDegrees(lon,lat,alt*10)

});

actualizarDrone();

}

function resetDrone(){

lat=4.5709;
lon=-74.2973;
alt=100;
bateria=100;

actualizarDrone();

}

actualizarDrone();

</script>

</body>
</html>
