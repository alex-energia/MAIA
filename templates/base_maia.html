<!-- ========================= -->
<!-- MAIA GLOBAL UI FINAL -->
<!-- ========================= -->

<div id="maia-container"
     style="position:fixed;bottom:20px;right:20px;z-index:9999;width:320px;">

    <!-- BOTÓN VOZ -->
    <button id="maia-voz-btn"
        style="background:red;color:white;padding:10px 20px;border:none;border-radius:5px;cursor:pointer;width:100%;">
        Activar MAIA
    </button>

    <!-- BOTÓN CHAT -->
    <span id="abrir-chat"
        style="cursor:pointer;font-size:26px;color:#22c55e;text-align:center;display:block;margin-top:8px;">
        ➕
    </span>

    <!-- CHAT -->
    <div id="maia-chat"
        style="display:none;margin-top:10px;background:#1e293b;border-radius:10px;padding:10px;box-shadow:0 0 10px rgba(0,0,0,0.5);">

        <div id="chat-mensajes"
            style="height:220px;overflow-y:auto;margin-bottom:8px;font-size:14px;">
        </div>

        <input type="text" id="chat-input"
            placeholder="Escribe tu pregunta..."
            style="width:100%;padding:6px;border-radius:6px;border:none;outline:none;margin-bottom:6px;">

        <label style="cursor:pointer;font-size:18px;">
            📎
            <input type="file" id="subir-archivo" style="display:none;" multiple>
        </label>
    </div>
</div>

<script src="{{ url_for('static', filename='js/maia.js') }}"></script>
