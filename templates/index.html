{% extends "base_maia.html" %}
{% block content %}

<style>
body{margin:0;font-family:Arial;background:#1e1e1e;color:white;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:#111;}
.topbar-buttons button{margin-left:10px;padding:8px 15px;border-radius:8px;border:none;cursor:pointer;background:#2563eb;color:white;}
.container{padding:20px;}
.hidden{display:none;}
.modulo-extra{margin-top:30px;display:flex;flex-wrap:wrap;gap:15px;}
.modulo-extra button{flex:1;min-width:150px;padding:15px;border-radius:10px;border:none;cursor:pointer;background:#10b981;color:white;font-weight:bold;}
.bloque{
    margin-top:20px;
    background:#111;
    padding:20px;
    border-radius:12px;
    border-left:4px solid #00ffcc;
}
.boton-maia{
    background:#ffcc00;
    color:black;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}
</style>

<!-- 🔝 TOPBAR -->
<div class="topbar">
  <h2>🤖 MAIA IA</h2>

  <div class="topbar-buttons">
    <button onclick="abrirModulo('ganado')">🐄</button>
    <button onclick="abrirModulo('plantas')">🌿</button>
    <button onclick="abrirModulo('traductor')">🌍</button>
    <button onclick="abrirModulo('proyectos')">📁</button>
    <button onclick="abrirModulo('invent')">💡</button>
    <button onclick="activarDrone()">🚁</button>
    <button onclick="volverHome()">🏠</button>
  </div>
</div>

<div class="container">

<!-- 🔹 HOME -->
<div id="home">
    <h3>🚀 Módulos MAIA</h3>

    <div class="modulo-extra">
      <button onclick="activarDrone()">🚁 Drone</button>
      <button onclick="abrirModulo('invent')">💡 Invent</button>
      <button onclick="abrirModulo('ganado')">🐄 Ganado</button>
      <button onclick="abrirModulo('plantas')">🌿 Plantas</button>
      <button onclick="abrirModulo('traductor')">🌍 Traductor</button>
      <button onclick="abrirModulo('proyectos')">📁 Proyectos</button>
    </div>
</div>

<!-- 🔹 DRONE -->
<div id="moduloDrone" class="hidden">
    <h3>🚁 MAIA DRONE</h3>

    <textarea id="idea" placeholder="Escribe idea..." style="width:100%;height:80px;"></textarea>
    <br><br>

    <button onclick="generarDroneUI()">🚀 Generar</button>

    <div style="width:100%;background:#111;margin-top:10px;">
      <div id="barraProgreso" style="height:20px;width:0%;background:#00ffcc;"></div>
    </div>

    <p id="estadoTexto"></p>

    <div id="resultadoMAIA"></div>
</div>

</div>

<script>
let intervalo = null;

// =========================
// 🔹 NAVEGACIÓN
// =========================
function ocultarTodo(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("moduloDrone").classList.add("hidden");
}

function volverHome(){
  ocultarTodo();
  document.getElementById("home").classList.remove("hidden");
}

function activarDrone(){
  ocultarTodo();
  document.getElementById("moduloDrone").classList.remove("hidden");
}

function abrirModulo(nombre){
  window.location.href = "/maia_" + nombre;
}

// =========================
// 🚀 GENERAR DRONE
// =========================
async function generarDroneUI(){
  let idea = document.getElementById("idea").value;

  if(!idea){
    alert("Escribe algo");
    return;
  }

  if(intervalo){
    clearInterval(intervalo);
  }

  document.getElementById("barraProgreso").style.width = "0%";
  document.getElementById("estadoTexto").innerText = "Iniciando...";
  document.getElementById("resultadoMAIA").innerHTML = "";

  await fetch("/evaluar_drone", {
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({ idea })
  });

  iniciarMonitoreo();
}

// =========================
// 📊 MONITOREO
// =========================
function iniciarMonitoreo(){
  intervalo = setInterval(async ()=>{
    let res = await fetch("/maia_progreso");
    let data = await res.json();

    document.getElementById("barraProgreso").style.width = data.progreso + "%";
    document.getElementById("estadoTexto").innerText = data.mensaje;

    if(data.progreso >= 100){
      clearInterval(intervalo);
      cargarResultadoFinal();
    }
  }, 800);
}

// =========================
// 🧠 RESULTADO PRO
// =========================
async function cargarResultadoFinal(){
  let res = await fetch("/maia_resultado");
  let data = await res.json();

  let html = "";

  // BOTON MAIA
  html += `
  <button class="boton-maia" onclick="explicarMAIA()">
  🧠 ¿Qué puede hacer MAIA?
  </button>
  `;

  // HARDWARE
  html += `
  <div class="bloque">
    <h3>🔩 Hardware Inteligente</h3>
    <p>Tipo: ${data.analisis?.tipo}</p>
    <p>Peso: ${data.analisis?.peso} kg</p>
  </div>
  `;

  // SOFTWARE
  html += `
  <div class="bloque">
    <h3>💻 Software Autónomo</h3>
    <ul>
      <li>✔ Controlador PID</li>
      <li>✔ IA en tiempo real</li>
      <li>✔ Simulación física</li>
      <li>✔ Sistema de estabilidad</li>
    </ul>
  </div>
  `;

  // FISICA
  html += `
  <div class="bloque">
    <h3>⚙️ Física</h3>
    <p>Empuje: ${data.fisica?.empuje || "N/A"} N</p>
    <p>Autonomía: ${data.fisica?.autonomia || "N/A"} min</p>
  </div>
  `;

  // 3D
  html += `
  <div class="bloque">
    <h3>🧱 Modelo 3D</h3>
    <pre>${JSON.stringify(data.modelos_3d, null, 2)}</pre>
  </div>
  `;

  // SIMULACION
  html += `
  <div class="bloque">
    <h3>📊 Simulación</h3>
    <pre>${data.salida}</pre>
  </div>
  `;

  document.getElementById("resultadoMAIA").innerHTML = html;
}

// EXPLICACION
function explicarMAIA(){
  alert(`
🧠 MAIA:

1. Analiza idea
2. Diseña sistema
3. Valida
4. Genera software
5. Simula

Automático.
  `);
}
</script>

{% endblock %}
