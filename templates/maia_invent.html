<!DOCTYPE html>
<html>
<head>
<title>MAIA INDUSTRIAL</title>

<!-- THREE REAL -->
<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>

<style>

/* ========================= BASE ========================= */
body{
    font-family:Consolas,monospace;
    background:#0a0f1f;
    color:#e5e7eb;
}

/* ========================= INPUT ========================= */
textarea{
    width:100%;
    height:80px;
    padding:10px;
    background:#020617;
    color:#e5e7eb;
    border:1px solid #1e293b;
}

/* ========================= BOTONES ========================= */
button{
    padding:10px;
    margin:5px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
    transition:0.2s;
}
button:hover{opacity:0.8;}

.btn-danger{background:#ef4444;}
.btn-info{background:#0ea5e9;}

/* 🔥 BOTONES GLOBALES */
.global-ui{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:9999;
}
.btn-ia{
    background:#dc2626;
    font-size:18px;
    border-radius:50%;
    width:50px;height:50px;
}
.btn-chat{
    background:#22c55e;
    font-size:18px;
    border-radius:50%;
    width:50px;height:50px;
}

/* ========================= PANEL ========================= */
.panel{margin-top:20px;}

/* ========================= BLOQUES ========================= */
.bloque{
    background:#020617;
    margin-top:15px;
    padding:15px;
    border-left:4px solid #22c55e;
    box-shadow:0 0 10px rgba(0,255,100,0.1);
}

/* SCROLL */
.scroll{
    max-height:400px;
    overflow:auto;
    border:1px solid #1e293b;
    padding:5px;
}

/* TREE */
.item{margin-left:10px;cursor:pointer;font-size:13px;}
.item:hover{background:#111827;}
.folder{color:#38bdf8;}
.file{color:#22c55e;}
.line{color:#64748b;}
.codigo{
    background:#000;
    padding:10px;
    margin-top:5px;
    display:none;
    white-space:pre;
    font-size:12px;
    border:1px solid #1e293b;
    max-height:200px;
    overflow:auto;
}

/* PROGRESS */
.progress{width:100%;background:#1e293b;margin-top:10px;}
.progress-bar{
    height:14px;
    width:0%;
    background:#22c55e;
    text-align:center;
    font-size:10px;
}

/* MODAL */
.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    padding:40px;
}
.modal-content{
    background:#020617;
    padding:20px;
    max-width:900px;
    max-height:80vh;
    overflow:auto;
    border:1px solid #1e293b;
}

/* 3D */
#viewer3d{
    width:100%;
    height:320px;
    background:black;
    margin-top:10px;
}

/* CHAT */
#chatBox{
    position:fixed;
    bottom:20px;
    right:90px;
    width:320px;
    height:420px;
    background:#020617;
    border:1px solid #1e293b;
    display:none;
    flex-direction:column;
}
#chatMessages{
    flex:1;
    overflow:auto;
    padding:10px;
}
#chatInput{
    border:none;
    padding:10px;
    background:#000;
    color:white;
    width:100%;
}

</style>
</head>

<body>

<h1>🧠 MAIA INDUSTRIAL</h1>

<textarea id="idea" placeholder="Describe tu drone..."></textarea><br>

<button onclick="evaluar()">🚀 Generar</button>
<button class="btn-danger" onclick="limpiarUI()">🧹 Limpiar</button>
<button class="btn-info" onclick="abrirInfo()">🧠 Capacidades</button>

<div class="progress">
    <div id="bar" class="progress-bar">0%</div>
</div>

<div id="progressText">Esperando...</div>
<div id="resultado"></div>

<!-- 🔥 UI GLOBAL (TODAS LAS VISTAS) -->
<div class="global-ui">
    <button class="btn-ia" onclick="activarVoz()">🎤</button>
    <button class="btn-chat" onclick="toggleChat()">➕</button>
</div>

<!-- CHAT -->
<div id="chatBox">
    <div id="chatMessages"></div>
    <input id="chatInput" placeholder="Habla con MAIA..." onkeydown="if(event.key==='Enter')enviarChat()">
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<h2>🚀 MAIA INDUSTRIAL - NIVEL 10</h2>
<div id="capacidades"></div>
<button onclick="cerrarInfo()">Cerrar</button>
</div>
</div>

<script>

/* ========================= MOTOR ========================= */
async function evaluar(){
    let idea=document.getElementById("idea").value;
    if(!idea){alert("Ingresa una idea");return;}

    let paso=0,data={},progreso=0;

    while(true){
        progreso=Math.min(progreso+20,95);
        actualizarBarra(progreso,"Procesando...");

        let res=await fetch("/maia_step",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({idea,paso,data})
        });

        let json=await res.json();

        if(json.final){
            actualizarBarra(100,"Completado");
            render(json.resultado || {});
            actualizarCapacidades();
            return;
        }

        paso=json.paso ?? paso;
        data=json.data ?? data;
    }
}

/* UI */
function actualizarBarra(p,txt){
    let bar=document.getElementById("bar");
    bar.style.width=p+"%";
    bar.innerText=p+"%";
    document.getElementById("progressText").innerText=txt;
}

function limpiarUI(){
    document.getElementById("idea").value="";
    document.getElementById("resultado").innerHTML="";
    actualizarBarra(0,"Esperando...");
}

/* RENDER */
function render(data){
    let html=`<div class="panel">`;

    html+=`<div class="bloque"><h2>${data.nivel_maia}</h2></div>`;

    html+=renderBloque("🧠 Viabilidad",data.viabilidad);
    html+=renderBloque("🔩 Hardware",data.hardware,true);

    html+=`<div class="bloque"><h3>💻 Software</h3><div class="scroll">${renderTree(data.software || {},0,true)}</div></div>`;

    html+=renderBloque("📡 Telemetría",data.telemetria,true);
    html+=renderBloque("⚙️ Física",data.fisica,true);
    html+=renderBloque("⚠️ Riesgos",data.riesgos,true);

    if(data.modelo_3d){
        html+=`<div class="bloque">
        <h3>🧱 Modelo 3D</h3>
        <div id="viewer3d"></div></div>`;
    }

    html+=`</div>`;
    document.getElementById("resultado").innerHTML=html;

    if(data.modelo_3d) iniciar3D();
}

/* TREE */
function renderTree(obj,nivel=0,expandir=false){
    let html="";
    if(!obj) return html;

    Object.keys(obj).forEach(key=>{
        let val=obj[key];
        let id="node_"+Math.random();

        if(typeof val==="object"){
            html+=`<div class="item folder" onclick="toggle('${id}')">📁 ${key}</div>
            <div id="${id}" style="display:block;margin-left:10px;">${renderTree(val,nivel+1,expandir)}</div>`;
        }else{
            html+=`<div class="item file" onclick="toggle('${id}')">📄 ${key}</div>
            <pre id="${id}" class="codigo">${val}</pre>`;
        }
    });
    return html;
}

/* 3D REAL */
function iniciar3D(){
    let c=document.getElementById("viewer3d");

    let scene=new THREE.Scene();
    let camera=new THREE.PerspectiveCamera(75,c.clientWidth/320,0.1,1000);
    let renderer=new THREE.WebGLRenderer({antialias:true});

    renderer.setSize(c.clientWidth,320);
    c.innerHTML="";
    c.appendChild(renderer.domElement);

    let light=new THREE.DirectionalLight(0xffffff,1);
    light.position.set(5,5,5);
    scene.add(light);

    let mat=new THREE.MeshStandardMaterial({color:0x00ffcc});

    let body=new THREE.Mesh(new THREE.BoxGeometry(2,0.5,2),mat);
    scene.add(body);

    let arm=new THREE.Mesh(new THREE.BoxGeometry(5,0.2,0.2),mat);
    scene.add(arm);

    let arm2=arm.clone();
    arm2.rotation.y=Math.PI/2;
    scene.add(arm2);

    camera.position.z=8;

    function animate(){
        requestAnimationFrame(animate);
        scene.rotation.y+=0.01;
        renderer.render(scene,camera);
    }
    animate();
}

/* VOZ */
function activarVoz(){
    let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
    rec.lang="es-ES";
    rec.onresult=e=>{
        document.getElementById("idea").value=e.results[0][0].transcript;
    };
    rec.start();
}

/* CHAT */
function toggleChat(){
    let box=document.getElementById("chatBox");
    box.style.display=box.style.display==="flex"?"none":"flex";
}

function enviarChat(){
    let input=document.getElementById("chatInput");
    let msg=input.value;
    if(!msg) return;

    let cont=document.getElementById("chatMessages");
    cont.innerHTML+=`<div>🧑 ${msg}</div>`;
    cont.innerHTML+=`<div>🤖 MAIA: Analizando...</div>`;
    input.value="";
}

/* MODAL */
function abrirInfo(){
    document.getElementById("modal").style.display="block";
}
function cerrarInfo(){
    document.getElementById("modal").style.display="none";
}

/* CAPACIDADES PRO */
function actualizarCapacidades(){
document.getElementById("capacidades").innerHTML=`
<h3>🧠 NIVEL 10 - SISTEMA INDUSTRIAL REAL</h3>

<p>MAIA genera arquitectura completa lista para implementación real.</p>

<h3>💻 SOFTWARE</h3>
<p>Arquitectura modular con MAVLink, control PID, navegación y failsafe.</p>

<h3>📡 TELEMETRÍA</h3>
<p>Datos en tiempo real del sistema.</p>

<h3>⚙️ FÍSICA</h3>
<p>Validación de estabilidad y empuje.</p>

<h3>⚠️ RIESGOS</h3>
<p>Análisis de fallos críticos.</p>

<h3>🔥 RESULTADO</h3>
<p>MAIA ya es un generador industrial real.</p>
`;
}

</script>

</body>
</html>
