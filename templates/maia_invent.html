<!DOCTYPE html>
<html>
<head>
<title>MAIA INDUSTRIAL</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:#e5e7eb;
}

textarea {
    width:100%;
    height:80px;
    padding:10px;
}

button {
    padding:10px;
    margin:5px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

.panel {
    margin-top:20px;
}

.bloque {
    background:#020617;
    margin-top:15px;
    padding:15px;
    border-left:4px solid #22c55e;
}

.item {
    margin-left:15px;
    cursor:pointer;
}

.codigo {
    background:black;
    padding:10px;
    margin-top:10px;
    display:none;
    white-space:pre;
    font-size:12px;
}
</style>
</head>

<body>

<h1>🧠 MAIA INDUSTRIAL</h1>

<textarea id="idea" placeholder="Describe tu drone..."></textarea>

<br>

<button onclick="evaluar()">🚀 Generar</button>

<div id="resultado"></div>

<script>

// =========================
// MOTOR
// =========================
async function evaluar(){

    let idea = document.getElementById("idea").value;

    let paso = 0;
    let data = {};

    while(true){

        let res = await fetch("/maia_step", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({idea, paso, data})
        });

        let json = await res.json();

        if(json.final){
            render(json.resultado);
            return;
        }

        paso = json.paso;
        data = json.data;
    }
}

// =========================
// RENDER GENERAL
// =========================
function render(data){

    let html = `<div class="panel">`;

    html += renderHardware(data.hardware);
    html += renderSoftware(data.software);
    html += renderFisica(data.fisica);
    html += renderRiesgos(data.riesgos);

    html += `</div>`;

    document.getElementById("resultado").innerHTML = html;
}

// =========================
// 🔩 HARDWARE REAL
// =========================
function renderHardware(hw){

    let html = `<div class="bloque"><h3>🔩 Hardware</h3>`;

    html += renderObject(hw);

    html += `</div>`;
    return html;
}

// =========================
// 💻 SOFTWARE TIPO VS CODE
// =========================
function renderSoftware(sw){

    let html = `<div class="bloque"><h3>💻 Software</h3>`;

    for(let archivo in sw){

        let id = "code_" + Math.random();

        html += `
        <div class="item" onclick="toggle('${id}')">
            📄 ${archivo}
        </div>
        <div id="${id}" class="codigo">${escapeHtml(sw[archivo])}</div>
        `;
    }

    html += `</div>`;
    return html;
}

// =========================
// ⚙️ FISICA
// =========================
function renderFisica(f){

    let html = `<div class="bloque"><h3>⚙️ Física</h3>`;
    html += renderObject(f);
    html += `</div>`;
    return html;
}

// =========================
// ⚠️ RIESGOS
// =========================
function renderRiesgos(r){

    let html = `<div class="bloque"><h3>⚠️ Riesgos</h3>`;

    r.forEach(x=>{
        html += `<div class="item">⚠️ ${x}</div>`;
    });

    html += `</div>`;
    return html;
}

// =========================
// 🔁 RENDER PROFUNDO (CLAVE)
// =========================
function renderObject(obj){

    let html = "";

    for(let key in obj){

        let val = obj[key];

        if(typeof val === "object"){

            html += `<div class="item">▶ ${key}</div>`;
            html += `<div class="item">${renderObject(val)}</div>`;

        }else{
            html += `<div class="item">${key}: ${val}</div>`;
        }
    }

    return html;
}

// =========================
// TOGGLE
// =========================
function toggle(id){
    let el = document.getElementById(id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}

// =========================
// ESCAPE
// =========================
function escapeHtml(text){
    return text
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

</script>

</body>
</html>
