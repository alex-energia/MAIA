<!DOCTYPE html>
<html>
<head>
<title>MAIA INDUSTRIAL</title>

<!-- ✅ FIX THREE -->
<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:#e5e7eb;
}

textarea {
    width:100%;
    height:80px;
    padding:10px;
}

button {
    padding:10px;
    margin:5px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

.btn-danger{
    background:#ef4444;
}

.panel {
    margin-top:20px;
}

.bloque {
    background:#020617;
    margin-top:15px;
    padding:15px;
    border-left:4px solid #22c55e;
}

.item {
    margin-left:15px;
    cursor:pointer;
}

.codigo {
    background:black;
    padding:10px;
    margin-top:10px;
    display:none;
    white-space:pre;
    font-size:12px;
}

.folder {
    color:#38bdf8;
}

.file {
    color:#22c55e;
}
</style>
</head>

<body>

<h1>🧠 MAIA INDUSTRIAL</h1>

<textarea id="idea" placeholder="Describe tu drone..."></textarea><br>

<button onclick="evaluar()">🚀 Generar</button>
<button class="btn-danger" onclick="limpiarUI()">🧹 Limpiar</button>

<div id="resultado"></div>

<script>

// =========================
// MOTOR
// =========================
async function evaluar(){

    let idea = document.getElementById("idea").value;

    if(!idea){
        alert("Ingresa una idea");
        return;
    }

    let paso = 0;
    let data = {};

    while(true){

        let res = await fetch("/maia_step", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({idea, paso, data})
        });

        let json = await res.json();

        if(json.error){
            alert(json.error);
            return;
        }

        if(json.final){
            render(json.resultado);
            return;
        }

        paso = json.paso;
        data = json.data;
    }
}

// =========================
// LIMPIAR
// =========================
function limpiarUI(){
    document.getElementById("idea").value = "";
    document.getElementById("resultado").innerHTML = "";
}

// =========================
// RENDER GENERAL
// =========================
function render(data){

    let html = `<div class="panel">`;

    html += renderHardware(data.hardware);
    html += renderSoftware(data.software);
    html += renderFisica(data.fisica);
    html += renderRiesgos(data.riesgos);

    html += `</div>`;

    document.getElementById("resultado").innerHTML = html;
}

// =========================
// 🔩 HARDWARE INDUSTRIAL
// =========================
function renderHardware(hw){

    let html = `<div class="bloque"><h3>🔩 Hardware</h3>`;
    html += renderTree(hw);
    html += `</div>`;

    return html;
}

// =========================
// 💻 SOFTWARE INDUSTRIAL (TIPO IDE)
// =========================
function renderSoftware(sw){

    let html = `<div class="bloque"><h3>💻 Software</h3>`;
    html += renderTree(sw);
    html += `</div>`;

    return html;
}

// =========================
// ⚙️ FISICA
// =========================
function renderFisica(f){

    let html = `<div class="bloque"><h3>⚙️ Física</h3>`;
    html += renderTree(f);
    html += `</div>`;

    return html;
}

// =========================
// ⚠️ RIESGOS
// =========================
function renderRiesgos(r){

    let html = `<div class="bloque"><h3>⚠️ Riesgos</h3>`;

    if(Array.isArray(r)){
        r.forEach(x=>{
            html += `<div class="item">⚠️ ${x}</div>`;
        });
    }

    html += `</div>`;
    return html;
}

// =========================
// 🌳 RENDER TREE (CLAVE INDUSTRIAL)
// =========================
function renderTree(obj, nivel = 0){

    let html = "";

    for(let key in obj){

        let val = obj[key];
        let id = "node_" + Math.random();

        if(typeof val === "object" && val !== null){

            html += `
            <div class="item folder" onclick="toggle('${id}')">
                📁 ${key}
            </div>
            <div id="${id}" style="display:none; margin-left:15px;">
                ${renderTree(val, nivel + 1)}
            </div>
            `;

        }else{

            html += `
            <div class="item file" onclick="toggle('${id}')">
                📄 ${key}
            </div>
            <pre id="${id}" class="codigo">
${escapeHtml(val)}
            </pre>
            `;
        }
    }

    return html;
}

// =========================
// TOGGLE
// =========================
function toggle(id){
    let el = document.getElementById(id);
    if(!el) return;
    el.style.display = el.style.display === "block" ? "none" : "block";
}

// =========================
// ESCAPE (FIX ERROR CRÍTICO)
// =========================
function escapeHtml(text){

    if(typeof text !== "string"){
        try{
            return JSON.stringify(text, null, 2);
        }catch(e){
            return "N/A";
        }
    }

    return text
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

</script>

</body>
</html>
