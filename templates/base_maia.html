<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MAIA</title>

    <!-- 🔥 ESTILOS BASE -->
    <style>
        body{
            margin:0;
            padding:0;
            background:#0f172a;
            color:white;
            font-family: Arial;
        }

        #maia-container{
            position:fixed;
            bottom:20px;
            right:20px;
            z-index:9999;
            width:320px;
        }

        #maia-chat{
            display:none;
            margin-top:10px;
            background:#1e293b;
            border-radius:10px;
            padding:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.5);
        }

        #chat-mensajes div{
            padding:6px;
            border-radius:6px;
            margin-bottom:4px;
            background:#334155;
        }
    </style>
</head>

<body>

    <!-- 🔥 CONTENIDO DE CADA PÁGINA -->
    {% block content %}
    {% endblock %}

    <!-- ========================= -->
    <!-- 🔥 MAIA GLOBAL UI -->
    <!-- ========================= -->
    <div id="maia-container">

        <!-- 🔴 BOTÓN VOZ -->
        <button id="maia-voz-btn"
            style="background:red;color:white;padding:10px;border:none;border-radius:6px;width:100%;cursor:pointer;">
            Activar MAIA
        </button>

        <!-- ➕ BOTÓN CHAT -->
        <span id="abrir-chat"
            style="cursor:pointer;font-size:26px;color:#22c55e;text-align:center;display:block;margin-top:8px;">
            ➕
        </span>

        <!-- 💬 CHAT -->
        <div id="maia-chat">

            <!-- HEADER -->
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                <b>MAIA</b>
                <span id="cerrar-chat" style="cursor:pointer;">✖</span>
            </div>

            <!-- MENSAJES -->
            <div id="chat-mensajes"
                style="height:220px;overflow-y:auto;margin-bottom:8px;">
            </div>

            <!-- INPUT -->
            <input type="text" id="chat-input"
                placeholder="Escribe tu pregunta..."
                style="width:100%;padding:6px;border-radius:6px;border:none;outline:none;">

            <!-- ARCHIVOS -->
            <input type="file" id="subir-archivo" style="display:none;" multiple>

        </div>
    </div>

    <!-- ========================= -->
    <!-- 🔥 SCRIPT MAIA (CARGA SEGURA) -->
    <!-- ========================= -->
    <script>
        // 🔥 Espera total del DOM antes de cargar MAIA
        window.addEventListener("load", function(){
            const script = document.createElement("script");
            script.src = "{{ url_for('static', filename='js/maia.js') }}";
            script.defer = true;
            document.body.appendChild(script);
        });
    </script>

</body>
</html>
