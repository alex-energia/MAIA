<!DOCTYPE html>
<html>
<head>
<title>MAIA INDUSTRIAL</title>

<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>

<style>
body{font-family:Consolas;background:#0a0f1f;color:#e5e7eb;}
textarea{width:100%;height:80px;background:#020617;color:white;border:1px solid #1e293b;}
button{padding:10px;margin:5px;background:#2563eb;color:white;border:none;cursor:pointer;}
.btn-danger{background:#ef4444;}
.btn-info{background:#0ea5e9;}

.global-ui{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;}
.btn-ia{background:#111827;border:2px solid #ef4444;border-radius:50%;width:50px;height:50px;}
.btn-ia.active{background:#ef4444;box-shadow:0 0 15px red;}
.btn-chat{background:#22c55e;border-radius:50%;width:50px;height:50px;}

.bloque{background:#020617;margin-top:15px;padding:15px;border-left:4px solid #22c55e;}
.scroll{max-height:400px;overflow:auto;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;}
.modal-content{background:#020617;padding:20px;max-width:900px;margin:auto;margin-top:5%;max-height:80vh;overflow:auto;}

#chatBox{position:fixed;bottom:20px;right:90px;width:320px;height:420px;background:#020617;border:1px solid #22c55e;display:none;flex-direction:column;}
#chatMessages{flex:1;overflow:auto;padding:10px;}
#chatInput{background:#000;color:white;border:none;padding:10px;}

#viewer3d{height:320px;}
</style>
</head>

<body>

<h1>🧠 MAIA INDUSTRIAL</h1>

<textarea id="idea"></textarea><br>

<button onclick="evaluar()">🚀 Generar</button>
<button class="btn-danger" onclick="limpiarUI()">🧹 Limpiar</button>
<button class="btn-info" onclick="abrirInfo()">🧠 Capacidades</button>

<div id="resultado"></div>

<div class="global-ui">
<button id="btnVoice" class="btn-ia" onclick="toggleVoice()">🎤</button>
<button class="btn-chat" onclick="toggleChat()">➕</button>
</div>

<div id="chatBox">
<div id="chatMessages"></div>
<input id="chatInput" placeholder="Pregunta a MAIA..." onkeydown="if(event.key==='Enter')enviarChat()">
</div>

<div id="modal" class="modal">
<div class="modal-content">
<div id="capacidades"></div>
<button onclick="cerrarInfo()">Cerrar</button>
</div>
</div>

<script>

/* ========================= ESTADO ========================= */
let vozActiva=false;
let recognition=null;
let ultimoResultado=null;
let vocesDisponibles=[];

/* 🔥 CARGA SEGURA DE VOCES */
speechSynthesis.onvoiceschanged = () => {
vocesDisponibles = speechSynthesis.getVoices();
};

/* ========================= LIMPIEZA VOZ ========================= */
function limpiarTexto(texto){
return texto
.replace(/[_{}[\]"]/g,"")
.replace(/,/g,".")
.replace(/:/g,"")
.replace(/\b(mavlink|pid)\b/gi,"")
.replace(/\s+/g," ");
}

/* ========================= VOZ NEUTRA REAL ========================= */
function obtenerVozNeutra(){
if(!vocesDisponibles.length){
vocesDisponibles = speechSynthesis.getVoices();
}

/* 🔥 PRIORIDAD REAL */
let prioridad = [
"Google español",
"Google US English",
"Microsoft Sabina",
"Microsoft Helena",
"female"
];

for(let p of prioridad){
let v = vocesDisponibles.find(v => v.name.toLowerCase().includes(p.toLowerCase()));
if(v) return v;
}

/* fallback femenino */
return vocesDisponibles.find(v => v.lang.includes("es")) || vocesDisponibles[0];
}

function hablar(texto){
if(!vozActiva) return;

let limpio=limpiarTexto(texto);

let msg=new SpeechSynthesisUtterance(limpio);
msg.pitch=1;
msg.rate=1;
msg.lang="es-CO";

let voz = obtenerVozNeutra();
if(voz) msg.voice = voz;

speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

/* ========================= VOZ CONTINUA ========================= */
function iniciarEscucha(){
recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang="es-CO";
recognition.continuous=true;

recognition.onresult=e=>{
let texto=e.results[e.results.length-1][0].transcript;

let respuesta=generarRespuesta(texto);

logChat("🎤",texto);
logChat("🤖",respuesta);

hablar(respuesta);
};

recognition.onend=()=>{
if(vozActiva) recognition.start();
};

recognition.start();
}

/* ========================= BOTON VOZ ========================= */
function toggleVoice(){
vozActiva=!vozActiva;
let btn=document.getElementById("btnVoice");

if(vozActiva){
btn.classList.add("active");

/* 🔥 SALUDO ÚNICO */
hablar("Hola Alex, soy MAIA. ¿En qué puedo ayudarte?");

iniciarEscucha();
}else{
btn.classList.remove("active");
if(recognition) recognition.stop();
speechSynthesis.cancel();
}
}

/* ========================= CHAT ========================= */
function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display=box.style.display==="flex"?"none":"flex";
}

function enviarChat(){
let input=document.getElementById("chatInput");
let msg=input.value;
if(!msg) return;

let respuesta=generarRespuesta(msg);

logChat("🧑",msg);
logChat("🤖",respuesta);

input.value="";
}

function logChat(tipo,texto){
let cont=document.getElementById("chatMessages");
cont.innerHTML+=`<div>${tipo} ${texto}</div>`;
}

/* ========================= IA ========================= */
function generarRespuesta(msg){

msg=msg.toLowerCase();

if(!ultimoResultado){
return "Primero genera un drone.";
}

if(msg.includes("hardware")){
return "El drone utiliza estructura de carbono, motores brushless y sensores avanzados.";
}

if(msg.includes("software")){
return "Cuenta con navegación autónoma y control inteligente.";
}

if(msg.includes("riesgo")){
return "Los riesgos incluyen batería, motores y condiciones climáticas.";
}

return "Reformula tu pregunta.";
}

/* ========================= MOTOR ========================= */
async function evaluar(){

let idea=document.getElementById("idea").value;
if(!idea){alert("Ingresa una idea");return;}

let res=await fetch("/maia_step",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({idea})
});

let json=await res.json();

if(json.final){
ultimoResultado=json.resultado;
render(json.resultado);
}
}

/* ========================= RENDER ========================= */
function render(data){

let html="";
html+=renderBloque("🧠 Viabilidad",data.viabilidad);
html+=renderBloque("🔩 Hardware",data.hardware,true);
html+=renderBloque("💻 Software",data.software,true);
html+=renderBloque("📡 Telemetría",data.telemetria,true);
html+=renderBloque("⚙️ Física",data.fisica,true);
html+=renderBloque("⚠️ Riesgos",data.riesgos,true);
html+=`<div class="bloque"><h3>🧱 Modelo 3D</h3><div id="viewer3d"></div></div>`;

document.getElementById("resultado").innerHTML=html;

iniciar3D();
}

function renderBloque(titulo,data,expandir=false){
if(!data) return "";
return `<div class="bloque"><h3>${titulo}</h3><div class="scroll">${renderTree(data,expandir)}</div></div>`;
}

function renderTree(obj,expandir=false){
let html="";
for(let k in obj){
let v=obj[k];
let id="n"+Math.random();

if(typeof v==="object"){
html+=`<div class="folder" onclick="toggle('${id}')">📁 ${k}</div>
<div id="${id}" style="display:${expandir?'block':'none'};margin-left:10px;">
${renderTree(v,expandir)}
</div>`;
}else{
html+=`<div class="file" onclick="toggle('${id}')">📄 ${k}</div>
<div id="${id}" class="codigo">${v}</div>`;
}
}
return html;
}

function toggle(id){
let el=document.getElementById(id);
el.style.display=el.style.display==="block"?"none":"block";
}

/* ========================= 3D ========================= */
function iniciar3D(){
let c=document.getElementById("viewer3d");
let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,c.clientWidth/320,0.1,1000);
let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(c.clientWidth,320);
c.innerHTML="";
c.appendChild(renderer.domElement);

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

let mat=new THREE.MeshStandardMaterial({color:0x00ffcc});
let body=new THREE.Mesh(new THREE.BoxGeometry(2,0.5,2),mat);
scene.add(body);

camera.position.z=6;

function animate(){
requestAnimationFrame(animate);
scene.rotation.y+=0.01;
renderer.render(scene,camera);
}
animate();
}

/* ========================= UI ========================= */
function limpiarUI(){
document.getElementById("idea").value="";
document.getElementById("resultado").innerHTML="";
}

/* ========================= MODAL ========================= */
function abrirInfo(){
document.getElementById("modal").style.display="block";
actualizarCapacidades();
}

function cerrarInfo(){
document.getElementById("modal").style.display="none";
}

/* ========================= CAPACIDADES ========================= */
function actualizarCapacidades(){
document.getElementById("capacidades").innerHTML=`
<h2>🔥 MAIA NIVEL 13</h2>
<p>Sistema industrial completo de análisis de drones.</p>
`;
}

</script>

</body>
</html>
