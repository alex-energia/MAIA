<!DOCTYPE html>
<html>
<head>
    <title>Nuevo Proyecto - MAIA</title>
</head>
<body>
    <h1>Crear Nuevo Proyecto</h1>

    <form method="POST">

        <label>Nombre del Proyecto:</label><br>
        <input type="text" name="nombre" required><br><br>

        <label>Sector:</label><br>
        <input type="text" name="sector"><br><br>

        <label>País:</label><br>
        <input type="text" name="pais"><br><br>

        <label>Ciudad:</label><br>
        <input type="text" name="ciudad"><br><br>

        <label>Moneda:</label><br>
        <select name="moneda">
            <option value="COP">COP</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
        </select><br><br>

        <label>Horizonte (años):</label><br>
        <input type="number" name="horizonte"><br><br>

        <label>CAPEX Inicial:</label><br>
        <input type="number" step="0.01" name="capex"><br><br>

        <label>OPEX Anual:</label><br>
        <input type="number" step="0.01" name="opex"><br><br>

        <label>Ingresos Anuales:</label><br>
        <input type="number" step="0.01" name="ingresos"><br><br>

        <label>Tasa de Descuento (%):</label><br>
        <input type="number" step="0.01" name="tasa_descuento"><br><br>

        <button type="submit">Guardar Proyecto</button>

    </form>

    <br>
    <a href="/proyectos">Ver Proyectos</a>

</body>
</html>
