{% extends "base_maia.html" %}
{% block content %}

<style>
body{margin:0;font-family:Arial;background:#1e1e1e;color:white;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:#111;}
.topbar-buttons button{margin-left:10px;padding:8px 15px;border-radius:8px;border:none;cursor:pointer;background:#2563eb;color:white;}
.container{padding:20px;}
.hidden{display:none;}

.chat-box{height:60vh;overflow-y:auto;background:#2a2a2a;padding:15px;border-radius:12px;}
.input-area{margin-top:15px;display:flex;gap:10px;}
input[type="text"]{flex:1;padding:12px;border-radius:10px;border:none;}
button.send{padding:12px 20px;border-radius:10px;border:none;background:#2563eb;color:white;cursor:pointer;}

.modulo-extra{margin-top:30px;display:flex;flex-wrap:wrap;gap:15px;}
.modulo-extra button{
flex:1;min-width:150px;padding:15px;border-radius:10px;border:none;
cursor:pointer;background:#10b981;color:white;font-weight:bold;
}
.modulo-extra button:hover{background:#059669;}

.boton-voz{
background:#ff0000;color:white;width:45px;height:45px;border-radius:50%;
border:none;cursor:pointer;font-size:18px;
box-shadow:0 0 15px red;
}

.boton-plus{
background:#2563eb;color:white;width:45px;height:45px;border-radius:50%;
border:none;cursor:pointer;font-size:18px;
}
</style>

<!-- 🔝 TOPBAR COMPLETA -->
<div class="topbar">
  <h2>🤖 MAIA IA</h2>

  <div class="topbar-buttons">
    <button onclick="abrirModulo('ganado')">🐄</button>
    <button onclick="abrirModulo('plantas')">🌿</button>
    <button onclick="abrirModulo('traductor')">🌍</button>
    <button onclick="abrirModulo('proyectos')">📁</button>

    <button onclick="activarDrone()">🚁</button>
    <button onclick="volverHome()">🏠</button>

    <button class="boton-voz" onclick="activarVoz()">🎤</button>
    <button class="boton-plus" onclick="abrirChat()">💬</button>
  </div>
</div>

<div class="container">

  <!-- 🔹 HOME -->
  <div id="home">
    <h3>🚀 Módulos MAIA</h3>

    <div class="modulo-extra">
      <button onclick="activarDrone()">🚁 Drone</button>
      <button onclick="abrirModulo('invent')">💡 Invent</button>
    </div>
  </div>

  <!-- 🔹 DRONE -->
  <div id="moduloDrone" class="hidden">
    <h3>🚁 MAIA DRONE</h3>

    <textarea id="idea" placeholder="Escribe idea..." style="width:100%;height:80px;"></textarea>
    <br><br>

    <button onclick="generarDroneUI()">🚀 Generar</button>

    <!-- 🔥 BARRA -->
    <div style="width:100%;background:#111;margin-top:10px;">
      <div id="barraProgreso" style="height:20px;width:0%;background:#00ffcc;"></div>
    </div>

    <p id="estadoTexto"></p>

    <!-- 🔥 RESULTADO -->
    <div id="resultadoMAIA"></div>
  </div>

</div>

<script>

// 🔥 ERROR GLOBAL
window.onerror = function(msg, url, line){
  console.error("💥 JS ERROR:", msg, line);
};

// =========================
// 🔹 NAVEGACIÓN
// =========================
function ocultarTodo(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("moduloDrone").classList.add("hidden");
}

function volverHome(){
  ocultarTodo();
  document.getElementById("home").classList.remove("hidden");
}

function activarDrone(){
  ocultarTodo();
  document.getElementById("moduloDrone").classList.remove("hidden");
}

function abrirModulo(nombre){
  window.location.href = "/maia_" + nombre;
}

function abrirChat(){
  window.location.href = "/maia_chat";
}

function activarVoz(){
  alert("🎤 Voz MAIA activa (conectar backend después)");
}

// =========================
// 🚀 GENERAR DRONE
// =========================
async function generarDroneUI(){

  let idea = document.getElementById("idea").value;

  if(!idea){
    alert("Escribe algo");
    return;
  }

  document.getElementById("barraProgreso").style.width = "5%";
  document.getElementById("estadoTexto").innerText = "Iniciando...";
  document.getElementById("resultadoMAIA").innerHTML = "";

  await fetch("/evaluar_drone", {
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({ idea })
  });

  iniciarMonitoreo();
}

// =========================
// 📊 MONITOREO
// =========================
function iniciarMonitoreo(){

  let intervalo = setInterval(async ()=>{

    try{
      let res = await fetch("/maia_progreso");
      let data = await res.json();

      document.getElementById("barraProgreso").style.width = data.progreso + "%";
      document.getElementById("estadoTexto").innerText = data.mensaje;

      if(data.progreso >= 100){
        clearInterval(intervalo);
        cargarResultadoFinal();
      }

    }catch(e){
      console.log("❌ Error monitoreo");
      clearInterval(intervalo);
    }

  }, 800);
}

// =========================
// 🧠 RESULTADO FINAL
// =========================
async function cargarResultadoFinal(){

  try{
    let res = await fetch("/maia_resultado");
    let data = await res.json();

    if(!data || Object.keys(data).length === 0){
      document.getElementById("estadoTexto").innerText = "⚠️ No hay resultado";
      return;
    }

    let html = `
    <div style="margin-top:20px;background:#111;padding:15px;border-radius:10px;">
      <h3>🧠 Resultado MAIA</h3>

      <p><b>Viabilidad:</b> ${data.viabilidad}</p>
      <p><b>Tipo:</b> ${data.analisis?.tipo}</p>
      <p><b>Peso estimado:</b> ${data.analisis?.peso}</p>

      <h4>⚙️ Simulación:</h4>
      <pre style="max-height:200px;overflow:auto;background:#000;padding:10px;">
${data.salida}
      </pre>

      <h4>📁 Software generado:</h4>
      <p>${data.software_generado}</p>

      <a href="/descargar_proyecto" target="_blank">
        <button style="padding:10px;background:#10b981;border:none;color:white;border-radius:8px;">
          ⬇ Descargar Proyecto
        </button>
      </a>
    </div>
    `;

    document.getElementById("resultadoMAIA").innerHTML = html;

  }catch(e){
    console.error("❌ Error cargando resultado", e);
  }
}

</script>

{% endblock %}
