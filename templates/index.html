<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAIA</title>

<style>

body {
margin: 0;
font-family: Arial, sans-serif;
background-color: #1e1e1e;
color: white;
}

.topbar {
display: flex;
justify-content: space-between;
align-items: center;
padding: 15px 25px;
background-color: #111;
}

.topbar-buttons button {
margin-left: 10px;
padding: 8px 15px;
border-radius: 8px;
border: none;
cursor: pointer;
background-color: #2563eb;
color: white;
}

.container {
padding: 20px;
}

.chat-box {
height: 60vh;
overflow-y: auto;
background-color: #2a2a2a;
padding: 15px;
border-radius: 12px;
}

.input-area {
margin-top: 15px;
display: flex;
gap: 10px;
align-items: center;
}

input[type="text"] {
flex: 1;
padding: 12px;
border-radius: 10px;
border: none;
}

textarea {
flex: 1;
padding: 12px;
border-radius: 10px;
border: none;
}

button.send {
padding: 12px 20px;
border-radius: 10px;
border: none;
background-color: #2563eb;
color: white;
cursor: pointer;
}

.hidden {
display: none;
}

.upload-btn {
font-size: 22px;
cursor: pointer;
}

.panel-oportunidades{
margin-top:20px;
background:#2a2a2a;
padding:15px;
border-radius:10px;
}

.card-oportunidad{
border:1px solid #444;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="topbar">

<h2>🤖 MAIA IA</h2>

<div class="topbar-buttons">

<button onclick="activarGanado()">🐄 MAIA GANADO</button>

<button onclick="activarPlantas()">🌿 MAIA PLANTAS</button>

<button onclick="activarTraductor()">🌍 MAIA TRADUCTOR</button>

<button onclick="activarProyectos()">📁 MAIA PROYECTOS</button>

<button onclick="volverChat()">🏠 Inicio</button>

</div>

</div>

<div class="container">

<!-- CHAT NORMAL -->

<div id="chatNormal">

<div id="chatBox" class="chat-box"></div>

<div class="input-area">

<input type="text" id="mensaje" placeholder="Escribe tu mensaje...">

<button class="send" onclick="enviarMensaje()">Enviar</button>

</div>

</div>

<!-- MODULO GANADO -->

<div id="moduloGanado" class="hidden">

<h3>🐄 MAIA GANADO</h3>

<div id="chatGanado" class="chat-box"></div>

<div class="input-area">

<label class="upload-btn">

➕

<input type="file" id="archivoGanado" hidden>

</label>

<input type="text" id="mensajeGanado" placeholder="Ej: 18 brahman">

<button class="send" onclick="enviarGanado()">Calcular</button>

</div>

</div>

<!-- MODULO PLANTAS -->

<div id="moduloPlantas" class="hidden">

<h3>🌿 MAIA PLANTAS</h3>

<div id="chatPlantas" class="chat-box"></div>

<div class="input-area">

<label class="upload-btn">

➕

<input type="file" id="archivoPlanta" hidden>

</label>

<button class="send" onclick="enviarPlantas()">Diagnosticar</button>

</div>

</div>

<!-- MODULO TRADUCTOR -->

<div id="moduloTraductor" class="hidden">

<h3>🌍 MAIA TRADUCTOR</h3>

<div class="chat-box">

<textarea id="textoTraducir" rows="4" placeholder="Escribe el texto aquí..."></textarea>

<br><br>

<select id="idiomaDestino">

<option value="en">Inglés</option>
<option value="es">Español</option>
<option value="fr">Francés</option>
<option value="pt">Portugués</option>
<option value="de">Alemán</option>

</select>

<br><br>

<button class="send" onclick="traducirTexto()">Traducir</button>

<br><br>

<p id="resultadoTraduccion"></p>

</div>

</div>

<!-- MODULO PROYECTOS -->

<div id="moduloProyectos" class="hidden">

<h3>📁 MAIA PROYECTOS</h3>

<div class="chat-box">

<p>Gestión de proyectos activa.</p>

<br>

<a href="/proyectos" style="color:#2563eb;">Ir al módulo completo de Proyectos</a>

<hr>

<h3>🔎 Inteligencia de Mercado Energético</h3>

<button onclick="buscarOportunidades()">
Buscar oportunidades energéticas
</button>

<button onclick="buscarDeals()">
Detectar activos antes del mercado
</button>

<div id="panelOportunidades" class="panel-oportunidades"></div>

</div>

</div>

</div>

<script>

function activarGanado(){ ocultarTodo(); document.getElementById("moduloGanado").classList.remove("hidden"); }

function activarPlantas(){ ocultarTodo(); document.getElementById("moduloPlantas").classList.remove("hidden"); }

function activarTraductor(){ ocultarTodo(); document.getElementById("moduloTraductor").classList.remove("hidden"); }

function activarProyectos(){ ocultarTodo(); document.getElementById("moduloProyectos").classList.remove("hidden"); }

function volverChat(){ ocultarTodo(); document.getElementById("chatNormal").classList.remove("hidden"); }

function ocultarTodo(){

document.getElementById("chatNormal").classList.add("hidden");
document.getElementById("moduloGanado").classList.add("hidden");
document.getElementById("moduloPlantas").classList.add("hidden");
document.getElementById("moduloTraductor").classList.add("hidden");
document.getElementById("moduloProyectos").classList.add("hidden");

}

async function buscarOportunidades(){

const panel = document.getElementById("panelOportunidades")

panel.innerHTML="Buscando oportunidades..."

const res = await fetch("/maia_oportunidades")

const data = await res.json()

panel.innerHTML="<h4>Oportunidades detectadas</h4>"

data.oportunidades.forEach(o=>{

panel.innerHTML+=`
<div class="card-oportunidad">
<b>${o.titulo}</b><br>
Pais: ${o.pais}<br>
Tecnologia: ${o.tecnologia}<br>
Potencia: ${o.potencia_mw} MW<br>
Empresa: ${o.empresa}<br>
Contacto: ${o.contacto}
</div>
`

})

}

async function buscarDeals(){

const panel = document.getElementById("panelOportunidades")

panel.innerHTML="Buscando activos..."

const res = await fetch("/maia_deal_finder")

const data = await res.json()

panel.innerHTML="<h4>Activos detectados antes del mercado</h4>"

data.deals.forEach(o=>{

panel.innerHTML+=`
<div class="card-oportunidad">
<b>${o.titulo}</b><br>
Pais: ${o.pais}<br>
Tecnologia: ${o.tecnologia}<br>
Potencia: ${o.potencia_mw} MW<br>
Empresa: ${o.empresa}<br>
Contacto: ${o.contacto}
</div>
`

})

}

</script>

</body>

</html>
