<!DOCTYPE html>
<html>
<head>
    <title>MAIA INDUSTRIAL</title>

    <!-- THREE -->
    <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>

    <style>
        body { font-family: Arial; background:#0f172a; color:#e5e7eb; }
        textarea { width:100%; height:80px; padding:10px; }

        button {
            padding:10px; margin:5px;
            background:#2563eb; color:white;
            border:none; cursor:pointer;
        }

        .btn-danger{ background:#ef4444; }
        .btn-info{ background:#0ea5e9; }

        .panel { margin-top:20px; }

        .bloque{
            background:#020617;
            margin-top:15px;
            padding:15px;
            border-left:4px solid #22c55e;
        }

        .item{ margin-left:15px; cursor:pointer; }

        .codigo{
            background:black;
            padding:10px;
            margin-top:10px;
            display:none;
            white-space:pre;
            font-size:12px;
        }

        .folder{ color:#38bdf8; }
        .file{ color:#22c55e; }

        .progress{ width:100%; background:#1e293b; margin-top:10px; }

        .progress-bar{
            height:14px;
            width:0%;
            background:#22c55e;
            text-align:center;
            font-size:10px;
        }

        .progress-text{ font-size:12px; margin-top:5px; }

        .modal{
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.85);
            display:none;
            padding:40px;
        }

        .modal-content{
            background:#020617;
            padding:20px;
            max-width:800px;
        }

        #viewer3d{
            width:100%;
            height:300px;
            background:black;
            margin-top:10px;
        }
    </style>
</head>

<body>

<h1>🧠 MAIA INDUSTRIAL</h1>

<textarea id="idea" placeholder="Describe tu drone..."></textarea><br>

<button onclick="evaluar()">🚀 Generar</button>
<button class="btn-danger" onclick="limpiarUI()">🧹 Limpiar</button>
<button class="btn-info" onclick="abrirInfo()">🧠 ¿Qué puede hacer MAIA?</button>

<div class="progress">
    <div id="bar" class="progress-bar">0%</div>
</div>

<div id="progressText" class="progress-text">Esperando...</div>

<div id="resultado"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2>🚀 Capacidades MAIA NIVEL 4</h2>
        <div id="capacidades"></div>
        <button onclick="cerrarInfo()">Cerrar</button>
    </div>
</div>

<script>

// MOTOR
async function evaluar(){
    let idea = document.getElementById("idea").value;
    if(!idea){ alert("Ingresa una idea"); return; }

    let paso=0, data={}, progreso=0;

    const estados=[
        "Analizando idea...",
        "Diseñando hardware...",
        "Generando software...",
        "Simulando física...",
        "Integrando sistemas...",
        "Modelo 3D...",
        "Finalizando..."
    ];

    while(true){
        progreso=Math.min(progreso+14,95);
        actualizarBarra(progreso, estados[paso]);

        let res=await fetch("/maia_step",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({idea,paso,data})
        });

        let json=await res.json();

        if(json.final){
            actualizarBarra(100,"Completado");
            render(json.resultado);
            actualizarCapacidades();
            return;
        }

        paso=json.paso;
        data=json.data;
    }
}

// PROGRESO
function actualizarBarra(p,txt){
    let bar=document.getElementById("bar");
    bar.style.width=p+"%";
    bar.innerText=p+"%";
    document.getElementById("progressText").innerText=txt;
}

// LIMPIAR
function limpiarUI(){
    document.getElementById("idea").value="";
    document.getElementById("resultado").innerHTML="";
    actualizarBarra(0,"Esperando...");
}

// RENDER
function render(data){
    let html=`<div class="panel">`;

    html+=`<div class="bloque"><h2>🚀 ${data.nivel_maia}</h2></div>`;

    html+=renderBloque("🧠 Viabilidad",data.viabilidad);
    html+=renderBloque("📊 Analisis de Idea",data.analisis_idea);
    html+=renderBloque("🔩 Hardware",data.hardware,true);
    html+=renderBloque("💻 Software",data.software,true);
    html+=renderBloque("📡 Telemetría",data.telemetria);
    html+=renderBloque("⚙️ Física",data.fisica);
    html+=renderBloque("⚠️ Riesgos",data.riesgos);

    if(data.modelo_3d){
        html+=`
        <div class="bloque">
            <h3>🧱 Modelo 3D</h3>
            ${renderTree(data.modelo_3d,0,true)}
            <div id="viewer3d"></div>
        </div>`;
    }

    html+=`</div>`;
    document.getElementById("resultado").innerHTML=html;

    if(data.modelo_3d) iniciar3D();
}

// BLOQUES
function renderBloque(titulo,data,expandir=false){
    if(!data) return "";
    let html=`<div class="bloque"><h3>${titulo}</h3>`;

    if(Array.isArray(data)){
        data.forEach(x=> html+=`<div class="item">• ${x}</div>`);
    }else{
        html+=renderTree(data,0,expandir);
    }

    html+=`</div>`;
    return html;
}

// TREE FIX REAL
function renderTree(obj,nivel=0,expandir=false){

    let html="";

    if(Array.isArray(obj)){
        obj.forEach((v,i)=>{
            html+=renderTree({["["+i+"]"]:v},nivel,expandir);
        });
        return html;
    }

    Object.keys(obj).forEach(key=>{

        let val=obj[key];
        let id="node_"+Math.random().toString(36).substring(2)+Date.now();
        let autoOpen=expandir && nivel<3;

        if(typeof val==="object" && val!==null){

            html+=`
            <div class="item folder" onclick="toggle('${id}')">📁 ${escapeHtml(key)}</div>
            <div id="${id}" style="display:${autoOpen?'block':'none'};margin-left:15px;">
                ${renderTree(val,nivel+1,expandir)}
            </div>`;

        }else{

            html+=`
            <div class="item file" onclick="toggle('${id}')">📄 ${escapeHtml(key)}</div>
            <pre id="${id}" class="codigo">${escapeHtml(val)}</pre>`;
        }
    });

    return html;
}

// UTIL
function escapeHtml(text){
    if(typeof text!=="string") return JSON.stringify(text,null,2);
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function toggle(id){
    let el=document.getElementById(id);
    if(!el) return;
    el.style.display=el.style.display==="block"?"none":"block";
}

// 3D
function iniciar3D(){
    if(typeof THREE==="undefined") return;

    let c=document.getElementById("viewer3d");
    let scene=new THREE.Scene();
    let camera=new THREE.PerspectiveCamera(75,c.clientWidth/300,0.1,1000);

    let renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(c.clientWidth,300);
    c.innerHTML="";
    c.appendChild(renderer.domElement);

    let mat=new THREE.MeshNormalMaterial();

    scene.add(new THREE.Mesh(new THREE.BoxGeometry(1,0.3,1),mat));

    [[1.5,0,0],[-1.5,0,0],[0,0,1.5],[0,0,-1.5]].forEach(p=>{
        let m=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,0.1),mat);
        m.position.set(...p);
        scene.add(m);
    });

    camera.position.z=6;

    function animate(){
        requestAnimationFrame(animate);
        scene.rotation.y+=0.01;
        renderer.render(scene,camera);
    }
    animate();
}

// MODAL
function abrirInfo(){ document.getElementById("modal").style.display="block"; }
function cerrarInfo(){ document.getElementById("modal").style.display="none"; }

// INFO
function actualizarCapacidades(){
    document.getElementById("capacidades").innerHTML=`
        <h3>🧠 Análisis</h3><p>Viabilidad técnica real.</p>
        <h3>🔩 Hardware</h3><p>Diseño completo.</p>
        <h3>💻 Software</h3><p>Arquitectura modular.</p>
        <h3>📡 Telemetría</h3><p>Tiempo real.</p>
        <h3>⚙️ Física</h3><p>Simulación.</p>
        <h3>🧱 3D</h3><p>Modelo drone.</p>
    `;
}

</script>

</body>
</html>
