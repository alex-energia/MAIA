<!DOCTYPE html>
<html>
<head>
<title>MAIA INDUSTRIAL</title>
<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>

<style>
body{font-family:Consolas;background:#0a0f1f;color:#e5e7eb;}
textarea{width:100%;height:80px;background:#020617;color:white;border:1px solid #1e293b;}
button{padding:10px;margin:5px;background:#2563eb;color:white;border:none;cursor:pointer;}
.btn-danger{background:#ef4444;}
.btn-info{background:#0ea5e9;}

.barra{width:100%;height:10px;background:#111;margin-top:10px;}
.progreso{height:100%;width:0%;background:#22c55e;transition:0.3s;}

.bloque{background:#020617;margin-top:15px;padding:15px;border-left:4px solid #22c55e;}
.scroll{max-height:400px;overflow:auto;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;}
.modal-content{
background:#020617;
padding:20px;
max-width:900px;
margin:auto;
margin-top:5%;
max-height:80vh;
overflow:auto;
}

#viewer3d{height:350px;}
</style>
</head>

<body>

<h1>🧠 MAIA INDUSTRIAL</h1>

<textarea id="idea"></textarea><br>

<button onclick="evaluar()">🚀 Generar</button>
<button class="btn-danger" onclick="limpiarUI()">🧹 Limpiar</button>
<button class="btn-info" onclick="abrirInfo()">🧠 Capacidades</button>

<div class="barra"><div id="progreso" class="progreso"></div></div>

<div id="resultado"></div>

<div id="modal" class="modal">
<div class="modal-content">
<div id="capacidades"></div>
<button onclick="cerrarInfo()">Cerrar</button>
</div>
</div>

<script>

/* ========================= NIVEL DINÁMICO ========================= */
let NIVEL_MAIA = 15;

/* ========================= DEFINICIÓN DE FASES ========================= */
const FASES = [
{titulo:"FASE 1 - VIABILIDAD",desc:"Evalúa si el problema que resuelve el drone es real, urgente y tiene impacto económico o social. Analiza demanda, contexto operativo y necesidad industrial."},

{titulo:"FASE 2 - HARDWARE",desc:"Diseña la arquitectura física completa: materiales, estructura, motores, hélices, sensores y sistema energético. Se optimiza resistencia, peso y eficiencia."},

{titulo:"FASE 3 - SOFTWARE",desc:"Define la lógica de control del drone incluyendo navegación autónoma, estabilidad, procesamiento de datos y toma de decisiones en tiempo real."},

{titulo:"FASE 4 - TELEMETRÍA",desc:"Sistema de monitoreo en tiempo real que transmite variables críticas como ubicación, velocidad, batería y estado del sistema."},

{titulo:"FASE 5 - FÍSICA",desc:"Analiza empuje, peso, aerodinámica y estabilidad para garantizar que el drone pueda volar de forma segura y eficiente."},

{titulo:"FASE 6 - RIESGOS",desc:"Identifica fallos críticos, operativos y sistémicos incluyendo clima, batería, motores y errores de software."},

{titulo:"FASE 7 - MODELO 3D",desc:"Representación visual del drone para validar estructura, distribución y diseño funcional."},

{titulo:"FASE 8 - ENERGÍA",desc:"Optimiza consumo energético, autonomía y posibles sistemas híbridos o renovables."},

{titulo:"FASE 9 - INTELIGENCIA ARTIFICIAL",desc:"Implementa análisis inteligente como visión computacional, detección de eventos y aprendizaje automático."},

{titulo:"FASE 10 - NEGOCIO",desc:"Define monetización, costos operativos, retorno de inversión y escalabilidad comercial."},

{titulo:"FASE 11 - SEGURIDAD",desc:"Incluye redundancias, protocolos de emergencia y tolerancia a fallos críticos."},

{titulo:"FASE 12 - COMUNICACIONES",desc:"Garantiza transmisión estable de datos mediante protocolos robustos y redundancia."},

{titulo:"FASE 13 - AUTONOMÍA",desc:"Nivel de independencia del drone sin intervención humana."},

{titulo:"FASE 14 - OPTIMIZACIÓN",desc:"Mejora continua del sistema en eficiencia, rendimiento y costo."},

{titulo:"FASE 15 - ESCALABILIDAD INDUSTRIAL",desc:"Capacidad de replicar el sistema a gran escala en operaciones reales."}
];

/* ========================= VOZ ========================= */
let vozActiva=false;
let recognition=null;

function hablar(texto){
let msg=new SpeechSynthesisUtterance(texto);
msg.lang="es-US";
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

function toggleVoice(){
vozActiva=!vozActiva;
if(vozActiva){
hablar("Hola Alex, soy MAIA. ¿En qué puedo ayudarte?");
iniciarEscucha();
}else{
if(recognition) recognition.stop();
}
}

function iniciarEscucha(){
recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang="es-CO";
recognition.continuous=true;

recognition.onresult=e=>{
let texto=e.results[e.results.length-1][0].transcript;
let respuesta=generarRespuesta(texto);
hablar(respuesta);
};

recognition.start();
}

/* ========================= IA ========================= */
function generarRespuesta(msg){
msg=msg.toLowerCase();

if(msg.includes("hardware")) return "El drone usa estructura de carbono, motores brushless y sensores avanzados.";
if(msg.includes("software")) return "Sistema autónomo con control inteligente.";
if(msg.includes("riesgo")) return "Riesgos: batería, motores y condiciones ambientales.";

return "Haz una pregunta específica.";
}

/* ========================= MOTOR ========================= */
async function evaluar(){

let idea=document.getElementById("idea").value;
if(!idea){alert("Ingresa una idea");return;}

let progreso=document.getElementById("progreso");

for(let i=0;i<=100;i+=20){
await new Promise(r=>setTimeout(r,200));
progreso.style.width=i+"%";
}

let data = generarDroneReal(idea);
render(data);
}

/* ========================= GENERADOR ========================= */
function generarDroneReal(idea){
return {
viabilidad:{estado:"VIABLE",justificacion:"Alta demanda en incendios forestales"},
hardware:{estructura:"carbono",motores:4,sensores:["lidar","termico"]},
software:{control:"autonomo"},
riesgos:{criticos:["bateria","motor"]}
};
}

/* ========================= RENDER ========================= */
function render(data){
let html="";
for(let k in data){
html+=`<div class="bloque"><h3>${k}</h3><div class="scroll"><pre>${JSON.stringify(data[k],null,2)}</pre></div></div>`;
}
html+=`<div class="bloque"><h3>🧱 Modelo 3D</h3><div id="viewer3d"></div></div>`;
resultado.innerHTML=html;
iniciar3D();
}

/* ========================= 3D ========================= */
function iniciar3D(){

let c=document.getElementById("viewer3d");

let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,c.clientWidth/350,0.1,1000);
let renderer=new THREE.WebGLRenderer({antialias:true});

renderer.setSize(c.clientWidth,350);
c.innerHTML="";
c.appendChild(renderer.domElement);

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

let body=new THREE.Mesh(
new THREE.BoxGeometry(2,0.6,2),
new THREE.MeshStandardMaterial({color:0x00ffcc})
);
scene.add(body);

camera.position.z=8;

function animate(){
requestAnimationFrame(animate);
scene.rotation.y+=0.01;
renderer.render(scene,camera);
}
animate();
}

/* ========================= MODAL DINÁMICO ========================= */
function abrirInfo(){

document.getElementById("modal").style.display="block";

let html=`<h2>🔥 MAIA NIVEL ${NIVEL_MAIA}</h2>`;

for(let i=0;i<NIVEL_MAIA;i++){
html+=`<h3>${FASES[i].titulo}</h3><p>${FASES[i].desc}</p>`;
}

document.getElementById("capacidades").innerHTML=html;
}

function cerrarInfo(){
document.getElementById("modal").style.display="none";
}

/* ========================= UI ========================= */
function limpiarUI(){
idea.value="";
resultado.innerHTML="";
progreso.style.width="0%";
}

</script>

</body>
</html>
