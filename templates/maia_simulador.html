<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>MAIA DRONE SIM</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#cesiumContainer{
width:100%;
height:100vh;
}

.panel{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.85);
color:white;
padding:20px;
border-radius:10px;
width:270px;
}

button{
padding:10px 20px;
margin:5px;
background:#1e90ff;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
width:100%;
}

button:hover{
background:#0f6bd6;
}

select{
width:100%;
padding:8px;
margin-top:5px;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
background:black;
color:#00ff00;
font-family:monospace;
}

#telemetria{
margin-top:10px;
font-size:14px;
line-height:20px;
}

</style>

</head>

<body>

<div id="cesiumContainer"></div>

<div class="panel">

<h2>🚁 MAIA DRONE</h2>

<label>Entorno</label>

<select id="entorno">
<option value="montana">Montaña</option>
<option value="rio">Río</option>
<option value="oceano">Océano</option>
<option value="ciudad">Ciudad</option>
</select>

<label>Algoritmo</label>

<select id="algoritmo">
<option value="patrulla">Patrulla</option>
<option value="explorar">Explorar</option>
<option value="interceptor">Interceptor</option>
</select>

<button onclick="cargarEntorno()">Cargar entorno</button>

<textarea id="codigo">
subir(100)
mover(0.002,0.002)
subir(-50)
</textarea>

<button onclick="ejecutarAlgoritmo()">Ejecutar algoritmo</button>

<button onclick="resetDrone()">Reset</button>

<div id="telemetria">
Lat: -
<br>
Lon: -
<br>
Alt: -
</div>

<p style="font-size:12px;margin-top:10px;">
Controles manuales<br>
W / S / A / D mover<br>
Q subir<br>
E bajar
</p>

</div>

<script>

Cesium.Ion.defaultAccessToken = "TU_TOKEN_CESIUM_AQUI";

var viewer = new Cesium.Viewer('cesiumContainer',{
terrainProvider: Cesium.createWorldTerrain(),
timeline:false,
animation:false
});

var lat = 4.5709;
var lon = -74.2973;
var alt = 100;

var drone = viewer.entities.add({
name:"Drone",
position: Cesium.Cartesian3.fromDegrees(lon,lat,alt),
box:{
dimensions:new Cesium.Cartesian3(10,10,5),
material:Cesium.Color.RED
}
});

viewer.trackedEntity = drone;

var speed = 0.001;

function actualizarDrone(){

drone.position = Cesium.Cartesian3.fromDegrees(lon,lat,alt);

document.getElementById("telemetria").innerHTML =
"Lat: "+lat.toFixed(6)+"<br>"+
"Lon: "+lon.toFixed(6)+"<br>"+
"Alt: "+alt.toFixed(0);

}

document.addEventListener("keydown",function(e){

if(e.key=="w") lat += speed;
if(e.key=="s") lat -= speed;
if(e.key=="a") lon -= speed;
if(e.key=="d") lon += speed;
if(e.key=="q") alt += 10;
if(e.key=="e") alt -= 10;

actualizarDrone();

});

function subir(m){
alt += m;
actualizarDrone();
}

function mover(dlat,dlon){
lat += dlat;
lon += dlon;
actualizarDrone();
}

function ejecutarAlgoritmo(){

let codigo = document.getElementById("codigo").value;
let lineas = codigo.split("\n");

let i = 0;

function ejecutarLinea(){

if(i >= lineas.length) return;

try{
eval(lineas[i]);
}catch(e){
console.log("error en algoritmo");
}

i++;

setTimeout(ejecutarLinea,800);

}

ejecutarLinea();

}

function cargarEntorno(){

var entorno = document.getElementById("entorno").value;

if(entorno=="montana"){
lat=-13.163;
lon=-72.545;
alt=200;
}

if(entorno=="rio"){
lat=-3.465;
lon=-62.215;
alt=150;
}

if(entorno=="oceano"){
lat=0;
lon=-140;
alt=200;
}

if(entorno=="ciudad"){
lat=40.7128;
lon=-74.006;
alt=150;
}

viewer.camera.flyTo({
destination: Cesium.Cartesian3.fromDegrees(lon,lat,alt*10)
});

actualizarDrone();

}

function resetDrone(){

lat = 4.5709;
lon = -74.2973;
alt = 100;

actualizarDrone();

}

actualizarDrone();

</script>

</body>
</html>
