<!DOCTYPE html>
<html>
<head>
<title>MAIA INVENT</title>

<!-- ✅ FIX REAL -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:#e5e7eb;}

textarea { width:100%; height:80px; border-radius:8px; padding:10px;}

button {
    padding:10px; margin:5px;
    border-radius:8px; border:none;
    cursor:pointer;
    background:#2563eb; color:white;
}

.panel { background:#020617; padding:15px; border-radius:10px; margin-top:20px;}
.bloque { margin-top:20px; padding:12px; background:#020617; border-radius:10px; border:1px solid #1e293b;}

.ok { color:#22c55e; }
.bad { color:#ef4444; }

pre {
    background:black;
    padding:10px;
    border-radius:8px;
    overflow:auto;
    font-size:12px;
}

/* SOFTWARE */
.modulo {
    background:#0b1220;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    cursor:pointer;
    border:1px solid #1e293b;
}
.codigo {
    display:none;
    margin-top:10px;
}

/* HARDWARE PRO */
.hw-section{
    margin-bottom:10px;
    padding:10px;
    background:#111;
    border-radius:8px;
}

/* BARRA */
#barra_container {
    width:100%;
    background:#111;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
    display:none;
}
#barra {
    width:0%;
    height:25px;
    background:#22c55e;
    text-align:center;
    color:white;
}
</style>
</head>

<body>

<h1>🧠 MAIA INVENT</h1>

<textarea id="idea"></textarea>

<br><br>

<button onclick="evaluar()">🚀 Generar Ingeniería</button>
<button onclick="limpiarUI()">🧹 Limpiar</button>

<div id="barra_container">
    <div id="barra">0%</div>
</div>

<div id="resultado"></div>

<script>

// =========================
// GENERAR
// =========================
async function evaluar(){

    const idea = document.getElementById("idea").value;

    if(!idea){
        alert("Ingresa una idea válida");
        return;
    }

    document.getElementById("barra_container").style.display = "block";

    await fetch("/evaluar_drone",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({idea})
    });

    monitorearResultado();
}

// =========================
// PROGRESO FIX REAL
// =========================
function monitorearResultado(){

    let barra = document.getElementById("barra");

    let intervalo = setInterval(async () => {

        try{
            let r = await fetch("/maia_progreso");
            let data = await r.json();

            barra.style.width = data.progreso + "%";
            barra.innerText = data.progreso + "%";

            if(data.estado === "COMPLETADO"){
                clearInterval(intervalo);
                cargarResultadoFinal();
            }
        }catch(e){
            clearInterval(intervalo);
        }

    },600);
}

// =========================
// RESULTADO
// =========================
async function cargarResultadoFinal(){

    let res = await fetch("/maia_resultado");
    let data = await res.json();

    let html = `<div class="panel">`;

    html += `<h2>${data.viabilidad || "SIN RESULTADO"}</h2>`;

    // 📦 ANALISIS
    html += `<div class="bloque"><h3>📦 Ingeniería</h3>
    <pre>${JSON.stringify(data.analisis,null,2)}</pre></div>`;

    // ⚡ FISICA
    html += `<div class="bloque"><h3>⚡ Física</h3>
    <pre>${JSON.stringify(data.fisica,null,2)}</pre></div>`;

    // 🔥 HARDWARE REAL ESTRUCTURADO
    if(data.hardware){
        html += `<div class="bloque"><h3>⚙️ Hardware (Nivel Ingeniería)</h3>`;

        Object.entries(data.hardware).forEach(([k,v])=>{
            html += `<div class="hw-section">
                <b>${k.toUpperCase()}</b><br>
                <pre>${JSON.stringify(v,null,2)}</pre>
            </div>`;
        });

        html += `</div>`;
    }

    // 💻 SOFTWARE REAL
    if(data.software){
        html += `<div class="bloque"><h3>💻 Software IA</h3>`;

        (data.software.modulos || []).forEach((m,i)=>{

            html += `
            <div class="modulo" onclick="toggleCodigo(${i})">
                <b>[${m.categoria || "CORE"}]</b> ${m.nombre}
                <div class="codigo" id="code_${i}">
                    <pre>${m.codigo}</pre>
                </div>
            </div>`;
        });

        html += `</div>`;
    }

    // 📡 TELEMETRIA
    html += `<div class="bloque"><h3>📡 Telemetría</h3>
    <pre id="telemetria_data">Procesando...</pre></div>`;

    // 🧊 3D MEJORADO
    html += `<div class="bloque">
        <h3>🧊 Modelo 3D</h3>
        <canvas id="viewer3d" style="width:100%; height:400px;"></canvas>
    </div>`;

    html += `</div>`;

    document.getElementById("resultado").innerHTML = html;

    // TELEMETRIA
    try{
        let salida = data.salida || "";
        let raw = salida.split("###DATA_START###")[1]?.split("###DATA_END###")[0];
        document.getElementById("telemetria_data").innerText =
            raw ? raw : "Sin telemetría real";
    }catch(e){
        document.getElementById("telemetria_data").innerText = "Error";
    }

    render3D();
}

// =========================
// TOGGLE
// =========================
function toggleCodigo(i){
    let el = document.getElementById("code_"+i);
    el.style.display = el.style.display === "block" ? "none" : "block";
}

// =========================
// 3D REAL (DRON)
// =========================
function render3D(){

    const canvas = document.getElementById("viewer3d");
    if(!canvas) return;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75,2,0.1,1000);
    const renderer = new THREE.WebGLRenderer({canvas});

    renderer.setSize(canvas.clientWidth,400);

    scene.add(new THREE.AmbientLight(0xffffff,0.6));

    // cuerpo
    let body = new THREE.Mesh(
        new THREE.BoxGeometry(1,0.3,1),
        new THREE.MeshStandardMaterial({color:0x00ffaa})
    );
    scene.add(body);

    // brazos + motores
    for(let i=0;i<4;i++){
        let angle = i*Math.PI/2;

        let arm = new THREE.Mesh(
            new THREE.BoxGeometry(2,0.1,0.1),
            new THREE.MeshStandardMaterial({color:0xffffff})
        );

        arm.rotation.y = angle;
        scene.add(arm);

        let motor = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2,0.2,0.2,16),
            new THREE.MeshStandardMaterial({color:0xff0000})
        );

        motor.position.set(Math.cos(angle)*1,0.2,Math.sin(angle)*1);
        scene.add(motor);
    }

    camera.position.z = 5;

    function animate(){
        requestAnimationFrame(animate);
        scene.rotation.y += 0.01;
        renderer.render(scene,camera);
    }

    animate();
}

// =========================
// LIMPIAR
// =========================
function limpiarUI(){
    document.getElementById("idea").value = "";
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("barra_container").style.display = "none";
    document.getElementById("barra").style.width = "0%";
    document.getElementById("barra").innerText = "0%";
}

</script>

</body>
</html>
