<!DOCTYPE html>
<html>
<head>
<title>MAIA INDUSTRIAL</title>

<!-- THREE LOCAL FIX (si falla CDN no rompe) -->
<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:#e5e7eb;
}

textarea {
    width:100%;
    height:80px;
    padding:10px;
}

button {
    padding:10px;
    margin:5px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

.btn-danger{ background:#ef4444; }
.btn-info{ background:#0ea5e9; }

.panel { margin-top:20px; }

.bloque {
    background:#020617;
    margin-top:15px;
    padding:15px;
    border-left:4px solid #22c55e;
}

.item {
    margin-left:15px;
    cursor:pointer;
}

.codigo {
    background:black;
    padding:10px;
    margin-top:10px;
    display:none;
    white-space:pre;
    font-size:12px;
}

.folder { color:#38bdf8; }
.file { color:#22c55e; }

/* 🔥 PROGRESO */
.progress {
    width:100%;
    background:#1e293b;
    margin-top:10px;
}

.progress-bar {
    height:10px;
    width:0%;
    background:#22c55e;
}

/* 🔥 MODAL */
.modal {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    padding:40px;
}

.modal-content {
    background:#020617;
    padding:20px;
}
</style>
</head>

<body>

<h1>🧠 MAIA INDUSTRIAL</h1>

<textarea id="idea" placeholder="Describe tu drone..."></textarea><br>

<button onclick="evaluar()">🚀 Generar</button>
<button class="btn-danger" onclick="limpiarUI()">🧹 Limpiar</button>
<button class="btn-info" onclick="abrirInfo()">🧠 ¿Qué puede hacer MAIA?</button>

<!-- 🔥 PROGRESO -->
<div class="progress">
    <div id="bar" class="progress-bar"></div>
</div>

<div id="resultado"></div>

<!-- 🔥 MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2>🚀 Capacidades MAIA</h2>
        <div id="capacidades"></div>
        <button onclick="cerrarInfo()">Cerrar</button>
    </div>
</div>

<script>

// =========================
// MOTOR
// =========================
async function evaluar(){
    let idea = document.getElementById("idea").value;
    if(!idea){ alert("Ingresa una idea"); return; }

    let paso = 0;
    let data = {};
    let progreso = 0;

    while(true){

        progreso += 15;
        actualizarBarra(progreso);

        let res = await fetch("/maia_step", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({idea, paso, data})
        });

        let json = await res.json();

        if(json.error){
            alert(json.error);
            return;
        }

        if(json.final){
            actualizarBarra(100);
            render(json.resultado);
            actualizarCapacidades(json.resultado);
            return;
        }

        paso = json.paso;
        data = json.data;
    }
}

// =========================
// PROGRESO
// =========================
function actualizarBarra(p){
    document.getElementById("bar").style.width = p + "%";
}

// =========================
// LIMPIAR
// =========================
function limpiarUI(){
    document.getElementById("idea").value = "";
    document.getElementById("resultado").innerHTML = "";
    actualizarBarra(0);
}

// =========================
// RENDER GENERAL
// =========================
function render(data){

    let html = `<div class="panel">`;

    html += renderBloque("🧠 Viabilidad", data.viabilidad);
    html += renderBloque("🔩 Hardware", data.hardware);
    html += renderBloque("📦 BOM", data.bom);
    html += renderBloque("💻 Software", data.software);
    html += renderBloque("📡 Comunicaciones", data.comunicaciones);
    html += renderBloque("📡 Telemetría", data.telemetria);
    html += renderBloque("⚙️ Física", data.fisica);
    html += renderBloque("⚠️ Riesgos", data.riesgos);
    html += renderBloque("🧱 Modelo 3D", data.modelos_3d);

    html += `</div>`;

    document.getElementById("resultado").innerHTML = html;
}

// =========================
// BLOQUE UNIVERSAL
// =========================
function renderBloque(titulo, data){

    if(!data) return "";

    let html = `<div class="bloque"><h3>${titulo}</h3>`;

    if(Array.isArray(data)){
        data.forEach(x=>{
            html += `<div class="item">• ${escapeHtml(x)}</div>`;
        });
    }else{
        html += renderTree(data);
    }

    html += `</div>`;
    return html;
}

// =========================
// TREE INDUSTRIAL
// =========================
function renderTree(obj){

    let html = "";

    for(let key in obj){

        let val = obj[key];
        let id = "node_" + Math.random();

        if(typeof val === "object" && val !== null){

            html += `
            <div class="item folder" onclick="toggle('${id}')">
                📁 ${key}
            </div>
            <div id="${id}" style="display:none; margin-left:15px;">
                ${renderTree(val)}
            </div>
            `;

        }else{

            html += `
            <div class="item file" onclick="toggle('${id}')">
                📄 ${key}
            </div>
            <pre id="${id}" class="codigo">${escapeHtml(val)}</pre>
            `;
        }
    }

    return html;
}

// =========================
// TOGGLE
// =========================
function toggle(id){
    let el = document.getElementById(id);
    if(!el) return;
    el.style.display = el.style.display === "block" ? "none" : "block";
}

// =========================
// ESCAPE
// =========================
function escapeHtml(text){

    if(typeof text !== "string"){
        try{
            return JSON.stringify(text, null, 2);
        }catch(e){
            return "N/A";
        }
    }

    return text
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

// =========================
// MODAL
// =========================
function abrirInfo(){
    document.getElementById("modal").style.display = "block";
}

function cerrarInfo(){
    document.getElementById("modal").style.display = "none";
}

// =========================
// CAPACIDADES DINÁMICAS
// =========================
function actualizarCapacidades(data){

    let capacidades = [];

    if(data.hardware) capacidades.push("Diseño de hardware aeronáutico");
    if(data.software) capacidades.push("Arquitectura de software autónomo");
    if(data.fisica) capacidades.push("Simulación física realista");
    if(data.comunicaciones) capacidades.push("Sistemas de comunicación dron-control");
    if(data.telemetria) capacidades.push("Monitoreo en tiempo real");
    if(data.modelos_3d) capacidades.push("Generación de modelos 3D");

    let html = "";
    capacidades.forEach(c=>{
        html += `<div>✔ ${c}</div>`;
    });

    document.getElementById("capacidades").innerHTML = html;
}

</script>
</body>
</html>
