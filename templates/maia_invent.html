<!DOCTYPE html>
<html>
<head>
<title>MAIA INVENT</title>

<!-- 🔥 THREE JS ESTABLE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e5e7eb;
}
textarea {
    width: 100%;
    height: 80px;
    border-radius: 8px;
    padding: 10px;
}
button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #2563eb;
    color: white;
}
.panel {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}
.bloque {
    margin-top: 20px;
    padding: 10px;
    background: #020617;
    border-radius: 10px;
    border: 1px solid #1e293b;
}
.ok { color: #22c55e; }
.bad { color: #ef4444; }

pre {
    background: black;
    padding: 10px;
    border-radius: 8px;
    overflow: auto;
    font-size: 12px;
    max-height: 300px;
}

#barra_container {
    width: 100%;
    background: #111;
    margin-top: 20px;
    border-radius: 10px;
    overflow: hidden;
    display: none;
}
#barra {
    width: 0%;
    height: 25px;
    background: #22c55e;
    text-align: center;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>🧠 MAIA INVENT</h1>
<p>Generador de ingeniería de drones (FASE 23 🔥)</p>

<textarea id="idea"></textarea><br><br>

<button onclick="evaluar()">🚀 Generar Ingeniería</button>
<button onclick="limpiarUI()">🧹 Limpiar</button>

<div id="resultado"></div>

<div id="barra_container">
    <div id="barra">0%</div>
</div>

<script>

// =========================
// 🚀 GENERAR
// =========================
async function evaluar(){
    const idea = document.getElementById("idea").value;

    if(!idea || idea.length < 3){
        alert("⚠️ Ingresa una idea válida");
        return;
    }

    document.getElementById("barra_container").style.display = "block";
    document.getElementById("resultado").innerHTML = "🧠 MAIA procesando...";

    await fetch("/evaluar_drone", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({idea})
    });

    monitorearResultado();
}

// =========================
// 📊 PROGRESO
// =========================
function monitorearResultado(){
    let barra = document.getElementById("barra");

    let intervalo = setInterval(async () => {
        try{
            let r = await fetch("/maia_progreso");
            let data = await r.json();

            barra.style.width = data.progreso + "%";
            barra.innerText = data.progreso + "%";

            if(data.progreso >= 100){
                clearInterval(intervalo);
                cargarResultadoFinal();
            }

        }catch(e){
            clearInterval(intervalo);
        }

    }, 700);
}

// =========================
// 🧠 RESULTADO PRO REAL
// =========================
async function cargarResultadoFinal(){

    let res = await fetch("/maia_resultado");
    let data = await res.json();

    let html = `<div class="panel">`;

    html += `<h2 class="${(data.viabilidad||"").includes("VIABLE")?"ok":"bad"}">
                ${data.viabilidad || "SIN RESULTADO"}
            </h2>`;

    // 📦 ANALISIS ENRIQUECIDO
    html += `<div class="bloque"><h3>📦 Ingeniería</h3>
    <pre>${JSON.stringify(data.analisis,null,2)}</pre></div>`;

    // ⚡ FISICA
    html += `<div class="bloque"><h3>⚡ Física avanzada</h3>
    <pre>${JSON.stringify(data.fisica,null,2)}</pre></div>`;

    // ⚠️ RIESGOS
    html += `<div class="bloque"><h3>⚠️ Riesgos</h3>
    <pre>${(data.riesgos||["Sin datos"]).join("\n")}</pre></div>`;

    // ⚙️ HARDWARE
    if(data.hardware){
        html += `<div class="bloque"><h3>⚙️ Hardware</h3>
        <pre>${JSON.stringify(data.hardware,null,2)}</pre></div>`;
    }

    // 💻 SOFTWARE
    if(data.software){
        html += `<div class="bloque"><h3>💻 Software IA</h3>
        <pre>${JSON.stringify(data.software,null,2)}</pre></div>`;
    }

    // 📡 TELEMETRIA
    html += `<div class="bloque"><h3>📡 Telemetría</h3>
    <pre id="telemetria_data">Procesando...</pre></div>`;

    // 🧊 3D
    html += `<div class="bloque">
        <h3>🧊 Modelo 3D</h3>
        <canvas id="viewer3d" style="width:100%; height:400px;"></canvas>
    </div>`;

    html += `</div>`;

    document.getElementById("resultado").innerHTML = html;

    // =========================
    // TELEMETRIA ROBUSTA
    // =========================
    try{
        let salida = data.salida || "";

        let raw = salida.split("###DATA_START###")[1]?.split("###DATA_END###")[0];

        if(raw){
            let json = JSON.parse(raw);

            let texto = json.map(d =>
                `t:${d.t || 0}s | alt:${d.alt || 0}m | vel:${d.vel || 0}m/s`
            ).join("\n");

            document.getElementById("telemetria_data").innerText = texto;

        }else{
            document.getElementById("telemetria_data").innerText = "Sin telemetría real";
        }

    }catch(e){
        document.getElementById("telemetria_data").innerText = "Error parseando telemetría";
    }

    render3D();
}

// =========================
// 🧊 DRON 3D PRO REAL
// =========================
function render3D(){

    const canvas = document.getElementById("viewer3d");
    if(!canvas) return;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0f1a);

    const camera = new THREE.PerspectiveCamera(75, 2, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({canvas, antialias:true});

    renderer.setSize(canvas.clientWidth, 400);

    // 🔥 luces realistas
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    let light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,5,5);
    scene.add(light);

    // 🔥 cuerpo central PRO
    let body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.6,0.6,0.25,32),
        new THREE.MeshStandardMaterial({color:0x00ffaa, metalness:0.6, roughness:0.3})
    );
    scene.add(body);

    // 🔥 brazos + motores + hélices REALISTAS
    for(let i=0;i<4;i++){

        let angle = i * Math.PI/2;

        // brazo
        let arm = new THREE.Mesh(
            new THREE.BoxGeometry(2.2,0.1,0.1),
            new THREE.MeshStandardMaterial({color:0xffffff})
        );
        arm.rotation.y = angle;
        scene.add(arm);

        // motor
        let motor = new THREE.Mesh(
            new THREE.CylinderGeometry(0.25,0.25,0.2,32),
            new THREE.MeshStandardMaterial({color:0x222222})
        );
        motor.position.set(Math.cos(angle)*1.1,0,Math.sin(angle)*1.1);
        scene.add(motor);

        // hélice doble (más real)
        for(let j=0;j<2;j++){
            let prop = new THREE.Mesh(
                new THREE.BoxGeometry(0.1,0.02,1.4),
                new THREE.MeshStandardMaterial({color:0xff0000})
            );
            prop.position.set(Math.cos(angle)*1.1,0.2,Math.sin(angle)*1.1);
            prop.rotation.y = j * Math.PI/2;
            prop.userData.spin = true;
            scene.add(prop);
        }
    }

    camera.position.z = 6;

    function animate(){
        requestAnimationFrame(animate);

        scene.rotation.y += 0.005;

        scene.children.forEach(obj=>{
            if(obj.userData.spin){
                obj.rotation.y += 0.4;
            }
        });

        renderer.render(scene, camera);
    }

    animate();
}

// =========================
// LIMPIAR
// =========================
function limpiarUI(){
    document.getElementById("idea").value = "";
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("barra_container").style.display = "none";
}

</script>

</body>
</html>
