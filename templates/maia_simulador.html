<!DOCTYPE html>
<html>
<head>
<title>MAIA SIMULADOR GOD</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; }
#ui {
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.7);
    padding:15px;
    border-radius:10px;
}
select, button {
    width:200px;
    margin:5px 0;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<div id="ui">
    <h3>🧠 MAIA CORE</h3>

    <select id="tipo">
        <option value="industrial">Industrial</option>
        <option value="comercial">Comercial</option>
        <option value="militar">Militar</option>
    </select>

    <button onclick="cargarDrones()">📡 Cargar Software</button>

    <select id="drones"></select>

    <br>

    <button onclick="setEscenario('ciudad')">🏙️ Ciudad</button>
    <button onclick="setEscenario('oceano')">🌊 Océano</button>

    <p id="estado"></p>
</div>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 50;

let drone;
let objetos = [];

// =========================
// 🚁 CREAR DRONE REAL
// =========================
function crearDrone() {
    let geo = new THREE.BoxGeometry(2,1,2);
    let mat = new THREE.MeshBasicMaterial({color:0x00ffcc});
    drone = new THREE.Mesh(geo, mat);
    drone.position.y = 5;
    scene.add(drone);
}

// =========================
// 🌍 ESCENARIOS
// =========================
function limpiarEscenario(){
    objetos.forEach(o => scene.remove(o));
    objetos = [];
}

function setEscenario(tipo){
    limpiarEscenario();

    if(tipo === "ciudad"){
        document.getElementById("estado").innerText = "🌆 Ciudad cargada";

        for(let i=0;i<20;i++){
            let b = new THREE.Mesh(
                new THREE.BoxGeometry(3, Math.random()*10+5,3),
                new THREE.MeshBasicMaterial({color:0x888888})
            );
            b.position.set(
                Math.random()*100-50,
                b.geometry.parameters.height/2,
                Math.random()*100-50
            );
            scene.add(b);
            objetos.push(b);
        }

        // carros
        for(let i=0;i<10;i++){
            let car = new THREE.Mesh(
                new THREE.BoxGeometry(2,1,1),
                new THREE.MeshBasicMaterial({color:0xff0000})
            );
            car.position.set(Math.random()*80-40,1,Math.random()*80-40);
            scene.add(car);
            objetos.push(car);
        }

    }

    if(tipo === "oceano"){
        document.getElementById("estado").innerText = "🌊 Océano cargado";

        let agua = new THREE.Mesh(
            new THREE.BoxGeometry(200,1,200),
            new THREE.MeshBasicMaterial({color:0x0000ff})
        );
        scene.add(agua);
        objetos.push(agua);

        // peces
        for(let i=0;i<20;i++){
            let pez = new THREE.Mesh(
                new THREE.SphereGeometry(0.5),
                new THREE.MeshBasicMaterial({color:0xffff00})
            );
            pez.position.set(Math.random()*100-50, Math.random()*10, Math.random()*100-50);
            scene.add(pez);
            objetos.push(pez);
        }
    }
}

// =========================
// 📡 CARGAR DRONES REALES
// =========================
async function cargarDrones(){
    let tipo = document.getElementById("tipo").value;

    let res = await fetch("/maia_drones_aprobados");
    let data = await res.json();

    let select = document.getElementById("drones");
    select.innerHTML = "";

    let filtrados = data.filter(d => d.tipo === tipo);

    filtrados.forEach(d => {
        let op = document.createElement("option");
        op.text = d.nombre;
        select.add(op);
    });

    document.getElementById("estado").innerText = "✅ Software cargado";
}

// =========================
// 🎮 CONTROLES (WASD)
// =========================
document.addEventListener("keydown", e => {

    if(!drone) return;

    if(e.key === "w") drone.position.z -= 1;
    if(e.key === "s") drone.position.z += 1;
    if(e.key === "a") drone.position.x -= 1;
    if(e.key === "d") drone.position.x += 1;

});

// =========================
// 🤖 DEMO AUTOMÁTICO
// =========================
function demoIA(){
    if(!drone) return;

    drone.position.x += Math.sin(Date.now()*0.001)*0.2;
    drone.position.z += Math.cos(Date.now()*0.001)*0.2;
}

// =========================
// 🎬 LOOP
// =========================
function animate(){
    requestAnimationFrame(animate);

    demoIA();

    renderer.render(scene, camera);
}

// =========================
// INIT
// =========================
crearDrone();
setEscenario("ciudad");
animate();

</script>

</body>
</html>
