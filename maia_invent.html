<!DOCTYPE html>
<html>
<head>
    <title>MAIA INVENT</title>

    <style>
        body {
            font-family: Arial;
        }

        #panel_maia {
            display: none;
            background: black;
            color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        #barra_container {
            width: 100%;
            background: #ddd;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }

        #barra {
            width: 0%;
            height: 25px;
            background: green;
            text-align: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🧠 MAIA INVENT</h1>
<p>Generador de ideas disruptivas de drones</p>

<textarea id="idea" placeholder="Ej: inseguridad urbana"></textarea><br><br>

<button onclick="evaluar()">Generar Idea</button>

<!-- 🔥 NUEVO BOTÓN CAPACIDADES -->
<button onclick="verCapacidades()">🚀 ¿Qué puede hacer MAIA?</button>

<h2 id="resultado"></h2>

<!-- 🔥 BARRA DE PROGRESO -->
<div id="barra_container">
    <div id="barra">0%</div>
</div>

<!-- 🔥 PANEL CAPACIDADES -->
<div id="panel_maia"></div>

<!-- 🔥 BOTÓN GUARDAR -->
<button onclick="guardarProyectoInvent()">
    💾 Guardar proyecto en memoria MAIA
</button>

<script>

// =========================
// 🔥 GENERAR IDEA (MEJORADO)
// =========================
function evaluar() {
    const idea = document.getElementById("idea").value;

    if(!idea || idea.length < 3){
        alert("⚠️ Ingresa una idea válida");
        return;
    }

    // 🔥 activar barra
    document.getElementById("barra_container").style.display = "block";
    iniciarProgreso();

    fetch("/evaluar_drone", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({idea: idea})
    })
    .then(res => res.json())
    .then(data => {

        // 🔥 MOSTRAR RESULTADO
        let html = `
            Impacto: ${data.impacto || "N/A"}<br>
            Innovación: ${data.innovacion || "N/A"}<br>
            Viabilidad: ${data.viabilidad || "N/A"}<br><br>
            ${data.mensaje || ""}
        `;

        if(data.analisis){
            html += `<br><br>
            <b>🔬 Análisis Técnico:</b> ${data.analisis.tecnico || ""}<br>
            <b>💰 Análisis Económico:</b> ${data.analisis.economico || ""}<br>
            <b>👨‍🔧 Análisis Profesional:</b> ${data.analisis.profesional || ""}<br>`;
        }

        if(data.software){
            html += `<br><br><b>🧠 Software:</b><br>`;
            if(Array.isArray(data.software)){
                html += data.software.join("<br>");
            } else if(data.software.modulos){
                html += data.software.modulos.join("<br>");
            } else {
                html += JSON.stringify(data.software);
            }
        }

        if(data.hardware){
            html += `<br><br><b>⚙️ Hardware:</b><br>`;
            html += data.hardware.join("<br>");
        }

        if(data.modelo_3d){
            html += `<br><br><b>🧊 Modelo 3D:</b><br>${data.modelo_3d}`;
        }

        document.getElementById("resultado").innerHTML = html;

        window.ultimoProyecto = data;
    })
    .catch(err => {
        alert("❌ Error al generar idea");
        console.error(err);
    });
}

// =========================
// 🔥 PROGRESO EN VIVO
// =========================
function iniciarProgreso(){
    let barra = document.getElementById("barra");

    let intervalo = setInterval(() => {
        fetch("/maia_progreso")
        .then(r => r.json())
        .then(data => {

            barra.style.width = data.progreso + "%";
            barra.innerText = data.progreso + "%";

            if(data.estado === "COMPLETADO"){
                clearInterval(intervalo);
            }

        })
        .catch(() => {
            clearInterval(intervalo);
        });
    }, 500);
}

// =========================
// 🚀 CAPACIDADES MAIA
// =========================
function verCapacidades() {

    fetch("/maia_capacidades")
    .then(r => r.json())
    .then(data => {

        let panel = document.getElementById("panel_maia");
        panel.style.display = "block";

        panel.innerHTML = `
            <h2>🚀 MAIA FASE ${data.fase}</h2>
            <p>Sistema de ingeniería autónoma avanzada</p>
            <ul>
                ${data.capacidades.map(c => `<li>${c}</li>`).join("")}
            </ul>
        `;
    });
}

// =========================
// 💾 GUARDAR PROYECTO
// =========================
async function guardarProyectoInvent(){

    if(!window.ultimoProyecto){
        alert("⚠️ Primero genera una idea");
        return;
    }

    let idea = document.getElementById("idea").value;
    let p = window.ultimoProyecto;

    let res = await fetch("/maia_guardar_proyecto", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            modulo: "maia_invent",
            nombre: idea,
            descripcion: p.mensaje || idea,
            analisis: p.analisis || {
                impacto: p.impacto,
                innovacion: p.innovacion,
                viabilidad: p.viabilidad
            },
            software: p.software || [],
            hardware: p.hardware || [],
            modelo_3d: p.modelo_3d || "No generado",
            extra: p
        })
    });

    let data = await res.json();
    alert(data.mensaje);
}

</script>

</body>
</html>
