<!DOCTYPE html>
<html>
<head>
<title>MAIA INVENT</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:#e5e7eb;}
textarea { width:100%; height:80px; border-radius:8px; padding:10px;}
button {
    padding:10px; margin:5px;
    border-radius:8px; border:none;
    cursor:pointer;
    background:#2563eb; color:white;
}
.panel { background:#020617; padding:15px; border-radius:10px; margin-top:20px;}
.bloque { margin-top:20px; padding:10px; background:#020617; border-radius:10px; border:1px solid #1e293b;}
.ok { color:#22c55e; }
.bad { color:#ef4444; }
pre {
    background:black;
    padding:10px;
    border-radius:8px;
    overflow:auto;
    font-size:12px;
    max-height:300px;
}
#barra_container {
    width:100%;
    background:#111;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
    display:none;
}
#barra {
    width:0%;
    height:25px;
    background:#22c55e;
    text-align:center;
    color:white;
    font-weight:bold;
}

/* 🔥 SOFTWARE INTERACTIVO */
.modulo {
    background:#111;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    cursor:pointer;
}
.codigo {
    display:none;
    background:#000;
    margin-top:5px;
    padding:8px;
    border-radius:6px;
}

/* 🔥 HARDWARE GRID */
.hw-item{
    padding:6px;
    border-bottom:1px solid #333;
}
</style>
</head>

<body>

<h1>🧠 MAIA INVENT</h1>
<p>Generador de ingeniería de drones (FASE 23 🔥)</p>

<textarea id="idea"></textarea><br><br>

<button onclick="evaluar()">🚀 Generar Ingeniería</button>
<button onclick="verCapacidades()">🧠 ¿Qué puede hacer MAIA?</button>
<button onclick="limpiarUI()">🧹 Limpiar</button>

<div id="resultado"></div>

<div id="barra_container">
    <div id="barra">0%</div>
</div>

<div id="panel_maia" style="display:none;"></div>

<script>

// =========================
// GENERAR
// =========================
async function evaluar(){
    const idea = document.getElementById("idea").value;

    if(!idea || idea.length < 3){
        alert("⚠️ Ingresa una idea válida");
        return;
    }

    document.getElementById("barra_container").style.display = "block";
    document.getElementById("resultado").innerHTML = "🧠 MAIA procesando...";

    await fetch("/evaluar_drone", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({idea})
    });

    monitorearResultado();
}

// =========================
// PROGRESO
// =========================
function monitorearResultado(){
    let barra = document.getElementById("barra");

    let intervalo = setInterval(async () => {
        let r = await fetch("/maia_progreso");
        let data = await r.json();

        barra.style.width = data.progreso + "%";
        barra.innerText = data.progreso + "%";

        if(data.progreso >= 100){
            clearInterval(intervalo);
            cargarResultadoFinal();
        }
    },700);
}

// =========================
// RESULTADO PRO
// =========================
async function cargarResultadoFinal(){
    let res = await fetch("/maia_resultado");
    let data = await res.json();

    let html = `<div class="panel">`;

    html += `<h2 class="${(data.viabilidad||"").includes("VIABLE")?"ok":"bad"}">
                ${data.viabilidad || "SIN RESULTADO"}
            </h2>`;

    // 📦 ANALISIS
    html += `<div class="bloque"><h3>📦 Ingeniería</h3>
    <pre>${JSON.stringify(data.analisis,null,2)}</pre></div>`;

    // ⚡ FISICA
    html += `<div class="bloque"><h3>⚡ Física</h3>
    <pre>${JSON.stringify(data.fisica,null,2)}</pre></div>`;

    // ⚙️ HARDWARE (🔥 MEJORADO)
    if(data.hardware){
        html += `<div class="bloque"><h3>⚙️ Hardware</h3>`;
        Object.entries(data.hardware).forEach(([k,v])=>{
            html += `<div class="hw-item"><b>${k}:</b> ${JSON.stringify(v)}</div>`;
        });
        html += `</div>`;
    }

    // 💻 SOFTWARE INTERACTIVO (🔥 CLAVE)
    if(data.software){
        html += `<div class="bloque"><h3>💻 Software IA</h3>`;

        let modulos = data.software.capacidades || [];

        modulos.forEach((m,i)=>{
            html += `
            <div class="modulo" onclick="toggleCodigo(${i})">
                ✔ ${m}
                <div class="codigo" id="code_${i}">
def ${m.replace(/ /g,"_").toLowerCase()}():
    # algoritmo simulado MAIA
    estado = "activo"
    while estado == "activo":
        procesar_datos()
        optimizar()
        if fallo:
            activar_failsafe()
                </div>
            </div>`;
        });

        html += `</div>`;
    }

    // 📡 TELEMETRIA
    html += `<div class="bloque"><h3>📡 Telemetría</h3>
    <pre id="telemetria_data">Procesando...</pre></div>`;

    // 🧊 3D
    html += `<div class="bloque">
        <h3>🧊 Modelo 3D</h3>
        <canvas id="viewer3d" style="width:100%; height:400px;"></canvas>
    </div>`;

    html += `</div>`;

    document.getElementById("resultado").innerHTML = html;

    // TELEMETRIA
    try{
        let salida = data.salida || "";
        let raw = salida.split("###DATA_START###")[1]?.split("###DATA_END###")[0];
        document.getElementById("telemetria_data").innerText =
            raw ? raw : "Sin telemetría real";
    }catch(e){
        document.getElementById("telemetria_data").innerText = "Error";
    }

    render3D();
}

// =========================
// TOGGLE CODIGO
// =========================
function toggleCodigo(i){
    let el = document.getElementById("code_"+i);
    el.style.display = el.style.display === "block" ? "none" : "block";
}

// =========================
// 3D
// =========================
function render3D(){
    const canvas = document.getElementById("viewer3d");
    if(!canvas) return;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 2, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({canvas});

    renderer.setSize(canvas.clientWidth, 400);

    scene.add(new THREE.AmbientLight(0xffffff,0.6));

    let body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.6,0.6,0.25,32),
        new THREE.MeshStandardMaterial({color:0x00ffaa})
    );
    scene.add(body);

    camera.position.z = 6;

    function animate(){
        requestAnimationFrame(animate);
        scene.rotation.y += 0.01;
        renderer.render(scene, camera);
    }
    animate();
}

// =========================
// MAIA COMPLETO (🔥 PRO)
// =========================
function verCapacidades(){
    let panel = document.getElementById("panel_maia");
    panel.style.display = "block";

    let html = `<div class="panel">
    <h2>🚀 MAIA - SISTEMA COMPLETO</h2>
    <p>
    MAIA es un sistema de ingeniería autónoma capaz de diseñar,
    validar y generar soluciones aeroespaciales completas.
    Cada fase representa un incremento en inteligencia,
    autonomía y capacidad de simulación.
    </p><ul>`;

    for(let i=1;i<=26;i++){
        html += `<li><b>Fase ${i}:</b> Nivel evolutivo con mayor precisión,
        automatización y capacidad de decisión autónoma.</li>`;
    }

    html += `</ul></div>`;

    panel.innerHTML = html;
}

// =========================
// LIMPIAR (🔥 FIX)
// =========================
function limpiarUI(){
    document.getElementById("idea").value = "";
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("panel_maia").innerHTML = "";
    document.getElementById("panel_maia").style.display = "none";
    document.getElementById("barra_container").style.display = "none";
}

</script>
</body>
</html>
