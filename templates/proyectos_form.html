<!DOCTYPE html>
<html lang="es">

<head>

<title>Nuevo Proyecto</title>

<style>

body{
font-family: Arial;
background:#1e1e1e;
color:white;
padding:40px;
}

form{
background:#2a2a2a;
padding:30px;
border-radius:10px;
max-width:500px;
}

input, select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

button{
background:#2563eb;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}

a{
color:#60a5fa;
}

</style>

</head>

<body>

<h1>Crear Proyecto</h1>

<form method="POST">

<label>Nombre del proyecto</label>
<input type="text" name="nombre" required>

<label>Tipo de proyecto</label>
<select name="sector" required>

<option value="">Seleccionar</option>

<option value="Solar">Energía Solar</option>
<option value="Hidro">Hidroeléctrico</option>
<option value="Eolico">Eólico</option>
<option value="Nuclear">Nuclear</option>
<option value="Agro">Agrícola</option>
<option value="Mineria">Minería</option>
<option value="Infraestructura">Infraestructura</option>

</select>


<label>País</label>
<input type="text" name="pais" required>


<label>Ciudad</label>
<input type="text" name="ciudad">


<label>Moneda</label>
<select name="moneda">

<option value="USD">USD</option>
<option value="COP">COP</option>
<option value="EUR">EUR</option>

</select>


<label>Horizonte del proyecto (años)</label>
<input type="number" name="horizonte" min="1" required>


<label>Capacidad del proyecto</label>
<input type="number" name="capacidad" min="1" required>


<label>Unidad</label>
<select name="unidad">

<option value="MW">MW</option>
<option value="hectareas">Hectáreas</option>
<option value="ton">Toneladas/año</option>
<option value="km">Kilómetros</option>

</select>


<button type="submit">Crear Proyecto</button>

</form>

<br>

<a href="/proyectos">Volver</a>

</body>
</html>
