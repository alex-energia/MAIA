<!DOCTYPE html>
<html>
<head>
    <title>MAIA INVENT</title>
</head>

<body>

<h1>🧠 MAIA INVENT</h1>
<p>Generador autónomo de drones disruptivos</p>

<button onclick="generarDrone()">🚀 Generar Drone</button>
<button onclick="limpiar()">🧹 Limpiar</button>

<hr>

<h2 id="nombre"></h2>
<p id="intro"></p>
<p id="viabilidad"></p>

<h3>🧠 Software</h3>
<ul id="software"></ul>

<h3>⚙️ Hardware</h3>
<ul id="hardware"></ul>

<hr>

<h3>💾 Guardar Proyecto</h3>

<select id="categoria">
    <option value="">Seleccionar tipo</option>
    <option value="comercial">Comercial</option>
    <option value="industrial">Industrial</option>
    <option value="militar">Militar</option>
</select>

<br><br>

<button onclick="guardar()">💾 Guardar Drone</button>

<p id="estado_guardado"></p>

<script>

// =========================
// 🧠 MEMORIA LOCAL ANTI-REPETICIÓN
// =========================
let droneActual = null;
let historial = new Set();

// Cargar historial guardado en navegador
if (localStorage.getItem("drones_generados")) {
    historial = new Set(JSON.parse(localStorage.getItem("drones_generados")));
}

// =========================
// 🚀 GENERAR DRONE SIN REPETIR (DOBLE FILTRO)
// =========================
async function generarDrone() {

    for (let intento = 0; intento < 10; intento++) {

        const res = await fetch("/generar_drone_maia");
        const data = await res.json();

        // 🚫 Si ya existe, intenta de nuevo
        if (historial.has(data.nombre)) {
            continue;
        }

        // ✅ Nuevo drone válido
        droneActual = data;
        historial.add(data.nombre);

        // Guardar en navegador
        localStorage.setItem("drones_generados", JSON.stringify([...historial]));

        renderDrone(data);
        return;
    }

    alert("⚠️ No se pudo generar un drone nuevo, intenta limpiar.");
}

// =========================
// 🎨 RENDER
// =========================
function renderDrone(data) {

    document.getElementById("nombre").innerText = data.nombre;
    document.getElementById("intro").innerText = data.introduccion;
    document.getElementById("viabilidad").innerText = data.viabilidad;

    let sw = document.getElementById("software");
    let hw = document.getElementById("hardware");

    sw.innerHTML = "";
    hw.innerHTML = "";

    data.software.forEach(s => {
        let li = document.createElement("li");
        li.innerText = s;
        sw.appendChild(li);
    });

    data.hardware.forEach(h => {
        let li = document.createElement("li");
        li.innerText = h;
        hw.appendChild(li);
    });
}

// =========================
// 🧹 LIMPIAR TODO (INCLUYE HISTORIAL)
// =========================
function limpiar() {

    document.getElementById("nombre").innerText = "";
    document.getElementById("intro").innerText = "";
    document.getElementById("viabilidad").innerText = "";
    document.getElementById("software").innerHTML = "";
    document.getElementById("hardware").innerHTML = "";
    document.getElementById("estado_guardado").innerText = "";

    droneActual = null;

    // 🔥 BORRA HISTORIAL COMPLETO
    historial.clear();
    localStorage.removeItem("drones_generados");
}

// =========================
// 💾 GUARDAR DRONE
// =========================
async function guardar() {

    if (!droneActual) {
        alert("Primero genera un drone");
        return;
    }

    let categoria = document.getElementById("categoria").value;

    if (!categoria) {
        alert("Selecciona categoría");
        return;
    }

    await fetch("/guardar_proyecto", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nombre: droneActual.nombre,
            tecnologia: categoria,
            pais: "N/A",
            ciudad: "N/A",
            moneda: "N/A",
            horizonte: "N/A",
            potencia: "N/A",
            unidad: "N/A"
        })
    });

    document.getElementById("estado_guardado").innerText = "✅ Guardado correctamente";
}

</script>

</body>
</html>
