<!DOCTYPE html>
<html>
<head>
<title>MAIA INVENT</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e5e7eb;
}

textarea {
    width: 100%;
    height: 80px;
    border-radius: 8px;
    padding: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #2563eb;
    color: white;
}

#panel_maia {
    display: none;
    background: black;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
}

#barra_container {
    width: 100%;
    background: #111;
    margin-top: 20px;
    border-radius: 10px;
    overflow: hidden;
    display: none;
}

#barra {
    width: 0%;
    height: 25px;
    background: #22c55e;
    text-align: center;
    color: white;
    font-weight: bold;
}

.panel {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}

.ok { color: #22c55e; }
.bad { color: #ef4444; }

pre {
    background: black;
    padding: 10px;
    border-radius: 8px;
    overflow: auto;
    font-size: 12px;
    max-height: 300px;
}

.bloque {
    margin-top: 20px;
    padding: 10px;
    background: #020617;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>🧠 MAIA INVENT</h1>
<p>Generador de ingeniería de drones (FASE 23 🔥)</p>

<textarea id="idea"></textarea>
<br><br>

<button onclick="evaluar()">🚀 Generar Ingeniería</button>
<button onclick="verCapacidades()">🚀 ¿Qué puede hacer MAIA?</button>
<button onclick="limpiarUI()">🧹 Limpiar</button>

<div id="resultado"></div>

<div id="barra_container">
    <div id="barra">0%</div>
</div>

<div id="panel_maia"></div>

<button onclick="guardarProyectoInvent()">💾 Guardar proyecto</button>

<script>

// =========================
// 🚀 GENERAR
// =========================
async function evaluar(){
    const idea = document.getElementById("idea").value;

    if(!idea || idea.length < 3){
        alert("⚠️ Ingresa una idea válida");
        return;
    }

    document.getElementById("barra_container").style.display = "block";
    document.getElementById("resultado").innerHTML = "🧠 MAIA procesando...";

    await fetch("/evaluar_drone", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({idea})
    });

    monitorearResultado();
}

// =========================
// 📊 PROGRESO
// =========================
function monitorearResultado(){
    let barra = document.getElementById("barra");

    let intervalo = setInterval(async () => {
        try{
            let r = await fetch("/maia_progreso");
            let data = await r.json();

            barra.style.width = data.progreso + "%";
            barra.innerText = data.progreso + "%";

            if(data.progreso >= 100){
                clearInterval(intervalo);
                cargarResultadoFinal();
            }

        }catch(e){
            clearInterval(intervalo);
        }
    }, 700);
}

// =========================
// 🧠 RESULTADO COMPLETO
// =========================
async function cargarResultadoFinal(){

    let res = await fetch("/maia_resultado");
    let data = await res.json();

    let analisis = data.analisis || {};
    let fisica = data.fisica || {};

    let estado = data.viabilidad || "N/A";
    let clase = estado.includes("VIABLE") ? "ok" : "bad";

    let html = `<div class="panel">
    <h2 class="${clase}">${estado}</h2>`;

    html += `<div class="bloque"><h3>📦 Análisis técnico</h3><pre>${JSON.stringify(analisis,null,2)}</pre></div>`;

    if(analisis.riesgos){
        html += `<div class="bloque"><h3>⚠️ Riesgos</h3><pre>${analisis.riesgos.join("\n")}</pre></div>`;
    }

    html += `<div class="bloque"><h3>⚡ Física</h3><pre>${JSON.stringify(fisica,null,2)}</pre></div>`;

    html += `<div class="bloque"><h3>💻 Simulación</h3><pre>${data.salida || "Sin datos"}</pre></div>`;

    html += `<div class="bloque"><h3>📡 Telemetría</h3><pre id="telemetria_data">Procesando...</pre></div>`;

    document.getElementById("resultado").innerHTML = html;

    // =========================
    // 📡 TELEMETRÍA FIX
    // =========================
    try{
        let salida = data.salida || "";
        let inicio = salida.indexOf("###DATA_START###");
        let fin = salida.indexOf("###DATA_END###");

        if(inicio !== -1 && fin !== -1){
            let raw = salida.substring(inicio + 16, fin).trim();

            let json = JSON.parse(raw);
            document.getElementById("telemetria_data").innerText =
                JSON.stringify(json.slice(0,20), null, 2);
        } else {
            document.getElementById("telemetria_data").innerText = "Sin datos";
        }

    }catch(e){
        document.getElementById("telemetria_data").innerText = "Error en telemetría";
    }

    window.ultimoProyecto = data;
}

// =========================
// 🧹 LIMPIAR UI
// =========================
function limpiarUI(){
    document.getElementById("idea").value = "";
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("panel_maia").style.display = "none";
    document.getElementById("barra_container").style.display = "none";
}

// =========================
// 🚀 CAPACIDADES (FASES 1-26)
// =========================
function verCapacidades(){

    let panel = document.getElementById("panel_maia");
    panel.style.display = "block";

    let fases = [];

    for(let i=1;i<=26;i++){
        fases.push(`Fase ${i}: Nivel ${i} de evolución MAIA`);
    }

    panel.innerHTML = `
        <h2>🚀 MAIA - SISTEMA INDUSTRIAL</h2>
        <p>Plataforma autónoma de ingeniería de drones reales</p>
        <h3>📊 Fases completas</h3>
        <ul>
            ${fases.map(f => `<li>${f}</li>`).join("")}
        </ul>
    `;
}

// =========================
// 💾 GUARDAR
// =========================
async function guardarProyectoInvent(){

    let idea = document.getElementById("idea").value;

    await fetch("/maia_guardar_proyecto", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nombre: idea,
            tecnologia: "drone"
        })
    });

    alert("✅ Proyecto guardado");
}

</script>

</body>
</html>
