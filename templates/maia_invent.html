<!DOCTYPE html>
<html>
<head>
<title>MAIA INDUSTRIAL</title>

<!-- 🔥 THREE REAL -->
<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:#e5e7eb;
}

textarea {
    width:100%;
    height:80px;
    padding:10px;
}

button {
    padding:10px;
    margin:5px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

.btn-danger{ background:#ef4444; }
.btn-info{ background:#0ea5e9; }

.panel { margin-top:20px; }

.bloque {
    background:#020617;
    margin-top:15px;
    padding:15px;
    border-left:4px solid #22c55e;
}

.item { margin-left:15px; cursor:pointer; }

.codigo {
    background:black;
    padding:10px;
    margin-top:10px;
    display:none;
    white-space:pre;
    font-size:12px;
}

.folder { color:#38bdf8; }
.file { color:#22c55e; }

/* PROGRESO */
.progress {
    width:100%;
    background:#1e293b;
    margin-top:10px;
}

.progress-bar {
    height:14px;
    width:0%;
    background:#22c55e;
    text-align:center;
    font-size:10px;
}

.progress-text{
    font-size:12px;
    margin-top:5px;
}

/* MODAL */
.modal {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    padding:40px;
}

.modal-content {
    background:#020617;
    padding:20px;
    max-width:800px;
}

/* 3D */
#viewer3d{
    width:100%;
    height:300px;
    background:black;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>🧠 MAIA INDUSTRIAL</h1>

<textarea id="idea" placeholder="Describe tu drone..."></textarea><br>

<button onclick="evaluar()">🚀 Generar</button>
<button class="btn-danger" onclick="limpiarUI()">🧹 Limpiar</button>
<button class="btn-info" onclick="abrirInfo()">🧠 ¿Qué puede hacer MAIA?</button>

<!-- PROGRESO -->
<div class="progress">
    <div id="bar" class="progress-bar">0%</div>
</div>
<div id="progressText" class="progress-text">Esperando...</div>

<div id="resultado"></div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2>🚀 Capacidades MAIA NIVEL 3</h2>
        <div id="capacidades"></div>
        <button onclick="cerrarInfo()">Cerrar</button>
    </div>
</div>

<script>

// =========================
// MOTOR
// =========================
async function evaluar(){

    let idea = document.getElementById("idea").value;
    if(!idea){ alert("Ingresa una idea"); return; }

    let paso = 0;
    let data = {};
    let progreso = 0;

    const estados = [
        "Analizando viabilidad...",
        "Diseñando hardware...",
        "Generando software...",
        "Simulando física...",
        "Integrando sistemas...",
        "Generando modelo 3D...",
        "Finalizando..."
    ];

    while(true){

        progreso = Math.min(progreso + 14, 95);
        actualizarBarra(progreso, estados[paso] || "Procesando...");

        let res = await fetch("/maia_step", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({idea, paso, data})
        });

        let json = await res.json();

        if(json.final){
            actualizarBarra(100, "Completado");
            render(json.resultado);
            actualizarCapacidades(json.resultado);
            return;
        }

        paso = json.paso;
        data = json.data;
    }
}

// =========================
// PROGRESO
// =========================
function actualizarBarra(p, txt){
    let bar = document.getElementById("bar");
    bar.style.width = p + "%";
    bar.innerText = Math.min(p,100) + "%";
    document.getElementById("progressText").innerText = txt;
}

// =========================
// LIMPIAR
// =========================
function limpiarUI(){
    document.getElementById("idea").value = "";
    document.getElementById("resultado").innerHTML = "";
    actualizarBarra(0,"Esperando...");
}

// =========================
// RENDER
// =========================
function render(data){

    let html = `<div class="panel">`;

    html += `<div class="bloque"><h2>🚀 ${data.nivel_maia || "NIVEL 1"}</h2></div>`;

    html += renderBloque("🧠 Viabilidad", data.viabilidad);
    html += renderBloque("🔩 Hardware", data.hardware);
    html += renderBloque("💻 Software", data.software);
    html += renderBloque("📡 Comunicaciones", data.comunicaciones);
    html += renderBloque("📡 Telemetría", data.telemetria);
    html += renderBloque("⚙️ Física", data.fisica);
    html += renderBloque("⚠️ Riesgos", data.riesgos);

    // 🔥 MODELO 3D + VISOR
    if(data.modelo_3d){
        html += `<div class="bloque">
            <h3>🧱 Modelo 3D</h3>
            ${renderTree(data.modelo_3d)}
            <div id="viewer3d"></div>
        </div>`;
    }

    html += `</div>`;

    document.getElementById("resultado").innerHTML = html;

    // iniciar 3D
    if(data.modelo_3d){
        iniciar3D();
    }
}

// =========================
// BLOQUES
// =========================
function renderBloque(titulo, data){
    if(!data) return "";
    let html = `<div class="bloque"><h3>${titulo}</h3>`;
    if(Array.isArray(data)){
        data.forEach(x=>{
            html += `<div class="item">• ${escapeHtml(x)}</div>`;
        });
    }else{
        html += renderTree(data);
    }
    html += `</div>`;
    return html;
}

// =========================
// TREE
// =========================
function renderTree(obj){
    let html = "";
    for(let key in obj){
        let val = obj[key];
        let id = "node_" + Math.random();
        if(typeof val === "object" && val !== null){
            html += `<div class="item folder" onclick="toggle('${id}')">📁 ${key}</div>
            <div id="${id}" style="display:none;margin-left:15px;">
            ${renderTree(val)}</div>`;
        }else{
            html += `<div class="item file" onclick="toggle('${id}')">📄 ${key}</div>
            <pre id="${id}" class="codigo">${escapeHtml(val)}</pre>`;
        }
    }
    return html;
}

// =========================
// TOGGLE
// =========================
function toggle(id){
    let el = document.getElementById(id);
    if(!el) return;
    el.style.display = el.style.display === "block" ? "none" : "block";
}

// =========================
// ESCAPE
// =========================
function escapeHtml(text){
    if(typeof text !== "string"){
        try{return JSON.stringify(text,null,2);}catch(e){return "N/A";}
    }
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// =========================
// 🔥 VISOR 3D REAL
// =========================
function iniciar3D(){

    let container = document.getElementById("viewer3d");

    let scene = new THREE.Scene();
    let camera = new THREE.PerspectiveCamera(75, container.clientWidth / 300, 0.1, 1000);
    let renderer = new THREE.WebGLRenderer();

    renderer.setSize(container.clientWidth, 300);
    container.innerHTML = "";
    container.appendChild(renderer.domElement);

    let geometry = new THREE.BoxGeometry(2,0.2,2);
    let material = new THREE.MeshBasicMaterial({wireframe:true});
    let cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    camera.position.z = 5;

    function animate(){
        requestAnimationFrame(animate);
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;
        renderer.render(scene,camera);
    }

    animate();
}

// =========================
// MODAL
// =========================
function abrirInfo(){
    document.getElementById("modal").style.display="block";
}

function cerrarInfo(){
    document.getElementById("modal").style.display="none";
}

// =========================
// CAPACIDADES
// =========================
function actualizarCapacidades(data){
    document.getElementById("capacidades").innerHTML = `
    <p><b>MAIA NIVEL 3:</b> Plataforma de ingeniería autónoma completa.</p>
    <p>✔ Diseño aeronáutico</p>
    <p>✔ Software autónomo</p>
    <p>✔ Simulación física</p>
    <p>✔ Comunicaciones reales</p>
    <p>✔ Telemetría industrial</p>
    <p>✔ Modelado 3D</p>
    `;
}

</script>
</body>
</html>
