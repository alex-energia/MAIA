<!DOCTYPE html>
<html>
<head>
<title>MAIA INVENT</title>

<!-- ✅ FIX REAL CDN (QUITÉ LOS CORCHETES QUE LO ROMPEN) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

<style>
body { font-family: Arial; background:#0f172a; color:#e5e7eb;}

textarea { width:100%; height:80px; border-radius:8px; padding:10px;}

button {
    padding:10px; margin:5px;
    border-radius:8px; border:none;
    cursor:pointer;
    background:#2563eb; color:white;
}

.panel { background:#020617; padding:15px; border-radius:10px; margin-top:20px;}

.bloque {
    margin-top:20px;
    padding:15px;
    background:#020617;
    border-radius:10px;
    border-left:4px solid #22c55e;
}

.subbloque {
    display:none;
    margin-top:10px;
    padding:10px;
    background:#111827;
    border-radius:8px;
}

.toggle {
    cursor:pointer;
    margin-top:10px;
    display:block;
    font-weight:bold;
}

#barra_container {
    width:100%;
    background:#111;
    margin-top:20px;
    border-radius:10px;
    display:none;
}

#barra {
    width:0%;
    height:25px;
    background:#22c55e;
    text-align:center;
}

.boton-maia{
    background:#facc15;
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🧠 MAIA INVENT</h1>

<textarea id="idea" placeholder="Describe tu drone..."></textarea>

<br><br>

<button onclick="evaluar()">🚀 Generar Ingeniería</button>
<button onclick="limpiarUI()">🧹 Limpiar</button>

<div id="barra_container">
    <div id="barra">0%</div>
</div>

<div id="resultado"></div>

<script>

// =========================
// 🚀 MOTOR STEP REAL
// =========================
async function evaluar(){

    const idea = document.getElementById("idea").value;
    if(!idea){ alert("Ingresa una idea"); return; }

    document.getElementById("barra_container").style.display = "block";

    let paso = 0;
    let data = {};
    let barra = document.getElementById("barra");

    while(true){

        let res = await fetch("/maia_step", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ idea, paso, data })
        });

        let json = await res.json();

        if(json.error){
            alert(json.error);
            return;
        }

        if(json.final){
            barra.style.width = "100%";
            barra.innerText = "100%";
            renderResultado(json.resultado);
            return;
        }

        paso = json.paso ?? paso + 1;
        data = json.data ?? data;

        let progreso = Math.min(95, paso * 15);
        barra.style.width = progreso + "%";
        barra.innerText = progreso + "%";

        await new Promise(r => setTimeout(r, 300));
    }
}


// =========================
// 🔽 TOGGLE REAL
// =========================
function toggle(id){
    let el = document.getElementById(id);
    el.style.display = (el.style.display === "none") ? "block" : "none";
}


// =========================
// 🎯 RENDER INDUSTRIAL
// =========================
function renderResultado(data){

    let html = `<div class="panel">`;

    html += `<button class="boton-maia" onclick="explicarMAIA()">🧠 MAIA ENGINE</button>`;


    // 🔩 HARDWARE
    html += `
    <div class="bloque">
        <h3>🔩 Hardware</h3>

        <span class="toggle" onclick="toggle('hw1')">▶ Componentes</span>
        <div id="hw1" class="subbloque">
            ${Object.entries(data.hardware || {}).map(([k,v]) => `<p><b>${k}:</b> ${v}</p>`).join("")}
        </div>

        <span class="toggle" onclick="toggle('hw2')">▶ Ingeniería</span>
        <div id="hw2" class="subbloque">
            ${Object.entries(data.analisis_pro || {}).map(([k,v]) => `<p><b>${k}:</b> ${v}</p>`).join("")}
        </div>
    </div>
    `;


    // 📦 BOM
    html += `
    <div class="bloque">
        <h3>📦 BOM</h3>
        <div class="subbloque" style="display:block;">
            ${(data.bom || []).map(i => `<p>• ${i}</p>`).join("")}
        </div>
    </div>
    `;


    // 💻 SOFTWARE
    html += `
    <div class="bloque">
        <h3>💻 Software</h3>

        <span class="toggle" onclick="toggle('sw1')">▶ Control</span>
        <div id="sw1" class="subbloque">
            <p>${data.software?.control || "N/A"}</p>
        </div>

        <span class="toggle" onclick="toggle('sw2')">▶ Algoritmos</span>
        <div id="sw2" class="subbloque">
            ${(data.software?.algoritmos || []).map(a => `<p>• ${a}</p>`).join("")}
        </div>

        <span class="toggle" onclick="toggle('sw3')">▶ IA</span>
        <div id="sw3" class="subbloque">
            <p>${data.software?.ia || "N/A"}</p>
        </div>

    </div>
    `;


    // ⚙️ FISICA
    html += `
    <div class="bloque">
        <h3>⚙️ Física</h3>
        ${Object.entries(data.fisica || {}).map(([k,v]) => `<p><b>${k}:</b> ${v}</p>`).join("")}
    </div>
    `;


    // ⚠️ RIESGOS
    html += `
    <div class="bloque">
        <h3>⚠️ Riesgos</h3>
        ${(data.riesgos || []).map(r => `<p>⚠️ ${r}</p>`).join("")}
    </div>
    `;


    // 🧱 3D
    html += `
    <div class="bloque">
        <h3>🧱 Modelo 3D</h3>
        <canvas id="viewer3d" style="width:100%; height:400px;"></canvas>
    </div>
    `;


    // 📦 EXPORT
    html += `
    <div class="bloque">
        <h3>📦 Proyecto Exportado</h3>
        <p>${data.zip || "No generado"}</p>
    </div>
    `;

    html += `</div>`;

    document.getElementById("resultado").innerHTML = html;

    setTimeout(render3D, 200);
}


// =========================
// 🧊 3D
// =========================
function render3D(){

    const canvas = document.getElementById("viewer3d");
    if(!canvas || typeof THREE === "undefined") return;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth/400, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({canvas, antialias:true});

    renderer.setSize(canvas.clientWidth,400);

    scene.add(new THREE.AmbientLight(0xffffff,0.7));

    let body = new THREE.Mesh(
        new THREE.BoxGeometry(1.5,0.3,1.5),
        new THREE.MeshStandardMaterial({color:0x00ffaa})
    );

    scene.add(body);

    camera.position.z = 5;

    function animate(){
        requestAnimationFrame(animate);
        scene.rotation.y += 0.01;
        renderer.render(scene,camera);
    }

    animate();
}


// =========================
// 🧠 EXPLICACION
// =========================
function explicarMAIA(){
    alert(`MAIA ejecuta:
1. Ingeniería hardware
2. Software autónomo
3. Física real
4. Evaluación de riesgos
5. Modelo 3D
6. Exportación completa`);
}


// =========================
// 🧹 LIMPIAR
// =========================
function limpiarUI(){
    document.getElementById("idea").value = "";
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("barra_container").style.display = "none";
}

</script>

</body>
</html>
