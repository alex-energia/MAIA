<!-- ========================= -->
<!-- MAIA GLOBAL UI -->
<!-- ========================= -->

<div id="maia-container" style="position:fixed;bottom:20px;right:20px;z-index:9999;width:320px;">

    <button id="maia-voz-btn"
        style="background:red;color:white;padding:10px 20px;border:none;border-radius:5px;cursor:pointer;width:100%;">
        Activar MAIA
    </button>

    <span id="abrir-chat"
        style="cursor:pointer;font-size:24px;color:#22c55e;text-align:center;display:block;margin-top:5px;">
        ➕
    </span>

    <div id="maia-chat"
        style="display:none;margin-top:10px;background:#1e293b;border-radius:10px;padding:10px;">

        <div id="chat-mensajes"
            style="height:200px;overflow-y:auto;margin-bottom:5px;"></div>

        <input type="text" id="chat-input"
            placeholder="Escribe tu pregunta..."
            style="width:100%;padding:5px;border-radius:5px;border:none;outline:none;">

        <label style="cursor:pointer;font-size:20px;">
            ➕
            <input type="file" id="subir-archivo" style="display:none;" multiple>
        </label>

    </div>
</div>

<script src="{{ url_for('static', filename='js/maia.js') }}"></script>
